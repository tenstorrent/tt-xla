name: Update Test Durations

# Minimal POC workflow to validate multi-host setup using mpirun
# Goal: Run hostname checks across all nodes from a single controller

on:
  workflow_dispatch:
    inputs:
      test_metal:
        description: 'Run tt-metal build and tests'
        required: false
        default: false
        type: boolean

permissions:
  packages: read
  contents: read

env:
  GH_TOKEN: ${{ github.token }}
  # Artifact download mode: 'specific' to use ARTIFACT_RUN_ID, 'latest' to use latest push-main
  ARTIFACT_MODE: specific
  ARTIFACT_RUN_ID: 22774145128

jobs:
  multihost-hostname-check:
    runs-on:
      - multi-host-t3000
      - in-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Capture runner's home directory
        id: capture-home
        run: echo "home=${HOME}" >> $GITHUB_OUTPUT

      - name: Download artifact on bare metal
        run: |
          echo "=== Downloading artifact on bare metal ==="
          echo ""

          ARTIFACT_DIR=xla_artifacts
          if [ "${{ env.ARTIFACT_MODE }}" = "specific" ]; then
            echo "Downloading artifacts from specific run: ${{ env.ARTIFACT_RUN_ID }}"
            python3 .github/scripts/download_artifacts.py --run-id ${{ env.ARTIFACT_RUN_ID }} --filter xla-whl-release --output-folder $ARTIFACT_DIR
          else
            echo "Downloading artifacts from latest push-main"
            python3 .github/scripts/download_artifacts.py --workflow push-main.yml --branch main --filter xla-whl-release --output-folder $ARTIFACT_DIR
          fi

          echo ""
          echo "Artifact download complete"
          echo ""

      - name: Pre-check for existing containers
        run: |
          echo "=== Checking for existing multihost-poc containers ==="
          echo ""

          mpirun --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --tag-output \
            bash -c '
            if docker ps -a --filter name=multihost-poc --format "{{.Names}}" | grep -q multihost-poc; then
              echo "$(hostname): Found existing multihost-poc container, stopping it..."
              docker stop multihost-poc || true
              docker rm multihost-poc || true
              echo "$(hostname): Cleaned up existing container"
            else
              echo "$(hostname): No existing containers found"
            fi
            '

          echo ""
          echo "Pre-check complete"
          echo ""

      - name: Validate host-to-host mpirun (bare metal)
        run: |
          echo "=== Bare Metal MPI Validation ==="
          echo ""

          # Check if hostfile exists
          if [ ! -f /etc/mpirun/hostfile ]; then
            echo "ERROR: /etc/mpirun/hostfile not found!"
            exit 1
          fi

          echo "Hostfile found at /etc/mpirun/hostfile"

          # Test host-to-host mpirun
          echo "Testing mpirun hostname on bare metal hosts..."
          mpirun --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --tag-output \
            hostname
          echo ""

          echo "Bare metal MPI validation complete!"
          echo ""

      - name: Start SSH agent on controller
        run: |
          echo "=== Starting SSH agent on controller ==="
          echo ""

          eval $(ssh-agent -s)
          ssh-add /home/ubuntu/.ssh/id_rsa_multihost
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" > /tmp/ssh_agent_env
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> /tmp/ssh_agent_env
          echo "SSH agent started on controller with PID $SSH_AGENT_PID"

          echo ""
          echo "SSH agent started on controller"
          echo ""

      - name: Start container on controller
        run: |
          echo "=== Starting container on controller ==="
          echo ""

          source /tmp/ssh_agent_env

          # Build docker run command with conditional SSH agent forwarding
          DOCKER_CMD="docker run --pull=always --rm -d \
            --name multihost-poc \
            --privileged \
            --pid=host \
            --network=host \
            --device /dev/tenstorrent \
            -v /dev/hugepages:/dev/hugepages \
            -v /dev/hugepages-1G:/dev/hugepages-1G \
            -v /etc/udev/rules.d:/etc/udev/rules.d \
            -v /lib/modules:/lib/modules \
            -v /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env \
            -v /mnt/dockercache:/mnt/dockercache \
            -v /etc/mpirun:/etc/mpirun:ro"

          # Add SSH agent forwarding only if SSH_AUTH_SOCK exists
          if [ -n "$SSH_AUTH_SOCK" ] && [ -S "$SSH_AUTH_SOCK" ]; then
            echo "SSH_AUTH_SOCK found: $SSH_AUTH_SOCK - enabling SSH agent forwarding"
            DOCKER_CMD="$DOCKER_CMD -v $SSH_AUTH_SOCK:/ssh-agent -e SSH_AUTH_SOCK=/ssh-agent"
          else
            echo "Warning: SSH_AUTH_SOCK not found or not a socket - skipping SSH agent forwarding"
          fi

          DOCKER_CMD="$DOCKER_CMD \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            --hostname mpirun-host \
            ghcr.io/tenstorrent/tt-xla/tt-xla-ci-ubuntu-22-04:latest \
            sleep infinity"

          CONTAINER_ID=$(eval $DOCKER_CMD)
          if [ -z "$CONTAINER_ID" ]; then
            echo "ERROR - Failed to start container on controller!"
            exit 1
          fi
          echo "Container started on controller with ID: $CONTAINER_ID"

          echo ""
          echo "Container started on controller"
          echo ""

      - name: Start containers on worker hosts via mpirun
        run: |
          echo "=== Starting containers on worker hosts ==="
          echo ""

          mpirun --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --tag-output \
            bash -c '
            # Skip if this is the controller (container already running)
            if docker ps --filter name=multihost-poc --format "{{.Names}}" | grep -q multihost-poc; then
              echo "$(hostname): Container already running (controller), skipping"
            else
              CONTAINER_ID=$(docker run --pull=always --rm -d \
                --name multihost-poc \
                --privileged \
                --pid=host \
                --network=host \
                --device /dev/tenstorrent \
                -v /etc/mpirun:/etc/mpirun:ro \
                -v /dev/hugepages:/dev/hugepages \
                -v /dev/hugepages-1G:/dev/hugepages-1G \
                -v /etc/udev/rules.d:/etc/udev/rules.d \
                -v /lib/modules:/lib/modules \
                -v /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env \
                -v /mnt/dockercache:/mnt/dockercache \
                -v ${{ github.workspace }}:/workspace \
                -w /workspace \
                ghcr.io/tenstorrent/tt-xla/tt-xla-ci-ubuntu-22-04:latest \
                sleep infinity)
              if [ -z "$CONTAINER_ID" ]; then
                echo "$(hostname): ERROR - Failed to start container!"
                exit 1
              fi
              echo "$(hostname): Container started with ID: $CONTAINER_ID"
            fi
            '

          echo ""
          echo "Containers started on all hosts"
          echo ""

      - name: Make remote_docker.sh executable in controller container
        run: |
          echo "Making remote_docker.sh executable in controller container..."

          docker exec multihost-poc chmod +x /workspace/tests/torch/multi_host/experimental/remote_docker.sh

          echo ""
          echo "Verifying script is executable in controller container..."
          docker exec multihost-poc ls -la /workspace/tests/torch/multi_host/experimental/remote_docker.sh


      - name: Verify SSH agent forwarding in controller container
        run: |
          echo "=== Verifying SSH agent forwarding in controller container ==="
          echo ""

          echo "Checking SSH_AUTH_SOCK inside controller container:"
          docker exec multihost-poc printenv SSH_AUTH_SOCK || echo "SSH_AUTH_SOCK not set (expected if SSH agent forwarding was skipped)"
          echo ""

          echo "Checking if SSH agent socket exists inside controller container:"
          docker exec multihost-poc ls -la /ssh-agent 2>/dev/null || echo "SSH agent socket not found (expected if SSH agent forwarding was skipped)"
          echo ""

          echo "Testing ssh-add -l inside controller container:"
          docker exec multihost-poc ssh-add -l || echo "ssh-add failed (expected if SSH agent forwarding was skipped)"

          echo ""
          echo "SSH agent verification complete"
          echo ""

      - name: Container-to-container mpirun smoketest
        run: |
          echo "=== Container-to-container SSH smoketest ==="
          echo ""
          echo "Running mpirun from inside containers with remote_docker.sh as plm_rsh_agent"
          echo ""

          # Run mpirun from inside one of the containers (controller)
          docker exec multihost-poc bash -c '
            mpirun --allow-run-as-root \
              --hostfile /etc/mpirun/hostfile \
              --mca btl_tcp_if_exclude docker0,lo \
              --mca plm_rsh_agent /workspace/tests/torch/multi_host/experimental/remote_docker.sh \
              --tag-output \
              bash -c "echo \"Hostname: \$(hostname)\"; if [ -f /.dockerenv ]; then echo \"Running in container: YES\"; else echo \"Running in container: NO\"; fi"
          '

          echo ""
          echo "Container-to-container SSH smoketest complete"
          echo ""

      - name: Install wheel in controller container
        run: |
          echo "=== Installing wheel in controller container ==="
          echo ""

          docker exec multihost-poc bash -c '
            cd /workspace
            source venv/activate

            # Find the wheel file
            ARTIFACT_DIR=xla_artifacts
            WHEEL_PATH=$(find $ARTIFACT_DIR -name "*.whl" | head -n 1)

            if [ -z "$WHEEL_PATH" ]; then
              echo "ERROR: No wheel file found in $ARTIFACT_DIR"
              exit 1
            fi

            echo "Installing wheel: $WHEEL_PATH"
            pip install "$WHEEL_PATH"

            echo "Wheel installation complete"

            # Find and check libtt_metal.so
            echo ""
            echo "Locating libtt_metal.so..."
            LIBTT_METAL=$(find /workspace/venv/lib/python3.12/site-packages/pjrt_plugin_tt -name "libtt_metal.so" -type f | head -n 1)
            if [ -n "$LIBTT_METAL" ]; then
              echo "Found libtt_metal.so at: $LIBTT_METAL"
              echo "Running ldd on libtt_metal.so:"
              ldd "$LIBTT_METAL"
            else
              echo "Warning: libtt_metal.so not found"
            fi
          '

          echo ""
          echo "Wheel installed in controller container"
          echo ""

      - name: Verify MPI versions in controller container
        run: |
          echo "=== Verifying MPI versions and library dependencies in controller container ==="
          echo ""

          docker exec multihost-poc bash -c '
            echo "=== Inside venv ==="
            cd /workspace
            source venv/activate

            echo ""
            echo "1. mpirun version in venv:"
            mpirun --version || echo "mpirun not found in venv"

            echo ""
            echo "2. Checking NFS-shared libtt_metal.so (from wheel) MPI linkage:"
            LIBTT_METAL_WHEEL=$(find /workspace/venv/lib/python3.12/site-packages/pjrt_plugin_tt -name "libtt_metal.so" -type f | head -n 1)
            if [ -n "$LIBTT_METAL_WHEEL" ]; then
              echo "   Found at: $LIBTT_METAL_WHEEL"
              echo "   OpenMPI version strings in libtt_metal.so:"
              strings "$LIBTT_METAL_WHEEL" | grep -i "open.mpi\|ompi" | head -10 || echo "   No OpenMPI strings found"
            else
              echo "   libtt_metal.so not found in wheel"
            fi

            echo ""
            echo "3. System libmpi.so version:"
            if [ -f /lib/x86_64-linux-gnu/libmpi.so.40 ]; then
              echo "   OpenMPI version strings in system libmpi.so.40:"
              strings /lib/x86_64-linux-gnu/libmpi.so.40 | grep -i "open.mpi" | head -5 || echo "   No OpenMPI strings found"
              echo ""
              echo "   SONAME of system libmpi.so.40:"
              readelf -d /lib/x86_64-linux-gnu/libmpi.so.40 | grep SONAME || echo "   No SONAME found"
              echo ""
              echo "   System libmpi.so symlinks:"
              ls -la /lib/x86_64-linux-gnu/libmpi.so* || echo "   No libmpi.so files found"
            else
              echo "   /lib/x86_64-linux-gnu/libmpi.so.40 not found"
            fi

            echo ""
            echo "=== Outside venv ==="
            deactivate 2>/dev/null || true

            echo ""
            echo "4. mpirun version outside venv:"
            mpirun --version || echo "mpirun not found outside venv"

            echo ""
            echo "5. Comparing with locally-built tt-metal (if exists):"
            if [ -f /workspace/tt-metal/build/lib/libtt_metal.so ]; then
              echo "   Found locally-built libtt_metal.so"
              echo "   OpenMPI version strings in locally-built libtt_metal.so:"
              strings /workspace/tt-metal/build/lib/libtt_metal.so | grep -i "open.mpi\|ompi" | head -10 || echo "   No OpenMPI strings found"
            else
              echo "   Locally-built tt-metal not found (will be built in later steps)"
            fi

            echo ""
            echo "6. Which mpirun is being used:"
            which mpirun || echo "mpirun not in PATH"
            echo ""
            echo "7. LD_LIBRARY_PATH:"
            echo "   $LD_LIBRARY_PATH"
          '

          echo ""
          echo "MPI version verification complete in controller container"
          echo ""

      - name: Verify MPI versions on all worker containers
        run: |
          echo "=== Verifying MPI versions on all containers via mpirun ==="
          echo ""

          mpirun --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --tag-output \
            bash -c '
              docker exec multihost-poc bash -c "
                echo \"=== Host: \$(hostname) ===\" &&
                echo \"\" &&
                echo \"1. mpirun version:\" &&
                mpirun --version | head -3 || echo \"mpirun not found\" &&
                echo \"\" &&
                echo \"2. System libmpi.so SONAME:\" &&
                readelf -d /lib/x86_64-linux-gnu/libmpi.so.40 2>/dev/null | grep SONAME || echo \"libmpi.so.40 not found\" &&
                echo \"\" &&
                echo \"3. Which mpirun:\" &&
                which mpirun || echo \"mpirun not in PATH\"
              "
            '

          echo ""
          echo "MPI version verification complete on all containers"
          echo ""

      - name: Locate distributed worker path
        run: |
          echo "=== Locating distributed worker path in controller container ==="
          echo ""

          docker exec multihost-poc bash -c '
            cd /workspace
            source venv/activate

            echo "Checking possible locations for distributed worker binary:"
            echo ""

            # Possible paths to check
            PATHS=(
              "/workspace/venv/lib/python3.11/site-packages/pjrt_plugin_tt/bin/ttmlir/runtime/distributed/worker"
              "/workspace/venv/lib/python3.12/site-packages/pjrt_plugin_tt/bin/ttmlir/runtime/distributed/worker"
              "/workspace/venv/lib/python*/site-packages/pjrt_plugin_tt/bin/ttmlir/runtime/distributed/worker"
              "/opt/ttmlir-toolchain/runtime/distributed/worker"
            )

            FOUND_PATH=""
            for path in "${PATHS[@]}"; do
              # Use glob expansion for paths with wildcards
              for expanded_path in $path; do
                if [ -f "$expanded_path" ]; then
                  echo "✓ Found: $expanded_path"
                  if [ -z "$FOUND_PATH" ]; then
                    FOUND_PATH="$expanded_path"
                  fi
                else
                  echo "✗ Not found: $expanded_path"
                fi
              done
            done

            echo ""
            if [ -n "$FOUND_PATH" ]; then
              echo "Will use: $FOUND_PATH"
              echo "DISTRIBUTED_WORKER_PATH=$FOUND_PATH" > /tmp/worker_path_env
            else
              echo "WARNING: No distributed worker binary found!"
              exit 1
            fi
          '

          echo ""
          echo "Distributed worker path located"
          echo ""

      - name: Verify containers via mpirun
        run: |
          echo "=== Checking docker ps on all hosts ==="
          echo ""

          echo "Docker ps output:"
          mpirun --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --tag-output \
            bash -c 'echo "=== $(hostname) ==="; docker ps --filter name=multihost-poc'
          echo ""
          echo ""

          echo "Verification complete!"
          echo ""

      - name: Hostname diagnostic
        run: |
          echo "=== Hostname diagnostic ==="
          echo ""

          echo "--- Bare-metal hostnames (MPI view) ---"
          mpirun --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --tag-output \
            bash -c 'echo "bare-metal: $(hostname)"'
          echo ""

          echo "--- Container hostnames (docker exec view) ---"
          mpirun --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --tag-output \
            bash -c 'docker exec multihost-poc hostname'
          echo ""

          echo "--- Container gethostname() via Python ---"
          mpirun --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --tag-output \
            bash -c 'docker exec multihost-poc python3 -c "import socket; print(\"python gethostname:\", socket.gethostname())"'
          echo ""

          echo "--- /etc/hostname inside each container ---"
          mpirun --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --tag-output \
            bash -c 'docker exec multihost-poc cat /etc/hostname'
          echo ""

          echo "Hostname diagnostic complete"
          echo ""

      - name: TT device smoketest in each container
        run: |
          echo "=== TT device smoketest in all containers ==="
          echo ""

          mpirun --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --tag-output \
            --allow-run-as-root \
            bash -c '
              docker exec multihost-poc bash -c "
                cd /workspace &&
                source venv/activate &&
                pip install tt-smi -q &&
                tt-smi -s || true &&
                python -c \"import torch_xla.runtime as xr; xr.set_device_type(\\\"TT\\\"); import torch_xla; print(torch_xla.device())\"
              "
            '

          echo ""
          echo "Smoketest complete"
          echo ""

      - name: Install build dependencies for tt-metal
        if: ${{ inputs.test_metal }}
        run: |
          echo "=== Installing build dependencies ==="
          echo ""

          docker exec multihost-poc bash -c '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y gcc-12 g++-12

            # Set GCC-12 as the default compiler
            update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
            update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
            update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-12 100
            update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-12 100

            # Verify GCC version
            gcc --version
          '

          echo ""
          echo "Build dependencies installed"
          echo ""

      - name: Checkout and build tt-metal tests
        if: ${{ inputs.test_metal }}
        run: |
          echo "=== Checking out and building tt-metal tests ==="
          echo ""

          docker exec multihost-poc bash -c '
            cd /workspace
            if [ -d "tt-metal/.git" ]; then
              echo "tt-metal directory exists, pulling latest changes..."
              cd tt-metal
              git fetch origin
              git checkout main
              git pull
              git submodule update --init --recursive
            else
              echo "Cloning tt-metal repository..."
              git clone --recurse-submodules https://github.com/tenstorrent/tt-metal.git
              git checkout jzx/dual_t3k
              cd tt-metal
            fi

            echo ""
            echo "Configuring CMake..."
            cmake -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DTT_METAL_BUILD_TESTS=ON \
              -DWITH_PYTHON_BINDINGS=OFF \
              -DBUILD_PROGRAMMING_EXAMPLES=OFF \
              -DTTNN_BUILD_TESTS=OFF \
              -DBUILD_TT_TRAIN=OFF \
              -DENABLE_TRACY=OFF

            echo ""
            echo "Building test targets..."
            cmake --build build --target test_physical_discovery -j$(nproc)
            cmake --build build --target run_cluster_validation -j$(nproc)
            cmake --build build --target test_tt_fabric -j$(nproc)
          '

          echo ""
          echo "tt-metal tests built successfully"
          echo ""

      - name: Run tt-metal smoketests on controller container
        if: ${{ inputs.test_metal }}
        run: |
          echo "=== Running tt-metal smoketests (single container) ==="
          echo ""

          docker exec multihost-poc bash -c '
            cd /workspace/tt-metal

            # Enable metal logging
            export TT_METAL_LOGGER_LEVEL=DEBUG
            export TT_METAL_LOGGER_TYPES=Fabric,Always

            echo "Listing dependencies of tests"
            ldd ./build/test/tt_metal/tt_fabric/test_physical_discovery
            ldd ./build/tools/scaleout/run_cluster_validation

            echo ""
            echo "Running test_physical_discovery - PhysicalDiscovery tests..."
            ./build/test/tt_metal/tt_fabric/test_physical_discovery \
              --gtest_filter="PhysicalDiscovery.*" || true

            echo ""
            echo "Running test_physical_discovery - PhysicalMappingGeneration.Generate2x4SliceToPCIeDeviceMapping..."
            ./build/test/tt_metal/tt_fabric/test_physical_discovery \
              --gtest_filter="PhysicalMappingGeneration.Generate2x4SliceToPCIeDeviceMapping" || true

            echo ""
            echo "Running run_cluster_validation..."
            ./build/tools/scaleout/run_cluster_validation --print-connectivity --send-traffic || true

            echo "Skipping test_tt_fabric routing microbenchmark... since it dies and will break the device"
          '

          echo ""
          echo "tt-metal smoketests (single container) complete"
          echo ""

      - name: Run tt-metal smoketests with mpirun (multi-host)
        if: ${{ inputs.test_metal }}
        run: |
          echo "=== Running tt-metal smoketests with mpirun across hosts ==="
          echo ""

          docker exec multihost-poc bash -c '
            cd /workspace/tt-metal

            # MPI configuration for multi-host
            mpi_args="--hostfile /etc/mpirun/hostfile"
            mpirun_args="$mpi_args --mca btl_tcp_if_exclude docker0,lo --mca plm_rsh_agent /workspace/tests/torch/multi_host/experimental/remote_docker.sh --tag-output --allow-run-as-root"

            # Set environment variables
            export TT_METAL_HOME=/workspace/tt-metal
            export LD_LIBRARY_PATH=/workspace/tt-metal/build/lib
            export TT_METAL_LOGGER_LEVEL=DEBUG
            export TT_METAL_LOGGER_TYPES=Fabric,Always

            echo ""
            echo "Running test_physical_discovery with mpirun (PhysicalDiscovery tests)..."
            mpirun $mpirun_args \
              -x TT_METAL_HOME=$TT_METAL_HOME \
              -x LD_LIBRARY_PATH=$LD_LIBRARY_PATH \
              -x TT_METAL_LOGGER_LEVEL=$TT_METAL_LOGGER_LEVEL \
              -x TT_METAL_LOGGER_TYPES=$TT_METAL_LOGGER_TYPES \
              ./build/test/tt_metal/tt_fabric/test_physical_discovery \
              --gtest_filter="PhysicalDiscovery.*" || true

            echo ""
            echo "Running test_physical_discovery with mpirun (PhysicalMappingGeneration.Generate2x4SliceToPCIeDeviceMapping)..."
            mpirun $mpirun_args \
              -x TT_METAL_HOME=$TT_METAL_HOME \
              -x LD_LIBRARY_PATH=$LD_LIBRARY_PATH \
              -x TT_METAL_LOGGER_LEVEL=$TT_METAL_LOGGER_LEVEL \
              -x TT_METAL_LOGGER_TYPES=$TT_METAL_LOGGER_TYPES \
              ./build/test/tt_metal/tt_fabric/test_physical_discovery \
              --gtest_filter="PhysicalMappingGeneration.Generate2x4SliceToPCIeDeviceMapping" || true

            echo ""
            echo "Running run_cluster_validation with mpirun..."
            mpirun $mpirun_args \
              -x TT_METAL_HOME=$TT_METAL_HOME \
              -x LD_LIBRARY_PATH=$LD_LIBRARY_PATH \
              -x TT_METAL_LOGGER_LEVEL=$TT_METAL_LOGGER_LEVEL \
              -x TT_METAL_LOGGER_TYPES=$TT_METAL_LOGGER_TYPES \
              ./build/tools/scaleout/run_cluster_validation --print-connectivity --send-traffic || true

            echo ""
            echo "Skipping test_tt_fabric routing microbenchmark with mpirun... needs ttrun env forwarding"
          '

          echo ""
          echo "tt-metal mpirun smoketests complete"
          echo ""

      - name: ttrun smoketests - hostname
        run: |
          echo "=== ttrun smoketest: hostname ==="
          echo ""

          docker exec multihost-poc bash -c '
            cd /workspace
            source venv/activate

            cd /workspace/venv/lib/python3.12/site-packages/pjrt_plugin_tt/tt-metal && \
            ./ttnn/ttnn/distributed/ttrun.py \
              --rank-binding "/workspace/venv/lib/python3.12/site-packages/pjrt_plugin_tt/tt-metal/tests/tt_metal/distributed/config/dual_t3k_rank_bindings.yaml" \
              --mpi-args " --host f10cs03,f10cs04 --mca btl self,tcp --mca plm_rsh_agent /workspace/tests/torch/multi_host/experimental/remote_docker.sh --tag-output --allow-run-as-root " \
              bash -c "hostname"
          '

          echo ""
