name: Update Test Durations

# This workflow updates test durations based on the latest nightly, weekly, weekly training and push workflow runs.
# It processes the JUnit XML reports from the last successful nightly, weekly, weekly training and push workflows,
# calculates the test durations, and creates a pull request to update the `.test_durations` file.

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  id-token: write
  packages: write
  checks: write

jobs:
  update_test_durations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch results
        id: prev-perf-1
        uses: ./.github/actions/superset-api
        with:
          query: 'benchmarks/last_measurement'
          query_params: '{"project":"tt-forge/tt-xla","display_name":"vllm_vllm_tp_benchmark[qwen3-8b-tp]","github_pipeline_id":"26856602015","arch":"wormhole_llmbox","device_type":"n300-llmbox"}'

      - name: Display response
        shell: bash
        run: |
          echo "Response"
          echo ${{ steps.prev-perf-1.outputs.response}}

      - name: Fetch results 2
        id: prev-perf-2
        uses: ./.github/actions/superset-api
        with:
          query: 'benchmarks/last_measurement'
          query_params: '{"project":"tt-forge/tt-xla","display_name":"vllm_vllm_tp_benchmark[qwen3-8b-tp]","github_pipeline_id":"26856602015","arch":"wormhole_llmbox"}'

      - name: Display response 2
        shell: bash
        run: |
          echo "Response"
          echo ${{ steps.prev-perf-2.outputs.response}}

      - name: Fetch results 3
        id: prev-perf-3
        uses: ./.github/actions/superset-api
        with:
          query: 'benchmarks/last_measurement'
          query_params: '{"project":"tt-forge/tt-xla","display_name":"vllm_vllm_tp_benchmark[qwen3-8b-tp]","github_pipeline_id":"26856602015"}'

      - name: Display response 3
        shell: bash
        run: |
          echo "Response"
          echo ${{ steps.prev-perf-3.outputs.response}}
