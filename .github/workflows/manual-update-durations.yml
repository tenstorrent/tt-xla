name: Update Test Durations

# This workflow updates test durations based on the latest nightly, weekly, weekly training and push workflow runs.
# It processes the JUnit XML reports from the last successful nightly, weekly, weekly training and push workflows,
# calculates the test durations, and creates a pull request to update the `.test_durations` file.

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  find-tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.find.outputs.tag_name }}
    steps:
      - name: Find latest nightly release tag
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list -R tenstorrent/tt-xla --limit 20 --json tagName \
            | jq -r '[.[] | select(.tagName | test("^[0-9]+\\.[0-9]+\\.[0-9]+\\.dev[0-9]+$"))] | .[0].tagName')
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT

      - name: Log out the tag
        shell: bash
        run: |
          tag=${{ steps.find.outputs.tag_name }}
          echo "tag=$tag"
