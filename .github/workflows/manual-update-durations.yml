          docker exec multihost-poc bash -c '
            cd /workspace
            source venv/activate

            # Load the distributed worker path
            source /tmp/worker_path_env

            echo "Configuring distributed runtime environment..."
            export TTXLA_LOGGER_LEVEL=DEBUG
            export TT_DISTRIBUTED_WORKER_PATH="$DISTRIBUTED_WORKER_PATH"
            export TT_RUNTIME_ENABLE_DISTRIBUTED=1
            export TT_DISTRIBUTED_RANK_BINDING=dual_t3k
            export TT_DISTRIBUTED_CONTROLLER_HOST_NAME=f10cs03
            # export TT_DISTRIBUTED_HOSTS_LIST=f10cs03,f10cs04
            export TT_DISTRIBUTED_HOSTS_FILE=/etc/mpirun/hostfile
            export TT_DISTRIBUTED_PLM_RSH_AGENT=/workspace/tests/torch/multi_host/experimental/remote_docker.sh
            export TT_METAL_LOGGER_LEVEL=DEBUG
            export TT_METAL_LOGGER_TYPES=Fabric,Always

            echo ""
            echo "Environment configured:"
            echo "  TT_DISTRIBUTED_WORKER_PATH: $TT_DISTRIBUTED_WORKER_PATH"
            echo "  TT_DISTRIBUTED_CONTROLLER_HOST_NAME: $TT_DISTRIBUTED_CONTROLLER_HOST_NAME"
            echo "  TT_DISTRIBUTED_HOSTS_FILE: $TT_DISTRIBUTED_HOSTS_FILE"
            echo "  TT_DISTRIBUTED_RANK_BINDING: $TT_DISTRIBUTED_RANK_BINDING"
            echo ""

            echo "Running test: test_simple_sharded_addition"
            pytest -svv tests/torch/graphs/test_tensor_persistence.py::test_simple_sharded_addition
          '

          echo ""
          echo "Test execution complete"
          echo ""

      - name: Fix workspace permissions
        if: always()
        run: |
          echo "=== Restoring workspace ownership ==="
          # Spin up a throwaway container to chown as root. This does NOT rely on
          # multihost-poc being present: that container may already be gone (--rm removes
          # it on stop) or may never have started (e.g. checkout failed this run).
          # Because the workspace is NFS-shared, one chown from the controller covers
          # files created by both controller and worker containers.
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/tenstorrent/tt-xla/tt-xla-ci-ubuntu-22-04:latest \
            chown -R "$(id -u):$(id -g)" /workspace || true
          echo "Workspace ownership restored"

      - name: Cleanup
        if: always()
        run: |
          echo "=== Cleaning up containers and SSH agents on all hosts ==="
          # Note: Containers are created with --rm flag, which automatically removes them when stopped.
          # The docker rm command will fail with No such container - this is expected and harmless.
          mpirun --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --tag-output \
            bash -c '
            docker stop multihost-poc || true
            docker rm multihost-poc || true
            if [ -f /tmp/ssh_agent_env ]; then
              source /tmp/ssh_agent_env
              kill $SSH_AGENT_PID || true
              rm /tmp/ssh_agent_env
            fi
            echo "$(hostname): Cleanup complete"
            '
          echo "Cleanup complete"
