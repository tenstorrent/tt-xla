name: Update Test Durations

# This workflow updates test durations based on the latest nightly, weekly, weekly training and push workflow runs.
# It processes the JUnit XML reports from the last successful nightly, weekly, weekly training and push workflows,
# calculates the test durations, and creates a pull request to update the `.test_durations` file.

on:
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC
  contents: read    # Required for checking out code

jobs:
  call_api:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code # only needed when using action in same repo
        uses: actions/checkout@v3

      - name: Call Superset API
        id: api-call
        uses: ./.github/actions/superset-api
        with:
          query: 'benchmarks/last_measurement'
          query_params: '{"project":"tt-forge/tt-xla","display_name":"swin","github_pipeline_id":"24642681050","arch":"wormhole"}'

      - name: Display Response
        run: |
          echo "API Response:"
          echo '${{ steps.api-call.outputs.response }}'

      - name: Create Job Summary
        run: |
          echo "# Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| ------ | ----- |" >> $GITHUB_STEP_SUMMARY

          # Parse the JSON and create table rows
          echo '${{ steps.api-call.outputs.response }}' | jq -r '.[] | "| " + .NAME + " | " + (.LAST_VALUE | tostring) + " |"' >> $GITHUB_STEP_SUMMARY
