name: Compile Only

# Draft of workflow for testing the CPU compile-only feature.
# TODO: Review other ways to integrate into already made infra
# Things to consider

on:
  workflow_dispatch:

permissions:
  actions: write
  packages: write
  checks: write
  contents: read

jobs:
  build-image:
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit
    with:
      dockbuild: ci

  build-ttxla:
    needs: build-image
    uses: ./.github/workflows/call-build.yml
    secrets: inherit
    with:
      docker_image: ${{ needs.build-image.outputs.docker-image }}
      docker_image_manylinux: ${{ needs.build-image.outputs.docker-image-manylinux }}
      build_types: release

  generate:
    # Consider checking schema hash of system descriptors against latest commits for updating static files
    needs: [ build-image, build-ttxla ]
    strategy:
      fail-fast: false
      matrix:
        arch: [ n150, n300, n300-llmbox ] # TODO: add p150 static file
    runs-on: [ "${{ matrix.arch }}", "in-service" ]
    container:
      image: ${{ needs.build-image.outputs.docker-image-base }}
      options: --device /dev/tenstorrent
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /etc/udev/rules.d:/etc/udev/rules.d
        - /lib/modules:/lib/modules
        - /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env
        - /mnt/dockercache:/mnt/dockercache
    steps:
      - name: Mark repo as safe for git
        run: git config --global --add safe.directory /__w/tt-xla/tt-xla

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download and install wheel
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download ${{ needs.build-ttxla.outputs.artifacts_run_id }} \
            --repo ${{ github.repository }} \
            --dir wheels \
            --name xla-whl-release${{ needs.build-ttxla.outputs.artifact_suffix }}
          source venv/activate
          uv pip install wheels/*.whl

      - name: Save system descriptor
        shell: bash
        run: |
          source venv/activate
          cd tests/cpu_compile_only
          python save_system_desc.py save system_descs/${{ matrix.arch }}
          ls -la system_descs/

      - name: Upload descriptor
        uses: actions/upload-artifact@v4
        with:
          name: system-desc-${{ matrix.arch }}
          path: tests/cpu_compile_only/system_descs/${{ matrix.arch }}_system_desc.ttsys

  test-compile-cpu:
    needs: [ build-image, build-ttxla, generate ]
    runs-on: n150 # TODO: Move to CPU-Only when ready
    container:
      image: harbor.ci.tenstorrent.net/${{ needs.build-image.outputs.docker-image-base }}
    steps:
      - name: Mark repo as safe for git
        run: git config --global --add safe.directory /__w/tt-xla/tt-xla

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download and install wheel
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download ${{ needs.build-ttxla.outputs.artifacts_run_id }} \
            --repo ${{ github.repository }} \
            --dir wheels \
            --name xla-whl-release${{ needs.build-ttxla.outputs.artifact_suffix }}
          source venv/activate
          uv pip install wheels/*.whl

      - name: Download generated descriptors
        uses: actions/download-artifact@v4
        with:
          pattern: system-desc-*
          merge-multiple: true
          path: tests/cpu_compile_only/system_descs

      - name: Run cpu-compile-only test 
        shell: bash
        run: |
          source venv/activate
          ls -la tests/cpu_compile_only/system_descs/
          pytest -svv tests/cpu_compile_only

