# This workflow proactively tests tt-xla against the latest transformers from main.
# If failures occur, it uses Claude Code CLI to auto-generate compatibility fixes
# and opens a PR for human review.

name: Transformers Compatibility Check

on:
  push:
    branches:
      - jazpur/aknezevic/hf_uplift  # TODO: Remove before merging to main
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      transformers_ref:
        description: 'Git ref for transformers (branch, tag, or SHA). Defaults to main.'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write
  packages: write
  checks: write
  pull-requests: write
  actions: write
  id-token: write

concurrency:
  group: transformers-compat
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ github.token }}
  TTMLIR_TOOLCHAIN_DIR: /opt/ttmlir-toolchain
  TT_XLA_CI: 1

jobs:

  # ── Job 1: Build Docker image ─────────────────────────────────────────
  build-image:
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit

  # ── Job 2: Build tt-xla wheel ─────────────────────────────────────────
  build-ttxla:
    uses: ./.github/workflows/call-build.yml
    name: "Build tt-xla"
    secrets: inherit
    needs: build-image
    with:
      docker_image: ${{ needs.build-image.outputs.docker-image }}

  # ── Job 3: Test with latest transformers, auto-fix on failure ──────────
  test-and-fix:
    needs: [build-image, build-ttxla]

    runs-on:
      - n150
      - in-service

    name: "compat-test (n150, torch models)"

    outputs:
      fix-branch: ${{ steps.create-branch.outputs.branch_name }}
      new-release: ${{ steps.check-version.outputs.new_release }}

    container:
      image: ${{ needs.build-image.outputs.docker-image-base }}
      options: --device /dev/tenstorrent
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /etc/udev/rules.d:/etc/udev/rules.d
        - /lib/modules:/lib/modules
        - /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env
        - /mnt/dockercache:/mnt/dockercache

    steps:
    - name: Mark repo as safe for git
      run: |
        git config --global --add safe.directory /__w/tt-xla/tt-xla
        git config --global --add safe.directory /__w/tt-xla/tt-xla/third_party/tt_forge_models

    - name: Log disk space
      run: df -h

    - name: Set caching env variables
      shell: bash
      run: echo "DOCKER_CACHE_ROOT=/mnt/dockercache" >> $GITHUB_ENV

    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        token: ${{ secrets.GH_TOKEN }}
        sparse-checkout: |
          .claude/skills
          .github/scripts
          .gitmodules
          .test_durations
          pjrt_implementation
          third_party/pjrt_c_api
          third_party/tt_forge_models
          pytest.ini
          python_package/requirements.txt
          integrations/vllm_plugin/requirements-vllm-plugin.txt
          tests
          venv
          examples

    - name: Fetch job id
      id: fetch-job-id
      uses: tenstorrent/tt-github-actions/.github/actions/job_id@main
      with:
        job_name: "compat-test (n150, torch models)"

    - name: Set reusable strings
      id: strings
      shell: bash
      env:
        JOB_ID: ${{ steps.fetch-job-id.outputs.job_id }}
      run: |
        echo "work-dir=$(pwd)" >> "$GITHUB_OUTPUT"
        echo "test_report_path=report_$JOB_ID.xml" >> "$GITHUB_OUTPUT"
        echo "perf_report_dir=$(pwd)/benchmark_reports" >> "$GITHUB_OUTPUT"

    - name: Download and install wheels
      shell: bash
      run: |
        echo "=== Downloading wheels ==="
        gh run download ${{ needs.build-ttxla.outputs.artifacts_run_id }} \
          --repo ${{ github.repository }} \
          --dir wheels \
          --name xla-whl-release${{ needs.build-ttxla.outputs.artifact_suffix }}
        echo "Downloaded wheel files:"
        ls -la wheels

        echo "=== Installing wheel ==="
        source venv/activate
        uv pip install wheels/*.whl

    - name: Extract and swap transformers to latest version
      id: check-version
      shell: bash
      run: |
        source venv/activate
        CURRENT_TTXLA_VERSION=$(python -c "import transformers; print(transformers.__version__)")
        echo "current_version=$CURRENT_TTXLA_VERSION" >> $GITHUB_OUTPUT
        echo "Current transformers version: $CURRENT_TTXLA_VERSION"

        LATEST_TAG=$(gh release view --repo huggingface/transformers --json tagName -q .tagName)
        LATEST_VERSION="${LATEST_TAG#v}"
        echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
        echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
        echo "Latest transformers release: $LATEST_TAG ($LATEST_VERSION)"

        if [[ "$CURRENT_TTXLA_VERSION" != "$LATEST_VERSION" ]]; then
          NEW_RELEASE=true
          echo "new_release=$NEW_RELEASE" >> $GITHUB_OUTPUT
        else
          NEW_RELEASE=false
          echo "new_release=$NEW_RELEASE" >> $GITHUB_OUTPUT
        fi

        uv pip uninstall transformers
        if [[ "$NEW_RELEASE" == "true" ]]; then
          TRANSFORMERS_REF="$LATEST_TAG"
        else
          TRANSFORMERS_REF="${{ inputs.transformers_ref || 'main' }}"
        fi
        echo "Installing transformers from git ref: $TRANSFORMERS_REF"
        echo "TRANSFORMERS_REF=$TRANSFORMERS_REF" >> $GITHUB_ENV
        uv pip install "transformers @ git+https://github.com/huggingface/transformers.git@${TRANSFORMERS_REF}"

    - name: Install System Deps
      shell: bash
      run: |
        apt-get update
        apt install -y libgl1 libglx-mesa0

    - name: Install Claude Code CLI
      shell: bash
      run: |
        curl -fsSL https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-x64.tar.xz | tar -xJ --strip-components=1 -C /usr/local/ || true
        npm install -g @anthropic-ai/claude-code

    - name: Create fix branch
      id: create-branch
      shell: bash
      run: |
        BRANCH_NAME="auto/transformers-compat-$(date +%Y%m%d-%H%M)"
        echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
        git checkout -b "$BRANCH_NAME"
        echo "Created branch: $BRANCH_NAME"

        if [[ "${{ steps.check-version.outputs.new_release }}" == "true" ]]; then
          sed -i "s/^transformers==.*/transformers==${{ steps.check-version.outputs.latest_version }}/" venv/requirements-dev.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add venv/requirements-dev.txt
          git commit -m "Update transformers version to ${{ steps.check-version.outputs.latest_version }}
          Co-Authored-By: Claude <noreply@anthropic.com>"

          git push origin "$BRANCH_NAME"
        fi

    # ── Claude Code: run tests, fix on failure, re-run ──
    - name: Run Claude Code
      timeout-minutes: 120
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        HF_HOME: /mnt/dockercache/huggingface
        TORCH_HOME: /mnt/dockercache/torchhub
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        ENABLE_BRINGUP_STAGE_LOGGING: 1
      shell: bash
      run: |
        unset GH_TOKEN
        claude -p "Run the transformers uplift. \
          Pass these CI flags to the first run: \
          --junitxml ${{ steps.strings.outputs.test_report_path }}" \
          --verbose \
          --allowedTools "Edit,Read,Glob,Grep,Write,Bash"

    - name: Revert any changes to third_party submodules
      shell: bash
      run: |
        CHANGED_FILES=$(git diff --name-only)
        if [ -z "$CHANGED_FILES" ]; then
          echo "No changes were made"
          exit 0
        fi

        echo "Changed files:"
        echo "$CHANGED_FILES"

        SUBMODULE_FILES=$(echo "$CHANGED_FILES" | grep "^third_party/" | grep -v "^third_party/tt_forge_models" || true)
        if [ -n "$SUBMODULE_FILES" ]; then
          echo "Reverting changes to third_party/ submodules:"
          echo "$SUBMODULE_FILES"
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              git checkout -- "$file" 2>/dev/null || true
            fi
          done <<< "$SUBMODULE_FILES"
        fi

    - name: Commit and push tt_forge_models changes
      id: check-forge-changes
      shell: bash
      run: |
        cd third_party/tt_forge_models

        if [ -z "$(git status --porcelain)" ]; then
          echo "has_forge_fix=false" >> $GITHUB_OUTPUT
          echo "No tt_forge_models changes"
          exit 0
        fi

        echo "has_forge_fix=true" >> $GITHUB_OUTPUT
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "Auto-fix: transformers compatibility (run ${{ inputs.current-run || 1 }} of ${{ inputs.max-runs || 2 }})

        Generated by Claude Code CLI in response to test failures
        when running against latest transformers from main.

        Co-Authored-By: Claude <noreply@anthropic.com>"
        git push origin "${{ steps.create-branch.outputs.branch_name }}"
        cd ../..

    - name: Check for changes, commit, and push
      id: check-changes
      shell: bash
      run: |
        if [ -z "$(git diff --name-only)" ]; then
          echo "has_fix=false" >> $GITHUB_OUTPUT
          echo "No fix was produced"
          exit 0
        fi

        echo "has_fix=true" >> $GITHUB_OUTPUT
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git diff --name-only | xargs git add --
        git commit -m "Auto-fix: transformers compatibility

        Generated by Claude Code CLI in response to test failures
        when running against latest transformers from main.

        Co-Authored-By: Claude <noreply@anthropic.com>"
        git push origin "${{ steps.create-branch.outputs.branch_name }}"

  new-release-model-passing-test:
    needs: [test-and-fix]
    if: ${{ needs.test-and-fix.outputs.new-release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger model passing test
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh workflow run manual-test.yml \
            --repo ${{ github.repository }} \
            --ref "${{ needs.test-and-fix.outputs.fix-branch }}" \
            -f test_suite=model-test-passing.json

      - name: Get triggered run URL
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          sleep 5
          RUN_URL=$(gh run list \
            --workflow=manual-test.yml \
            --repo ${{ github.repository }} \
            --branch "${{ needs.test-and-fix.outputs.fix-branch }}" \
            --limit 1 \
            --json url -q '.[0].url')
          echo "Triggered run: $RUN_URL"

  new-release-perf-benchmark-test:
    needs: [test-and-fix]
    if: ${{ needs.test-and-fix.outputs.new-release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger perf benchmark test
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh workflow run manual-benchmark.yml \
            --repo ${{ github.repository }} \
            --ref "${{ needs.test-and-fix.outputs.fix-branch }}"

      - name: Get triggered run URL
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          sleep 5
          RUN_URL=$(gh run list \
            --workflow=manual-benchmark.yml \
            --repo ${{ github.repository }} \
            --branch "${{ needs.test-and-fix.outputs.fix-branch }}" \
            --limit 1 \
            --json url -q '.[0].url')
          echo "Triggered run: $RUN_URL"

