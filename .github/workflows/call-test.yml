name: Test (call)

permissions:
  actions: write
  checks: write
  contents: read

on:
  workflow_call:
    inputs:
      docker_image:
        description: 'Docker image to use for the build'
        required: true
        type: string
      artifact_release_run_id:
        description: 'Run ID of the artifacts (release)'
        required: true
        type: string
      artifact_suffix:
        description: 'Suffix for the artifact name'
        required: false
        type: string
      wheel_build:
        description: 'Build to use for testing, e.g. release, manylinux'
        required: false
        type: string
        default: release
      test_suite:
        description: 'Test suite preset options or custom'
        required: true
        type: string
      test_suite_custom:
        description: 'Custom test suite json'
        required: false
        type: string
      include_passed:
        description: 'Include passed tests in the summary'
        required: false
        default: false
        type: boolean
      torchxla_build_run_id:
        description: 'Manual torch-xla build run ID'
        required: false
        type: string
        default: ''
      forge_models_override:
        description: 'Git SHA of commit (or branch name) in tenstorrent/tt-forge-models'
        required: false
        type: string
        default: ''

env:
  GH_TOKEN: ${{ github.token }} # for gh cli tool
  TTMLIR_TOOLCHAIN_DIR: /opt/ttmlir-toolchain # We don't actually need this, venv/activate expects this to be set
  TT_XLA_CI: 1
  TT_METAL_OPERATION_TIMEOUT_SECONDS: ${{ vars.TT_METAL_OPERATION_TIMEOUT_SECONDS || 300 }}
  TT_METAL_DISPATCH_TIMEOUT_COMMAND_TO_EXECUTE: "/opt/tt-triage-venv/bin/python -vvv /opt/tt-triage/tools/tt-triage.py 1>&2"

jobs:
  generate-matrix-test:
    uses: ./.github/workflows/call-generate-matrix.yml
    secrets: inherit
    with:
      test_suite: ${{ inputs.test_suite }}
      test_suite_custom: ${{ inputs.test_suite_custom }}

  # Run tests on TT hardware
  run-tests:
    needs: generate-matrix-test
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.generate-matrix-test.outputs.test_matrix) }}

    runs-on: ${{ matrix.build.runs-on }}

    # Keep this name in sync with the fetch-job-id step
    name: "test ${{ matrix.build.test-mark }} (${{ matrix.build.runs-on }}, ${{ matrix.build.name }}, ${{ strategy.job-index }})"

    container:
      image: ${{ !matrix.build.shared-runners && inputs.docker_image || format('harbor.ci.tenstorrent.net/{0}', inputs.docker_image) }}
      options: --device /dev/tenstorrent
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /etc/udev/rules.d:/etc/udev/rules.d
        - /lib/modules:/lib/modules
        - /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env
        - /mnt/dockercache:/mnt/dockercache

    steps:
    - name: Mark repo as safe for git
      run: |
        git config --global --add safe.directory /__w/tt-xla/tt-xla
        git config --global --add safe.directory /__w/tt-xla/tt-xla/third_party/tt_forge_models

    - name: Log disk space
      run: df -h

    - name: Set caching env variables
      shell: bash
      run: |
        shared_runners=${{ matrix.build.shared-runners }}
        if [[ "$shared_runners" == "" || "$shared_runners" == "false" ]]; then
          echo "DOCKER_CACHE_ROOT=/mnt/dockercache" >> $GITHUB_ENV
        else
          echo "IRD_LF_CACHE=${{ vars.IRD_LF_CACHE }}" >> $GITHUB_ENV
        fi

    - uses: actions/checkout@v6
      with:
        submodules: recursive
        sparse-checkout-cone-mode: false
        sparse-checkout: |
          .github/scripts/
          .gitmodules
          .test_durations
          pjrt_implementation/
          third_party/pjrt_c_api/
          pytest.ini
          python_package/requirements.txt
          integrations/vllm_plugin/requirements-vllm-plugin.txt
          tests/
          venv/
          examples/
          scripts/

    - name: Override tt_forge_models ref
      if: ${{ inputs.forge_models_override != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Resolve short SHAs/refs via GitHub API, fall back to raw input
        REF="${{ inputs.forge_models_override }}"
        RESOLVED=$(gh api repos/tenstorrent/tt-forge-models/commits/$REF --jq .sha 2>/dev/null || echo "$REF")
        cd third_party/tt_forge_models
        git fetch --depth=1 origin $RESOLVED
        git checkout FETCH_HEAD
        echo "tt_forge_models checked out at $(git rev-parse HEAD)"

    - name: Fetch job id
      id: fetch-job-id
      uses: tenstorrent/tt-github-actions/.github/actions/job_id@main
      with:
        job_name: "test ${{ matrix.build.test-mark }} (${{ matrix.build.runs-on }}, ${{ matrix.build.name }}, ${{ strategy.job-index }})"

    - name: Set reusable strings
      id: strings
      shell: bash
      env:
        JOB_ID: ${{ steps.fetch-job-id.outputs.job_id }}
      run: |
        echo "work-dir=$(pwd)" >> "$GITHUB_OUTPUT"
        echo "build-output-dir=$(pwd)/build" >> "$GITHUB_OUTPUT"
        echo "test_report_path=report_$JOB_ID.xml" >> "$GITHUB_OUTPUT"
        echo "perf_report_dir=$(pwd)/benchmark_reports" >> "$GITHUB_OUTPUT"
        # Override wheel_build to release if matrix.build.require is 'release' or 'alchemist'
        if [[ "${{ matrix.build.require }}" == "release" || "${{ matrix.build.require }}" == "alchemist" ]]; then
          echo "wheel_build=release" >> "$GITHUB_OUTPUT"
        else
          echo "wheel_build=${{ inputs.wheel_build }}" >> "$GITHUB_OUTPUT"
        fi
        echo "wheel_build=${{ inputs.wheel_build }}" >> "$GITHUB_OUTPUT"
        echo "wheel_artifact_name=xla-whl-${{ inputs.wheel_build }}${{ inputs.artifact_suffix }}" >> "$GITHUB_OUTPUT"
        echo "wheel_release_vllm_tt_artifact_name=vllm-tt-whl-release${{inputs.artifact_suffix}}" >> "$GITHUB_OUTPUT"
        echo "alchemist_artifact_name=alchemist-lib-release${{ inputs.artifact_suffix }}" >> "$GITHUB_OUTPUT"
        echo "artifact_run_id=${{ inputs.artifact_release_run_id }}" >> "$GITHUB_OUTPUT"

        # Precompute forge models detection as a reusable output
        if [[ "${{ matrix.build.dir }}" == *"tests/runner/test_models.py"* ]]; then
          echo "forge-models-test=true" >> "$GITHUB_OUTPUT"
        else
          echo "forge-models-test=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Download and install wheels
      shell: bash
      run: |
        echo "=== Downloading wheels ==="
        echo "Downloading wheel from: ${{ github.repository }} run_id ${{ steps.strings.outputs.artifact_run_id }} name ${{ steps.strings.outputs.wheel_artifact_name }}"
        gh run download ${{ steps.strings.outputs.artifact_run_id }} \
          --repo ${{ github.repository }} \
          --dir wheels \
          --pattern "${{ steps.strings.outputs.wheel_artifact_name }}*"
        if [[ "${{ matrix.build.name }}" == "run_vllm_n150_tests" || \
              "${{ matrix.build.name }}" == "run_vllm_n300_tests" || \
              "${{ matrix.build.name }}" == "run_vllm_llmbox_tests" ]]; then
          echo "Downloading wheel from: ${{ github.repository }} run_id ${{ steps.strings.outputs.artifact_run_id }} name ${{ steps.strings.outputs.wheel_release_vllm_tt_artifact_name }}"
          gh run download ${{ steps.strings.outputs.artifact_run_id }} \
            --repo ${{ github.repository }} \
            --dir wheels \
            --name ${{ steps.strings.outputs.wheel_release_vllm_tt_artifact_name }}
        fi
        echo "Downloaded wheel files:"
        ls -la wheels

        echo "=== Installing wheel ==="
        source venv/activate
        uv pip install wheels/*/*.whl

    - name: Install custom torch_xla from workflow run
      if: ${{ inputs.torchxla_build_run_id != '' }}
      shell: bash
      run: |
        echo "Using custom torchxla install from run ${{ inputs.torchxla_build_run_id }}"
        gh run download ${{ inputs.torchxla_build_run_id }} --repo ${{ github.repository }}
        source venv/activate
        uv pip install --force-reinstall xla-torch-wheel-release/*.whl
        uv pip show torch_xla

    - name: Download and setup alchemist library
      if: ${{ matrix.build.require == 'alchemist' }}
      shell: bash
      run: |
        if [[ -n "${{ steps.strings.outputs.alchemist_artifact_name }}" ]]; then
          echo "=== Downloading alchemist artifact ==="
          mkdir -p alchemist_artifact
          gh run download ${{ steps.strings.outputs.artifact_run_id }} \
            --repo ${{ github.repository }} \
            --dir alchemist_artifact \
            --name ${{ steps.strings.outputs.alchemist_artifact_name }} || echo "Alchemist artifact not found, codegen tests will be skipped"
          # Set up the directory structure that venv/activate expects for TT_MLIR_HOME
          mkdir -p third_party/tt-mlir/src/tt-mlir/build
          if [[ -d alchemist_artifact/lib ]]; then
            mv alchemist_artifact/lib third_party/tt-mlir/src/tt-mlir/build/
          fi
          if [[ -d alchemist_artifact/tools ]]; then
            mv alchemist_artifact/tools third_party/tt-mlir/src/tt-mlir/build/
          fi
        fi

    - name: Install Docker CLI
      if: ${{ matrix.build.multihost }}
      run: |
        # Switch apt sources away from archive.ubuntu.com / security.ubuntu.com
        # to mirror.math.princeton.edu for improved reliability/throughput.
        sudo sed -i \
          -e 's|http://archive.ubuntu.com/ubuntu|http://mirror.math.princeton.edu/pub/ubuntu|g' \
          -e 's|http://security.ubuntu.com/ubuntu|http://mirror.math.princeton.edu/pub/ubuntu|g' \
          /etc/apt/sources.list
        if [ -d /etc/apt/sources.list.d ]; then
          sudo find /etc/apt/sources.list.d -type f \( -name '*.list' -o -name '*.sources' \) -exec sed -i \
            -e 's|http://archive.ubuntu.com/ubuntu|http://mirror.math.princeton.edu/pub/ubuntu|g' \
            -e 's|http://security.ubuntu.com/ubuntu|http://mirror.math.princeton.edu/pub/ubuntu|g' \
            {} +
        fi
        curl -fsSL https://get.docker.com | sh

    - name: Start multihost controller container
      if: ${{ matrix.build.multihost }}
      shell: bash
      run: |
        DOCKER_IMAGE="${{ !matrix.build.shared-runners && inputs.docker_image || format('harbor.ci.tenstorrent.net/{0}', inputs.docker_image) }}"

        docker run --pull=never --rm -d \
          --name ubuntu-host-mapped \
          --privileged --pid=host --network=host \
          --device /dev/tenstorrent \
          -v /dev/hugepages:/dev/hugepages \
          -v /dev/hugepages-1G:/dev/hugepages-1G \
          -v /etc/udev/rules.d:/etc/udev/rules.d \
          -v /lib/modules:/lib/modules \
          -v /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env \
          -v /mnt/dockercache:/mnt/dockercache \
          -v /etc/mpirun:/etc/mpirun:ro \
          -v /var/run/mpirun/id_rsa_multihost_ssh_agent_sock:/var/run/mpirun/id_rsa_multihost_ssh_agent_sock \
          -e SSH_AUTH_SOCK=/var/run/mpirun/id_rsa_multihost_ssh_agent_sock \
          -v ${{ github.workspace }}:${{ steps.strings.outputs.work-dir }} \
          -w ${{ steps.strings.outputs.work-dir }} \
          "$DOCKER_IMAGE" sleep infinity

    - name: Start multihost worker containers via mpirun
      if: ${{ matrix.build.multihost }}
      shell: bash
      run: |
        DOCKER_IMAGE="${{ !matrix.build.shared-runners && inputs.docker_image || format('harbor.ci.tenstorrent.net/{0}', inputs.docker_image) }}"

        # Launch containers on all hosts idempotently (controller already running, will skip)
        docker exec \
          -e DOCKER_IMAGE="$DOCKER_IMAGE" \
          -e HOST_WORKSPACE_PATH="${{ github.workspace }}" \
          -e IN_CONTAINER_WORKSPACE="${{ steps.strings.outputs.work-dir }}" \
          ubuntu-host-mapped bash -c '
          mpirun --allow-run-as-root --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --mca plm_rsh_agent "ssh -A -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -l ubuntu" \
            --tag-output \
            bash -c "
              CONTAINER_NAME=ubuntu-host-mapped
              if docker ps --filter name=\$CONTAINER_NAME --format \"{{.Names}}\" | grep -q \$CONTAINER_NAME; then
                echo \"\$(hostname): Container already running, skipping\"
              else
                docker run --pull=always --rm -d \
                  --name \$CONTAINER_NAME --privileged --pid=host --network=host \
                  --device /dev/tenstorrent \
                  -v /dev/hugepages:/dev/hugepages \
                  -v /dev/hugepages-1G:/dev/hugepages-1G \
                  -v /etc/udev/rules.d:/etc/udev/rules.d \
                  -v /lib/modules:/lib/modules \
                  -v /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env \
                  -v /mnt/dockercache:/mnt/dockercache \
                  -v /etc/mpirun:/etc/mpirun:ro \
                  -v $HOST_WORKSPACE_PATH:$IN_CONTAINER_WORKSPACE \
                  -w $IN_CONTAINER_WORKSPACE \
                  $DOCKER_IMAGE sleep infinity
                echo \"\$(hostname): Container started\"
              fi
            "
        '
        echo "All multihost containers ready"
    # - name: Hang for now
    #   shell: bash
    #   run: |
    #     echo "Hanging for offline debug"
    #     sleep infinity

    - name: SSH connectivity check to worker containers
      if: ${{ matrix.build.multihost }}
      shell: bash
      run: |
        docker exec ubuntu-host-mapped bash -c '
          echo "=== SSH connectivity check (via ssh) ==="
          mpirun --allow-run-as-root --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --mca plm_rsh_agent "ssh -A -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -l ubuntu" \
            --tag-output \
            bash -c "
              echo \"\$(hostname): hostname OK\"
              if [ -f /.dockerenv ]; then
                echo \"\$(hostname): /.dockerenv EXISTS (running inside container)\"
              else
                echo \"\$(hostname): /.dockerenv NOT FOUND (running on bare metal)\"
              fi
            "
          echo "=== End SSH connectivity check (via ssh) ==="

          echo "=== SSH connectivity check (via remote_docker.sh) ==="
          ls -la ${{ steps.strings.outputs.work-dir }}/tests/torch/multi_host/experimental/remote_docker.sh
          chmod +x ${{ steps.strings.outputs.work-dir }}/tests/torch/multi_host/experimental/remote_docker.sh
          mpirun --allow-run-as-root --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --mca plm_rsh_agent ${{ steps.strings.outputs.work-dir }}/tests/torch/multi_host/experimental/remote_docker.sh \
            --tag-output \
            bash -c "
              echo \"\$(hostname): hostname OK\"
              if [ -f /.dockerenv ]; then
                echo \"\$(hostname): /.dockerenv EXISTS (running inside container)\"
              else
                echo \"\$(hostname): /.dockerenv NOT FOUND (running on bare metal)\"
              fi
            "
          echo "=== End SSH connectivity check (via remote_docker.sh) ==="
        '

    - name: Check for re-run attempt
      id: check-rerun-attempt
      shell: bash
      run: |
        source venv/activate
        rm -f .pytest_tests_to_run
        if [ "${{ github.run_attempt }}" -gt 1 ]; then
          echo "Rerun attempt detected"
          attempt=$((${{ github.run_attempt }} - 1))
          rm -rf old-reports
          mkdir old-reports
          set +e
          result=1
          while [ $attempt -ge 1 ]; do
            echo "Downloading test reports from attempt $attempt"
            gh run download ${{ github.run_id }} \
              --repo ${{ github.repository }} \
              --pattern "test-reports-${{ needs.generate-matrix-test.outputs.test_matrix_hash }}-$attempt.${{ strategy.job-index }}-*" \
              -D old-reports
            result=$?
            if [ $result -eq 0 ]; then
              break
            fi
            attempt=$((attempt - 1))
          done
          if [ $result -ne 0 ]; then
            echo "No previous test reports found"
          else
            echo "Found test reports from attempt $attempt"
            python .github/scripts/find_all_failed_tests.py old-reports
            if [ -f ".pytest_tests_to_run" ]; then
              echo "There are tests to rerun"
              echo "rerun_attempt=true" >> "$GITHUB_OUTPUT"
            else
              echo "All tests will rerun"
            fi
          fi
        else
          echo "First attempt"
        fi

    - name: Set pytest command
      shell: bash
      run: |
        # NOTE: Torch tests must be run in separate processes to avoid current issues with test isolation
        # See issue: https://github.com/tenstorrent/tt-xla/issues/795
        PYTEST_FORKED=""
        for n in run_torch run_large_jax_models run_forge_models run_forge_models_llm run_forge_models_llm_multichip run_forge_models_torch run_jax_training run_large_jax_training extended_models run_large_torch_models; do
          if [[ "${{ matrix.build.name }}" == "$n" ]]; then
            PYTEST_FORKED="--forked"; break
          fi
        done

        # Set verbosity: default to -sv, switch to -vv when forking to get progress percentage
        if [[ -n "$PYTEST_FORKED" ]]; then
          VERBOSITY="-vv"
        else
          VERBOSITY="-sv"
        fi

        # Pass arch to forge models tests to resolve arch_overrides in test_config files.
        ARCH=""
        if [[ "${{ steps.strings.outputs.forge-models-test }}" == "true" ]]; then
          ARCH="--arch ${{ matrix.build['runs-on-original'] || matrix.build.runs-on }}"
        fi

        MARKS="${{ matrix.build.test-mark }}"

        if [ "${{ steps.check-rerun-attempt.outputs.rerun_attempt }}" == "true" ]; then
          echo "Only running previously failed tests"
          PYTEST_SPLITS=""
        else
          echo "Running all tests"
          PYTEST_SPLITS="--splits ${{ matrix.build.parallel-groups || 1}} \
            --group ${{ matrix.build.group-id || 1}} \
            --splitting-algorithm least_duration"
        fi

        # Use -m '...' not -m "..." so BASE_PYTEST_CMD does not nest double quotes inside FULL_PYTEST_CMD="...".
        BASE_PYTEST_CMD="$PYTEST_FORKED --log-memory \
          --durations=0 \
          ${{ matrix.build.dir }} \
          $ARCH \
          -m '${MARKS}' ${{ matrix.build.args }} \
          -k "$(printf '%q' '${{ matrix.build.contains }}')" \
          $PYTEST_SPLITS"

        echo "BASE_PYTEST_CMD=$BASE_PYTEST_CMD" >> $GITHUB_ENV
        echo "VERBOSITY=$VERBOSITY" >> $GITHUB_ENV

    - name: Install System Deps for Forge Models Tests
      if: ${{ steps.strings.outputs.forge-models-test == 'true' }}
      shell: bash
      run: |
        apt-get update
        apt install -y libgl1 libglx-mesa0

    # Ensure test_config files for tt-forge-models test are valid, especially on PR's for uplifting tt-forge-models
    # but still run tests even in case of failure here, will still treat overall job as failed.
    - name: Validate Forge Models Tests test config file
      if: ${{ steps.strings.outputs.forge-models-test == 'true' && strategy.job-index == 0 && inputs.forge_models_override == '' }}
      shell: bash
      run: |
        source venv/activate
        uv pip install pyyaml
        python3 tests/runner/validate_test_config.py

    - name: Collect Tests
      id: collect-tests
      shell: bash
      run: |
        source venv/activate
        echo "Collecting tests for group ${{ matrix.build.group-id || 1}}..."
        python -m pytest --collect-only -q --disable-warnings ${{ env.BASE_PYTEST_CMD }} 2>&1 | tee collected_tests.txt

        # Check if any collected tests have notimeout marker
        NOTIMEOUT_COUNT=$(python -m pytest --collect-only -q --disable-warnings -m notimeout $(grep "::" collected_tests.txt | tr '\n' ' ') 2>/dev/null | grep -c "::" || echo "0")
        if [[ "$NOTIMEOUT_COUNT" -gt 0 ]]; then
          echo "Found $NOTIMEOUT_COUNT tests with notimeout marker, using default timeout of 240 minutes"
          ESTIMATED_DURATION=240
        else
          SCRIPT_OUTPUT=$(python .github/scripts/calculate_test_timeout.py \
            --collected-output collected_tests.txt \
            --durations-file .test_durations \
            --default-timeout 240)
          echo "$SCRIPT_OUTPUT"
          ESTIMATED_DURATION=$(echo "$SCRIPT_OUTPUT" | tail -n 1)
        fi

        echo "Estimated duration: $ESTIMATED_DURATION minutes"
        echo "timeout-minutes=$ESTIMATED_DURATION" >> "$GITHUB_OUTPUT"

    - name: Prepare vLLM test dependencies
      if: ${{ matrix.build.name == 'run_vllm_n150_tests' || matrix.build.name == 'run_vllm_n300_tests' || matrix.build.name == 'run_vllm_llmbox_tests' }}
      shell: bash
      run: |
        source venv/activate
        uv pip install -r $(pwd)/integrations/vllm_plugin/requirements-vllm-plugin.txt
        uv pip freeze

    - name: Generate pytest command
      shell: bash
      run: |
        FULL_PYTEST_CMD="python -m pytest ${{ env.VERBOSITY }} ${{ env.BASE_PYTEST_CMD }} \
          --junitxml=${{ steps.strings.outputs.test_report_path }} \
          --perf-report-dir=${{ steps.strings.outputs.perf_report_dir }} \
          --perf-id=${{ steps.fetch-job-id.outputs.job_id }}"
        echo "FULL_PYTEST_CMD=$FULL_PYTEST_CMD" >> $GITHUB_ENV
        echo "Will execute: $FULL_PYTEST_CMD"

    - name: Run tests
      if: ${{ !matrix.build.multihost }}
      timeout-minutes: ${{ fromJson(steps.collect-tests.outputs.timeout-minutes) }}
      env:
        HF_HOME: /mnt/dockercache/huggingface
        TORCH_HOME: /mnt/dockercache/torchhub
        GITHUB_TOKEN: ${{ github.token }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        ENABLE_BRINGUP_STAGE_LOGGING: 1
      shell: bash
      run: |
        source venv/activate
        ${{ env.FULL_PYTEST_CMD }} 2>&1 | tee pytest.log

    - name: Run tests (multihost)
      if: ${{ matrix.build.multihost }}
      timeout-minutes: ${{ fromJson(steps.collect-tests.outputs.timeout-minutes) }}
      shell: bash
      run: |
        docker exec \
          -e HF_HOME=/mnt/dockercache/huggingface \
          -e TORCH_HOME=/mnt/dockercache/torchhub \
          -e GITHUB_TOKEN=${{ secrets.GH_TOKEN }} \
          -e HF_TOKEN=${{ secrets.HF_TOKEN }} \
          -e ENABLE_BRINGUP_STAGE_LOGGING=1 \
          -e FULL_PYTEST_CMD="${{ env.FULL_PYTEST_CMD }}" \
          ubuntu-host-mapped bash -c '
            cd ${{ steps.strings.outputs.work-dir }}
            source venv/activate

            export TTXLA_LOGGER_LEVEL=DEBUG
            export TT_METAL_LOGGER_LEVEL=DEBUG
            export TT_METAL_LOGGER_TYPES=Fabric,Always

            TOPOLOGY="${{ matrix.build.topology }}"

            # Call topology script to set distributed env vars
            # The topology script auto-discovers TT_PJRT_PLUGIN_DIR from pjrt_plugin_tt package
            TOPOLOGY_EXPORTS=$(python scripts/multihost_topology.py \
              --topology "$TOPOLOGY" \
              --script-dir tests/torch/multi_host/experimental)
            echo "Environment variables being set:"
            echo "$TOPOLOGY_EXPORTS"
            eval "$TOPOLOGY_EXPORTS"

            export TT_DISTRIBUTED_TCP_IFACE=enp194s0f0np0

            python -m pytest -sv \
              --log-memory --durations=0 \
              ./tests/torch/multi_host/experimental \
              -k "$TOPOLOGY" \
              --junitxml=${{ steps.strings.outputs.test_report_path }} \
              --perf-report-dir=${{ steps.strings.outputs.perf_report_dir }} \
              --perf-id=${{ steps.fetch-job-id.outputs.job_id }} \
              2>&1 | tee pytest.log
          '

    - name: Teardown vLLM test dependencies
      if: ${{ matrix.build.name == 'run_vllm_n150_tests' || matrix.build.name == 'run_vllm_n300_tests' || matrix.build.name == 'run_vllm_llmbox_tests' }}
      shell: bash
      run: |
        source venv/activate
        uv pip uninstall vllm transformers
        uv pip install -r $(pwd)/venv/requirements-dev.txt

    # produce_cicd_data silently drops artifacts with spaces in the name, must replace spaces with underscores
    # until https://github.com/tenstorrent/tt-github-actions/issues/78 is fixed
    - name: Sanitize test_mark
      id: sanitize
      shell: bash
      run: echo "test_mark=${TEST_MARK// /_}" >> $GITHUB_OUTPUT
      env:
        TEST_MARK: ${{ matrix.build.test-mark }}

    - name: Upload Test Log
      uses: actions/upload-artifact@v6
      if: success() || failure()
      with:
        name: test-log-${{ matrix.build.runs-on }}-${{ steps.sanitize.outputs.test_mark }}-${{ steps.fetch-job-id.outputs.job_id }}
        path: pytest.log
        if-no-files-found: ignore

    - name: Upload Test Report
      uses: actions/upload-artifact@v6
      if: success() || failure()
      with:
        name: test-reports-${{ needs.generate-matrix-test.outputs.test_matrix_hash }}-${{ github.run_attempt }}.${{ strategy.job-index }}-${{ matrix.build.runs-on }}-${{ steps.sanitize.outputs.test_mark }}-${{ steps.fetch-job-id.outputs.job_id }}
        path: ${{ steps.strings.outputs.test_report_path }}
        if-no-files-found: ignore

    # If no perf tests ran, this step will emit a warning (no files to upload) but won't fail the job.
    - name: Upload Benchmark Report
      uses: actions/upload-artifact@v6
      if: success() || failure()
      with:
        name: perf-reports-${{ needs.generate-matrix-test.outputs.test_matrix_hash }}-${{ github.run_attempt }}.${{ strategy.job-index }}-${{ matrix.build.runs-on }}-${{ steps.sanitize.outputs.test_mark }}-${{ steps.fetch-job-id.outputs.job_id }}
        path: ${{ steps.strings.outputs.perf_report_dir }}
        # If --perf-report-dir is not given, no files will be generated so this ignore is needed to avoid failing the job.
        if-no-files-found: 'ignore'

    - name: Cleanup multihost worker containers
      if: ${{ always() && matrix.build.multihost }}
      shell: bash
      run: |
        docker exec ubuntu-host-mapped bash -c '
          mpirun --allow-run-as-root --hostfile /etc/mpirun/hostfile \
            --mca btl_tcp_if_exclude docker0,lo \
            --mca plm_rsh_agent "ssh -A -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -l ubuntu" \
            --tag-output \
            bash -c "docker stop ubuntu-host-mapped || true; docker rm ubuntu-host-mapped || true"
        ' || true

    - name: Fix multihost workspace permissions
      if: ${{ always() && matrix.build.multihost }}
      shell: bash
      run: |
        DOCKER_IMAGE="${{ !matrix.build.shared-runners && inputs.docker_image || format('harbor.ci.tenstorrent.net/{0}', inputs.docker_image) }}"
        docker run --rm \
          -v "${{ github.workspace }}:${{ steps.strings.outputs.work-dir }}" \
          "$DOCKER_IMAGE" \
          chown -R "$(id -u):$(id -g)" ${{ steps.strings.outputs.work-dir }} || true
        echo "Workspace ownership restored"

    - name: Teardown multihost controller container
      if: ${{ always() && matrix.build.multihost }}
      shell: bash
      run: |
        docker stop ubuntu-host-mapped || true
        docker rm ubuntu-host-mapped || true
        echo "Controller container removed"


  test-summary:
    runs-on: ubuntu-latest
    needs: [ generate-matrix-test, run-tests ]
    if: success() || failure()
    steps:
      - uses: actions/checkout@v6
      - name: Process test summary
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download ${{ github.run_id }} --repo ${{ github.repository }} --pattern "test-reports-${{ needs.generate-matrix-test.outputs.test_matrix_hash }}-*" --dir test_reports || echo "No reports found"
          find test_reports -name "report_*.xml" -type f -exec mv {} test_reports/ \;

      - name: Show consolidated test report
        continue-on-error: true
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: test_reports/report_*.xml
          check_name: TT-XLA ${{ needs.generate-matrix-test.outputs.test_matrix_name }}
          detailed_summary: true
          include_passed: ${{ inputs.include_passed }}
          group_suite: true
          token: ${{ github.token }}
