# Minimal override: compile-only run of examples/pytorch/system_desc.py using
# examples/pytorch/n150_system_desc.ttsys (checked into the repo).
# Restore the full matrix/pytest workflow from git history when no longer needed.

name: Test (call)

permissions:
  actions: write
  checks: write
  contents: read

on:
  workflow_call:
    inputs:
      docker_image:
        description: 'Docker image to use for the build'
        required: true
        type: string
      artifact_release_run_id:
        description: 'Run ID of the artifacts (release)'
        required: true
        type: string
      artifact_suffix:
        description: 'Suffix for the artifact name'
        required: false
        type: string
      wheel_build:
        description: 'Build to use for testing, e.g. release, manylinux'
        required: false
        type: string
        default: release
      test_suite:
        description: 'Test suite preset options or custom (ignored in minimal mode)'
        required: true
        type: string
      test_suite_custom:
        description: 'Custom test suite json'
        required: false
        type: string
      include_passed:
        description: 'Include passed tests in the summary'
        required: false
        default: false
        type: boolean
      torchxla_build_run_id:
        description: 'Manual torch-xla build run ID'
        required: false
        type: string
        default: ''

env:
  GH_TOKEN: ${{ github.token }}
  TTMLIR_TOOLCHAIN_DIR: /opt/ttmlir-toolchain
  TT_XLA_CI: 1
  TT_METAL_OPERATION_TIMEOUT_SECONDS: ${{ vars.TT_METAL_OPERATION_TIMEOUT_SECONDS || 300 }}
  TT_METAL_DISPATCH_TIMEOUT_COMMAND_TO_EXECUTE: "/opt/tt-triage-venv/bin/python -vvv /opt/tt-triage/tools/tt-triage.py 1>&2"

jobs:
  run-tests:
    runs-on: n150

    name: "system_desc example (n150)"

    container:
      image: ${{ inputs.docker_image }}
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /etc/udev/rules.d:/etc/udev/rules.d
        - /lib/modules:/lib/modules
        - /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env
        - /mnt/dockercache:/mnt/dockercache

    steps:
      - name: Mark repo as safe for git
        run: |
          git config --global --add safe.directory /__w/tt-xla/tt-xla
          git config --global --add safe.directory /__w/tt-xla/tt-xla/third_party/tt_forge_models

      - name: Log disk space
        run: df -h

      - name: Set caching env variables
        shell: bash
        run: echo "IRD_LF_CACHE=${{ vars.IRD_LF_CACHE }}" >> $GITHUB_ENV

      - uses: actions/checkout@v6
        with:
          submodules: recursive
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .github/scripts/
            .gitmodules
            pytest.ini
            python_package/requirements.txt
            venv/
            examples/

      - name: Fetch job id
        id: fetch-job-id
        uses: tenstorrent/tt-github-actions/.github/actions/job_id@main
        with:
          job_name: "system_desc example (n150)"

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "work-dir=$(pwd)" >> "$GITHUB_OUTPUT"
          echo "wheel_build=${{ inputs.wheel_build }}" >> "$GITHUB_OUTPUT"
          echo "wheel_artifact_name=xla-whl-${{ inputs.wheel_build }}${{ inputs.artifact_suffix }}" >> "$GITHUB_OUTPUT"
          echo "artifact_run_id=${{ inputs.artifact_release_run_id }}" >> "$GITHUB_OUTPUT"

      - name: Download and install wheels
        shell: bash
        run: |
          echo "=== Downloading wheels ==="
          gh run download ${{ steps.strings.outputs.artifact_run_id }} \
            --repo ${{ github.repository }} \
            --dir wheels \
            --name ${{ steps.strings.outputs.wheel_artifact_name }}
          ls -la wheels
          echo "=== Installing wheel ==="
          source venv/activate
          uv pip install wheels/*.whl

      - name: Install custom torch_xla from workflow run
        if: ${{ inputs.torchxla_build_run_id != '' }}
        shell: bash
        run: |
          echo "Using custom torchxla install from run ${{ inputs.torchxla_build_run_id }}"
          gh run download ${{ inputs.torchxla_build_run_id }} --repo ${{ github.repository }}
          source venv/activate
          uv pip install --force-reinstall xla-torch-wheel-release/*.whl
          uv pip show torch_xla

      - name: Run examples/pytorch/system_desc.py (compile only)
        timeout-minutes: 60
        env:
          HF_HOME: /mnt/dockercache/huggingface
          TORCH_HOME: /mnt/dockercache/torchhub
          GITHUB_TOKEN: ${{ github.token }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        shell: bash
        run: |
          source venv/activate
          export TTXLA_LOGGER_LEVEL=DEBUG
          python examples/pytorch/system_desc.py compile examples/pytorch/n150_system_desc.ttsys \
            2>&1 | tee pytest.log

      - name: Upload Test Log
        uses: actions/upload-artifact@v6
        if: success() || failure()
        with:
          name: test-log-n150-system-desc-${{ steps.fetch-job-id.outputs.job_id }}
          path: pytest.log
