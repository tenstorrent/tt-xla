name: Test (call)

permissions:
  actions: write
  checks: write
  contents: read

on:
  workflow_call:
    inputs:
      docker_image:
        description: 'Docker image to use for the build'
        required: true
        type: string
      artifact_release_run_id:
        description: 'Run ID of the artifacts (release)'
        required: true
        type: string
      artifact_suffix:
        description: 'Suffix for the artifact name'
        required: false
        type: string
      wheel_build:
        description: 'Build to use for testing, e.g. release, manylinux'
        required: false
        type: string
        default: release
      test_suite:
        description: 'Test suite preset options or custom'
        required: true
        type: string
      test_suite_custom:
        description: 'Custom test suite json'
        required: false
        type: string
      include_passed:
        description: 'Include passed tests in the summary'
        required: false
        default: false
        type: boolean
      torchxla_build_run_id:
        description: 'Manual torch-xla build run ID'
        required: false
        type: string
        default: ''
      forge_models_override:
        description: 'Git SHA of commit (or branch name) in tenstorrent/tt-forge-models'
        required: false
        type: string
        default: ''
      dump_irs:
        description: 'Pass --dump-irs to pytest and upload collected IRs as artifacts'
        required: false
        default: false
        type: boolean

env:
  GH_TOKEN: ${{ github.token }} # for gh cli tool
  TTMLIR_TOOLCHAIN_DIR: /opt/ttmlir-toolchain # We don't actually need this, venv/activate expects this to be set
  TT_XLA_CI: 1
  TT_METAL_OPERATION_TIMEOUT_SECONDS: ${{ vars.TT_METAL_OPERATION_TIMEOUT_SECONDS || 300 }}
  TT_METAL_DISPATCH_TIMEOUT_COMMAND_TO_EXECUTE: "/opt/tt-triage-venv/bin/python -vvv /opt/tt-triage/tools/tt-triage.py 1>&2"

jobs:
  generate-matrix-test:
    uses: ./.github/workflows/call-generate-matrix.yml
    secrets: inherit
    with:
      test_suite: ${{ inputs.test_suite }}
      test_suite_custom: ${{ inputs.test_suite_custom }}

  # Run tests on TT hardware
  run-tests:
    needs: generate-matrix-test
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.generate-matrix-test.outputs.test_matrix) }}

    runs-on: ${{ !matrix.build.shared-runners && fromJson(format('["{0}", "in-service"]', matrix.build.runs-on)) || matrix.build.runs-on  }}

    name: "test ${{ matrix.build.test-mark }} (${{ matrix.build.runs-on }}, ${{ matrix.build.name }}, ${{ strategy.job-index }})"

    container:
      image: ${{ !matrix.build.shared-runners && inputs.docker_image || format('harbor.ci.tenstorrent.net/{0}', inputs.docker_image) }}
      options: ${{ (matrix.build.runs-on-original == 'cpu' || matrix.build.runs-on == 'cpu') && ' ' || '--device /dev/tenstorrent' }}
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /etc/udev/rules.d:/etc/udev/rules.d
        - /lib/modules:/lib/modules
        - /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env
        - /mnt/dockercache:/mnt/dockercache
        # Multihost: MPI hostfile and SSH agent socket for controller→worker SSH.
        - /etc/mpirun:/etc/mpirun
        - /var/run/mpirun:/var/run/mpirun
        - /var/run/mpirun/id_rsa_multihost_ssh_agent_sock:/var/run/mpirun/id_rsa_multihost_ssh_agent_sock
      env:
        SSH_AUTH_SOCK: /var/run/mpirun/id_rsa_multihost_ssh_agent_sock

    steps:

    - name: Mark repo as safe for git
      run: |
        git config --global --add safe.directory /__w/tt-xla/tt-xla
        git config --global --add safe.directory /__w/tt-xla/tt-xla/third_party/tt_forge_models

    - name: Log disk space
      run: df -h

    - name: Set caching env variables
      shell: bash
      run: |
        shared_runners=${{ matrix.build.shared-runners }}
        if [[ "$shared_runners" == "" || "$shared_runners" == "false" ]]; then
          echo "DOCKER_CACHE_ROOT=/mnt/dockercache" >> $GITHUB_ENV
        else
          echo "IRD_LF_CACHE=${{ vars.IRD_LF_CACHE }}" >> $GITHUB_ENV
        fi

    - uses: actions/checkout@v6
      with:
        submodules: recursive
        sparse-checkout-cone-mode: false
        sparse-checkout: |
          .github/scripts/
          .gitmodules
          .test_durations
          pjrt_implementation/
          third_party/pjrt_c_api/
          pytest.ini
          python_package/requirements.txt
          integrations/vllm_plugin/requirements-vllm-plugin.txt
          tests/
          venv/
          examples/
          scripts/

    - name: Override tt_forge_models ref
      if: ${{ inputs.forge_models_override != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Resolve short SHAs/refs via GitHub API, fall back to raw input
        REF="${{ inputs.forge_models_override }}"
        RESOLVED=$(gh api repos/tenstorrent/tt-forge-models/commits/$REF --jq .sha 2>/dev/null || echo "$REF")
        cd third_party/tt_forge_models
        git fetch --depth=1 origin $RESOLVED
        git checkout FETCH_HEAD
        echo "tt_forge_models checked out at $(git rev-parse HEAD)"

    - name: Set reusable strings
      id: strings
      shell: bash
      env:
        JOB_ID: ${{ job.check_run_id }}
      run: |
        echo "work-dir=$(pwd)" >> "$GITHUB_OUTPUT"
        echo "build-output-dir=$(pwd)/build" >> "$GITHUB_OUTPUT"
        echo "test_report_path=report_$JOB_ID.xml" >> "$GITHUB_OUTPUT"
        echo "perf_report_dir=$(pwd)/benchmark_reports" >> "$GITHUB_OUTPUT"
        # Staging dir for the per-format StableHLO/TTIR/TTNN dumps that benchmark tests
        # write to ./modules/irs (uploaded as separate *-mlir-* artifacts).
        echo "perf_report_path=$(pwd)/perf_reports" >> "$GITHUB_OUTPUT"
        # Perf benchmark device_type (CI runner-pool family) written into each perf
        # report for the regression check / superset. Mirrors the historical
        # runs-on-original value; the only remap is the dedicated n150 perf pool.
        perf_device_type="${{ matrix.build.runs-on-original || matrix.build.runs-on }}"
        if [[ "$perf_device_type" == "n150-perf" ]]; then perf_device_type="n150"; fi
        echo "perf_device_type=$perf_device_type" >> "$GITHUB_OUTPUT"
        # Override wheel_build to release if matrix.build.require is 'release' or 'alchemist'
        if [[ "${{ matrix.build.require }}" == "release" || "${{ matrix.build.require }}" == "alchemist" || "${{ matrix.build.multihost }}" == "true" ]]; then
          wheel_build=release
        else
          wheel_build="${{ inputs.wheel_build }}"
        fi
        echo "wheel_artifact_name=xla-whl-$wheel_build${{ inputs.artifact_suffix }}" >> "$GITHUB_OUTPUT"
        echo "wheel_release_vllm_tt_artifact_name=vllm-tt-whl-release${{inputs.artifact_suffix}}" >> "$GITHUB_OUTPUT"
        echo "alchemist_artifact_name=alchemist-lib-release${{ inputs.artifact_suffix }}" >> "$GITHUB_OUTPUT"

    - name: Download and install wheels
      shell: bash
      run: |
        echo "=== Downloading wheels ==="
        echo "Downloading wheel from: ${{ github.repository }} run_id ${{ inputs.artifact_release_run_id }} name ${{ steps.strings.outputs.wheel_artifact_name }}"
        gh run download ${{ inputs.artifact_release_run_id }} \
          --repo ${{ github.repository }} \
          --dir wheels \
          --name ${{ steps.strings.outputs.wheel_artifact_name }}
        if [[ "${{ matrix.build.extra-wheel }}" == "vllm" ]]; then
          echo "Downloading wheel from: ${{ github.repository }} run_id ${{ inputs.artifact_release_run_id }} name ${{ steps.strings.outputs.wheel_release_vllm_tt_artifact_name }}"
          gh run download ${{ inputs.artifact_release_run_id }} \
            --repo ${{ github.repository }} \
            --dir wheels \
            --name ${{ steps.strings.outputs.wheel_release_vllm_tt_artifact_name }}
        fi
        echo "Downloaded wheel files:"
        ls -la wheels

        echo "=== Installing wheel ==="
        source venv/activate
        uv pip install wheels/*.whl

    - name: Install custom torch_xla from workflow run
      if: ${{ inputs.torchxla_build_run_id != '' }}
      shell: bash
      run: |
        echo "Using custom torchxla install from run ${{ inputs.torchxla_build_run_id }}"
        gh run download ${{ inputs.torchxla_build_run_id }} --repo ${{ github.repository }}
        source venv/activate
        uv pip install --force-reinstall xla-torch-wheel-release/*.whl
        uv pip show torch_xla

    - name: Download and setup alchemist library
      if: ${{ matrix.build.require == 'alchemist' }}
      shell: bash
      run: |
        if [[ -n "${{ steps.strings.outputs.alchemist_artifact_name }}" ]]; then
          echo "=== Downloading alchemist artifact ==="
          mkdir -p alchemist_artifact
          gh run download ${{ inputs.artifact_release_run_id }} \
            --repo ${{ github.repository }} \
            --dir alchemist_artifact \
            --name ${{ steps.strings.outputs.alchemist_artifact_name }} || echo "Alchemist artifact not found, codegen tests will be skipped"
          # Set up the directory structure that venv/activate expects for TT_MLIR_HOME
          mkdir -p third_party/tt-mlir/src/tt-mlir/build
          if [[ -d alchemist_artifact/lib ]]; then
            mv alchemist_artifact/lib third_party/tt-mlir/src/tt-mlir/build/
          fi
          if [[ -d alchemist_artifact/tools ]]; then
            mv alchemist_artifact/tools third_party/tt-mlir/src/tt-mlir/build/
          fi
        fi

    - name: Start multihost worker containers
      if: ${{ matrix.build.multihost }}
      shell: bash
      env:
        HOST_WORKSPACE_PATH: ${{ github.workspace }}
        CONTAINER_WORKSPACE: ${{ steps.strings.outputs.work-dir }}
        # Workers use the same base image passed to regular test jobs.
        MULTIHOST_WORKER_IMAGE: ${{ inputs.docker_image }}
        SSH_AUTH_SOCK: /var/run/mpirun/id_rsa_multihost_ssh_agent_sock
      run: |
        .github/scripts/multihost-start-workers.sh "$MULTIHOST_WORKER_IMAGE" /etc/mpirun/hostfile
        source venv/activate
        python scripts/multihost_topology.py \
          --topology "${{ matrix.build.topology }}" \
          --script-dir tests/torch/multi_host/experimental > topology_exports.sh
        echo "export TTXLA_LOGGER_LEVEL=DEBUG" >> topology_exports.sh
        echo "export TT_METAL_LOGGER_LEVEL=DEBUG" >> topology_exports.sh
        echo "export TT_METAL_LOGGER_TYPES=Fabric,Always" >> topology_exports.sh

    - name: Check for re-run attempt
      id: check-rerun-attempt
      shell: bash
      env:
        RUN_ATTEMPT: ${{ github.run_attempt }}
        RUN_ID: ${{ github.run_id }}
        REPO: ${{ github.repository }}
        JOB_INDEX: ${{ strategy.job-index }}
        MATRIX_HASH: ${{ needs.generate-matrix-test.outputs.test_matrix_hash }}
      run: bash .github/scripts/check_rerun_attempt.sh

    - name: Set pytest command
      shell: bash
      env:
        FORKED: ${{ matrix.build.forked }}
        FORGE_MODELS: ${{ matrix.build.forge-models }}
        RUNS_ON_ORIGINAL: ${{ matrix.build.runs-on-original }}
        RUNS_ON: ${{ matrix.build.runs-on }}
        TEST_MARK: ${{ matrix.build.test-mark }}
        CONTAINS: ${{ matrix.build.contains }}
        RERUN_ATTEMPT: ${{ steps.check-rerun-attempt.outputs.rerun_attempt }}
        PARALLEL_GROUPS: ${{ matrix.build.parallel-groups }}
        GROUP_ID: ${{ matrix.build.group-id }}
        DIR: ${{ matrix.build.dir }}
        EXTRA_ARGS: ${{ matrix.build.args }}
        DUMP_IRS: ${{ inputs.dump_irs }}
      run: bash .github/scripts/set_pytest_command.sh

    - name: Install System Deps for Forge Models Tests
      if: ${{ matrix.build.forge-models == true }}
      shell: bash
      run: |
        apt-get update
        apt install -y libgl1 libglx-mesa0

    # try without installing these reqs, if they are really needed add to the base docker image
    # - name: Install System Deps for Benchmark Tests
    #   if: ${{ contains(matrix.build.dir, 'tests/benchmark') }}
    #   shell: bash
    #   run: |
    #     apt-get update
    #     apt install -y libgl1 libglib2.0-0

    # Ensure test_config files for tt-forge-models test are valid, especially on PR's for uplifting tt-forge-models
    # but still run tests even in case of failure here, will still treat overall job as failed.
    - name: Validate Forge Models Tests test config file
      if: ${{ matrix.build.forge-models == true && strategy.job-index == 0 && inputs.forge_models_override == '' }}
      shell: bash
      run: |
        source venv/activate
        uv pip install pyyaml
        python3 tests/runner/validate_test_config.py

    - name: Collect Tests
      id: collect-tests
      shell: bash
      run: |
        source venv/activate
        echo "Collecting tests for group ${{ matrix.build.group-id || 1}}..."
        python -m pytest --collect-only -q --disable-warnings ${{ env.BASE_PYTEST_CMD }} |& tee collected_tests.txt

        # Check if any collected tests have notimeout marker
        NOTIMEOUT_COUNT=$(python -m pytest --collect-only -q --disable-warnings -m notimeout $(grep "::" collected_tests.txt | tr '\n' ' ') 2>/dev/null | grep -c "::" || echo "0")
        if [[ "$NOTIMEOUT_COUNT" -gt 0 ]]; then
          echo "Found $NOTIMEOUT_COUNT tests with notimeout marker, using default timeout of 240 minutes"
          ESTIMATED_DURATION=240
        else
          SCRIPT_OUTPUT=$(python .github/scripts/calculate_test_timeout.py \
            --collected-output collected_tests.txt \
            --durations-file .test_durations \
            --default-timeout 240)
          echo "$SCRIPT_OUTPUT"
          ESTIMATED_DURATION=$(echo "$SCRIPT_OUTPUT" | tail -n 1)
        fi

        echo "Estimated duration: $ESTIMATED_DURATION minutes"
        echo "timeout-minutes=$ESTIMATED_DURATION" >> "$GITHUB_OUTPUT"

    - name: Run tests
      timeout-minutes: ${{ fromJson(steps.collect-tests.outputs.timeout-minutes) }}
      env:
        HF_HOME: /mnt/dockercache/huggingface
        TORCH_HOME: /mnt/dockercache/torchhub
        GITHUB_TOKEN: ${{ github.token }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        ENABLE_BRINGUP_STAGE_LOGGING: 1
        # Consumed by tests/benchmark perf reports (device_info.device_type); ignored
        # by non-perf tests.
        TT_XLA_PERF_DEVICE_TYPE: ${{ steps.strings.outputs.perf_device_type }}
      shell: bash
      run: |
        source venv/activate
        [[ -f topology_exports.sh ]] && source topology_exports.sh
        python -m pytest ${{ env.VERBOSITY }} ${{ env.BASE_PYTEST_CMD }} \
          --junitxml=${{ steps.strings.outputs.test_report_path }} \
          --perf-report-dir=${{ steps.strings.outputs.perf_report_dir }} \
          --perf-id=${{ job.check_run_id }} \
          2>&1 | tee pytest.log

    # produce_cicd_data silently drops artifacts with spaces in the name, must replace spaces with underscores
    # until https://github.com/tenstorrent/tt-github-actions/issues/78 is fixed
    - name: Sanitize test_mark
      id: sanitize
      shell: bash
      run: echo "test_mark=${TEST_MARK// /_}" >> $GITHUB_OUTPUT
      env:
        TEST_MARK: ${{ matrix.build.test-mark }}

    - name: Upload Test Log
      uses: actions/upload-artifact@v6
      if: success() || failure()
      with:
        name: test-log-${{ matrix.build.runs-on }}-${{ steps.sanitize.outputs.test_mark }}-${{ job.check_run_id }}
        path: pytest.log
        if-no-files-found: ignore

    - name: Upload Test Report
      uses: actions/upload-artifact@v6
      if: success() || failure()
      with:
        name: test-reports-${{ needs.generate-matrix-test.outputs.test_matrix_hash }}-${{ github.run_attempt }}.${{ strategy.job-index }}-${{ matrix.build.runs-on }}-${{ steps.sanitize.outputs.test_mark }}-${{ job.check_run_id }}
        path: ${{ steps.strings.outputs.test_report_path }}
        if-no-files-found: ignore

    # If no perf tests ran, this step will emit a warning (no files to upload) but won't fail the job.
    - name: Upload Benchmark Report
      uses: actions/upload-artifact@v6
      if: success() || failure()
      with:
        # Keep the historical perf artifact name (job id only): the downstream
        # collect_data ingester only requires the "perf-reports-" prefix, and superset
        # keys on run id + JSON content, not the artifact name. job.check_run_id is
        # unique per job/attempt, so batched benchmark jobs never collide.
        name: perf-reports-${{ job.check_run_id }}
        path: ${{ steps.strings.outputs.perf_report_dir }}
        # If --perf-report-dir is not given, no files will be generated so this ignore is needed to avoid failing the job.
        if-no-files-found: 'ignore'

    # Per-format IR dumps for benchmark jobs (ported from the old call-perf-test.yml).
    # Benchmark tests write StableHLO/TTIR/TTNN to ./modules/irs during compile; these
    # steps stage and upload them as separate *-mlir-* artifacts. Gated to benchmark
    # jobs (model tests use the --dump-irs / collected_irs path above instead).
    - name: Dump stablehlo to report
      id: dump-stablehlo
      if: (success() || failure()) && contains(matrix.build.dir, 'tests/benchmark')
      shell: bash
      run: |
        echo "Dump stablehlo to report"
        mkdir -p ${{ steps.strings.outputs.perf_report_path }}/stablehlo
        stablehlo_artifact_name="stablehlo-mlir-${{ job.check_run_id }}"
        if [ "${{ matrix.build.name }}" == "resnet_jax" ]; then
          cp ./modules/${{ matrix.build.name }}_stablehlo.mlir ${{ steps.strings.outputs.perf_report_path }}/stablehlo/stablehlo.mlir 2>/dev/null || true
        else
          cp ./modules/irs/shlo_*.mlir ${{ steps.strings.outputs.perf_report_path }}/stablehlo/ 2>/dev/null || true
        fi
        # Group StableHLO MLIR files under a folder named like the files but without the gN segment
        stablehlo_first_file="$(ls -1 ${{ steps.strings.outputs.perf_report_path }}/stablehlo/shlo_*.mlir 2>/dev/null | head -n 1 || true)"
        if [ -n "$stablehlo_first_file" ]; then
          stablehlo_base_name="$(basename "$stablehlo_first_file")"
          stablehlo_folder_name="$(echo "$stablehlo_base_name" | sed -E 's/_g[0-9]+_/_/' | sed -E 's/_run[0-9a-fA-F]+_/_/' | sed -E 's/\.mlir$//')"
          mkdir -p "${{ steps.strings.outputs.perf_report_path }}/stablehlo/${stablehlo_folder_name}"
          mv ${{ steps.strings.outputs.perf_report_path }}/stablehlo/shlo_*.mlir "${{ steps.strings.outputs.perf_report_path }}/stablehlo/${stablehlo_folder_name}/"
          stablehlo_artifact_name="stablehlo-mlir-${stablehlo_folder_name}"
        fi
        echo "artifact_name=${stablehlo_artifact_name}" >> "$GITHUB_OUTPUT"

    - name: Upload StableHLO MLIR
      id: upload-stablehlo-mlir
      uses: actions/upload-artifact@v6
      if: (success() || failure()) && contains(matrix.build.dir, 'tests/benchmark')
      with:
        name: ${{ steps.dump-stablehlo.outputs.artifact_name }}
        path: ${{ steps.strings.outputs.perf_report_path }}/stablehlo/
        if-no-files-found: ignore

    - name: Dump ttir to report
      id: dump-ttir
      if: (success() || failure()) && contains(matrix.build.dir, 'tests/benchmark')
      shell: bash
      run: |
        echo "Dump ttir to report"
        mkdir -p ${{ steps.strings.outputs.perf_report_path }}/ttir
        ttir_artifact_name="ttir-mlir-${{ job.check_run_id }}"
        if [ "${{ matrix.build.name }}" == "resnet_jax" ]; then
          cp ./modules/${{ matrix.build.name }}_ttir.mlir ${{ steps.strings.outputs.perf_report_path }}/ttir/ttir.mlir
        else
          cp ./modules/irs/ttir_*.mlir ${{ steps.strings.outputs.perf_report_path }}/ttir/
        fi
        # Group TTIR MLIR files under a folder named like the files but without the gN segment
        ttir_first_file="$(ls -1 ${{ steps.strings.outputs.perf_report_path }}/ttir/ttir_*.mlir 2>/dev/null | head -n 1 || true)"
        if [ -n "$ttir_first_file" ]; then
          ttir_base_name="$(basename "$ttir_first_file")"
          ttir_folder_name="$(echo "$ttir_base_name" | sed -E 's/_g[0-9]+_/_/' | sed -E 's/_run[0-9a-fA-F]+_/_/' | sed -E 's/\.mlir$//')"
          mkdir -p "${{ steps.strings.outputs.perf_report_path }}/ttir/${ttir_folder_name}"
          mv ${{ steps.strings.outputs.perf_report_path }}/ttir/ttir_*.mlir "${{ steps.strings.outputs.perf_report_path }}/ttir/${ttir_folder_name}/"
          ttir_artifact_name="ttir-mlir-${ttir_folder_name}"
        fi
        echo "artifact_name=${ttir_artifact_name}" >> "$GITHUB_OUTPUT"

    - name: Upload TTIR MLIR
      id: upload-ttir-mlir
      uses: actions/upload-artifact@v6
      if: (success() || failure()) && contains(matrix.build.dir, 'tests/benchmark')
      with:
        name: ${{ steps.dump-ttir.outputs.artifact_name }}
        path: ${{ steps.strings.outputs.perf_report_path }}/ttir/
        if-no-files-found: ignore

    - name: Dump ttnn to report
      id: dump-ttnn
      if: (success() || failure()) && contains(matrix.build.dir, 'tests/benchmark')
      shell: bash
      run: |
        echo "Dump ttnn to report"
        mkdir -p ${{ steps.strings.outputs.perf_report_path }}/ttnn
        ttnn_artifact_name="ttnn-mlir-${{ job.check_run_id }}"
        if [ "${{ matrix.build.name }}" == "resnet_jax" ]; then
          cp ./modules/${{ matrix.build.name }}_ttnn.mlir ${{ steps.strings.outputs.perf_report_path }}/ttnn/ttnn.mlir
        else
          cp ./modules/irs/ttnn_*.mlir ${{ steps.strings.outputs.perf_report_path }}/ttnn/
        fi
        # Group TTNN MLIR files under a folder named like the files but without the gN segment
        ttnn_first_file="$(ls -1 ${{ steps.strings.outputs.perf_report_path }}/ttnn/ttnn_*.mlir 2>/dev/null | head -n 1 || true)"
        if [ -n "$ttnn_first_file" ]; then
          ttnn_base_name="$(basename "$ttnn_first_file")"
          ttnn_folder_name="$(echo "$ttnn_base_name" | sed -E 's/_g[0-9]+_/_/' | sed -E 's/_run[0-9a-fA-F]+_/_/' | sed -E 's/\.mlir$//')"
          mkdir -p "${{ steps.strings.outputs.perf_report_path }}/ttnn/${ttnn_folder_name}"
          mv ${{ steps.strings.outputs.perf_report_path }}/ttnn/ttnn_*.mlir "${{ steps.strings.outputs.perf_report_path }}/ttnn/${ttnn_folder_name}/"
          ttnn_artifact_name="ttnn-mlir-${ttnn_folder_name}"
        fi
        echo "artifact_name=${ttnn_artifact_name}" >> "$GITHUB_OUTPUT"

    - name: Upload TTNN MLIR
      id: upload-ttnn-mlir
      uses: actions/upload-artifact@v6
      if: (success() || failure()) && contains(matrix.build.dir, 'tests/benchmark')
      with:
        name: ${{ steps.dump-ttnn.outputs.artifact_name }}
        path: ${{ steps.strings.outputs.perf_report_path }}/ttnn/
        if-no-files-found: ignore

    - name: Prune oversized IR dump folders
      if: inputs.dump_irs && (success() || failure())
      shell: bash
      run: |
        ir_root="collected_irs"
        max_bytes=$((100 * 1024 * 1024))

        if [[ ! -d "$ir_root" ]]; then
          echo "$ir_root/ does not exist, nothing to prune"
          exit 0
        fi

        for dir in "$ir_root"/*/; do
          size_bytes=$(du -sb "$dir" | cut -f1)

          if (( size_bytes > max_bytes )); then
            size_human=$(du -sh "$dir" | cut -f1)
            echo "::warning::Pruning IR dump folder larger than 100MB (${size_human}): ${dir%/}"
            rm -rf -- "$dir"
          fi
        done

    - name: Upload IR Dumps
      if: inputs.dump_irs && (success() || failure())
      uses: actions/upload-artifact@v6
      with:
        name: ir-dumps-${{ needs.generate-matrix-test.outputs.test_matrix_hash }}-${{ github.run_attempt }}.${{ strategy.job-index }}-${{ matrix.build.runs-on }}-${{ steps.sanitize.outputs.test_mark }}-${{ job.check_run_id }}
        path: collected_irs/
        if-no-files-found: ignore

    - name: Cleanup multihost worker containers
      if: ${{ always() && matrix.build.multihost }}
      shell: bash
      run: |
        .github/scripts/multihost-cleanup-workers.sh /etc/mpirun/hostfile || true


  test-summary:
    runs-on: ubuntu-latest
    needs: [ generate-matrix-test, run-tests ]
    if: success() || failure()
    steps:
      - uses: actions/checkout@v6
      - name: Process test summary
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download ${{ github.run_id }} --repo ${{ github.repository }} --pattern "test-reports-${{ needs.generate-matrix-test.outputs.test_matrix_hash }}-*" --dir test_reports || echo "No reports found"
          find test_reports -name "report_*.xml" -type f -exec mv {} test_reports/ \;

      - name: Show consolidated test report
        continue-on-error: true
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: test_reports/report_*.xml
          check_name: TT-XLA ${{ needs.generate-matrix-test.outputs.test_matrix_name }}
          detailed_summary: true
          include_passed: ${{ inputs.include_passed }}
          group_suite: true
          token: ${{ github.token }}
