name: Run Test Single

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  id-token: write
  packages: write
  checks: write

jobs:
  build-image:
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit

  build-ttxla:
    uses: ./.github/workflows/call-build.yml
    name: "Build tt-xla"
    secrets: inherit
    needs: build-image
    with:
      docker_image: ${{ needs.build-image.outputs.docker-image }}

  perf-benchmark-n150:
    if: success() || failure()
    needs: [ build-image, build-ttxla ]
    uses: ./.github/workflows/manual-benchmark.yml
    secrets: inherit
    with:
      runs-on-filter: n150
      sh-runner: false
      skip-device-perf: true
      perf_regression_check: false
      test_filter: resnet,llama_3_1_8b_instruct,qwen_3_4b_embedding
      should_build_wheel: false
      artifact_release_run_id: ${{ needs.build-ttxla.outputs.artifacts_run_id }}
      wheel_release_artifact_name: ${{ needs.build-ttxla.outputs.wheel_artifact_name }}
      docker_image: ${{ needs.build-image.outputs.docker-image-base }}

  perf-benchmark-llmbox:
    if: success() || failure()
    needs: [ build-image, build-ttxla ]
    uses: ./.github/workflows/manual-benchmark.yml
    secrets: inherit
    with:
      runs-on-filter: n300-llmbox
      sh-runner: false
      skip-device-perf: true
      perf_regression_check: false
      test_filter: test_llama_3_1_70b_tp
      should_build_wheel: false
      artifact_release_run_id: ${{ needs.build-ttxla.outputs.artifacts_run_id }}
      wheel_release_artifact_name: ${{ needs.build-ttxla.outputs.wheel_artifact_name }}
      docker_image: ${{ needs.build-image.outputs.docker-image-base }}
