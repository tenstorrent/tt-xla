name: Update Release Notes

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to update'
        required: true
        type: string
      is_nightly:
        description: 'Is this a nightly release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  update-release-notes:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Get current release body
        id: get-release
        run: |
          gh release view ${{ inputs.tag_name }} --json body -q '.body' > current_body.md
          COMMIT=$(git rev-list -n 1 "${{ inputs.tag_name }}")
          echo "commit_hash=$COMMIT" >> $GITHUB_OUTPUT

      - name: Resolve commit hashes for weekly workflows
        id: resolve-commits
        run: |
          if [ "${{ inputs.is_nightly }}" = "true" ]; then
            WEEKLY_COMMIT=$(gh run list --workflow "schedule-weekly.yml" --branch main \
              --status completed --limit 1 --json headSha -q '.[0].headSha')
            WEEKLY_TRAINING_COMMIT=$(gh run list --workflow "schedule-weekly-training.yml" --branch main \
              --status completed --limit 1 --json headSha -q '.[0].headSha')
          else
            WEEKLY_COMMIT="${{ steps.get-release.outputs.commit_hash }}"
            WEEKLY_TRAINING_COMMIT="${{ steps.get-release.outputs.commit_hash }}"
          fi
          echo "weekly_commit=$WEEKLY_COMMIT" >> $GITHUB_OUTPUT
          echo "weekly_training_commit=$WEEKLY_TRAINING_COMMIT" >> $GITHUB_OUTPUT

      - name: Fetch model coverage (On nightly)
        uses: ./.github/actions/superset-api
        with:
          query: report/model_coverage
          query_params: '{"project": "tt-xla", "workflow_name": "On nightly", "commit_hash": "${{ steps.get-release.outputs.commit_hash }}"}'
          output_file: coverage_nightly.json

      - name: Fetch model coverage (On weekly)
        uses: ./.github/actions/superset-api
        with:
          query: report/model_coverage
          query_params: '{"project": "tt-xla", "workflow_name": "On weekly", "commit_hash": "${{ steps.resolve-commits.outputs.weekly_commit }}"}'
          output_file: coverage_weekly.json

      - name: Fetch model coverage (On weekly training)
        uses: ./.github/actions/superset-api
        with:
          query: report/model_coverage
          query_params: '{"project": "tt-xla", "workflow_name": "On weekly training", "commit_hash": "${{ steps.resolve-commits.outputs.weekly_training_commit }}"}'
          output_file: coverage_weekly_training.json

      - name: Fetch model performance
        uses: ./.github/actions/superset-api
        with:
          query: report/model_performance
          query_params: '{"project": "tt-xla", "workflow_name": "On nightly", "commit_hash": "${{ steps.get-release.outputs.commit_hash }}", "architecture": "wormhole"}'
          output_file: perf.json

      - name: Generate reports
        run: python3 .github/scripts/generate_release_reports.py

      - name: Assemble updated release body
        run: |
          {
            cat current_body.md
            echo ""
            echo "---"
            echo ""
            cat model_performance_llms.md
            echo ""
            cat model_performance_non_llms.md
            echo ""
            cat model_coverage.md
          } > updated_body.md

      - name: Update release body
        run: |
          gh release edit ${{ inputs.tag_name }} --notes-file updated_body.md

      - name: Upload CSV assets to release
        run: |
          gh release upload ${{ inputs.tag_name }} \
            model_coverage.csv \
            model_performance_llms.csv \
            model_performance_non_llms.csv \
            --clobber
