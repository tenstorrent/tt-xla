name: On nightly EmitPy

on:
  schedule:
    - cron: '0 2 * * *'

permissions:
  actions: write
  packages: write
  checks: write
  contents: read

jobs:
  build-image:
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit

  build-ttxla:
    uses: ./.github/workflows/call-build.yml
    name: "Build tt-xla"
    secrets: inherit
    needs: build-image
    with:
      docker_image: ${{ needs.build-image.outputs.docker-image }}

  # EmitPy verification: re-runs nightly passing torch models via the codegen_py
  # backend and compares results against the flatbuffer execution path.
  # This runs in a separate workflow so failures here do not affect the
  # canonical nightly green status.
  test_forge_models_emitpy:
    uses: ./.github/workflows/call-test.yml
    secrets: inherit
    needs: [ build-image, build-ttxla ]
    if: success() || failure()
    with:
      test_suite: model-test-emitpy.json
      docker_image: ${{ needs.build-image.outputs.docker-image }}
      artifact_release_run_id: ${{ needs.build-ttxla.outputs.artifacts_run_id }}
      artifact_suffix: ${{ needs.build-ttxla.outputs.artifact_suffix }}

  fail-notify:
    if: always()
    needs:
      - test_forge_models_emitpy
      - build-image
      - build-ttxla
    runs-on: Ubuntu-latest
    outputs:
      is-main: ${{ steps.branch-check.outputs.IS_MAIN }}
      failed: ${{ steps.check.outputs.failure }}
    steps:
      - name: Check if branch is main
        id: branch-check
        run: echo "IS_MAIN=$(if [ '${{ github.ref }}' == 'refs/heads/main' ]; then echo true; else echo false; fi)" >> $GITHUB_OUTPUT
      - name: Check if the needed jobs succeeded or failed
        id: check
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  fail-send-msg:
    if: always()
    needs:
      - fail-notify
    runs-on: Ubuntu-latest
    steps:
      - name: Send Notification
        if: ${{ needs.fail-notify.outputs.is-main == 'true' }}
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_EMITPY_NIGHTLY }}
          webhook-type: webhook-trigger
          payload: |
            text: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}"
            result: "${{ needs.fail-notify.outputs.failed == 'true' && 'FAILED' || 'SUCCEEDED' }}"
            unfurl_links: false
            unfurl_media: false
