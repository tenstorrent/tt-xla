name: Failure Inspector

on:
  workflow_call:
    inputs:
      workflow_run_id:
        description: 'The workflow run ID to inspect'
        type: string
        required: true
      workflow_run_attempt:
        description: 'The workflow run attempt number to inspect'
        type: string
        required: false
        default: '1'
      docker_image:
        description: 'Docker image to use for the inspection'
        required: true
        type: string

permissions:
  actions: write
  contents: read
  checks: write
  packages: write

jobs:
  inspect:
    outputs:
      test-matrix: ${{ steps.success-failed.outputs.test_matrix }}
      docker_sha: ${{ steps.success-failed.outputs.docker_sha }}
      curr_wf_id: ${{ steps.success-failed.outputs.curr_wf_id }}
      curr_wf_attempt: ${{ steps.success-failed.outputs.curr_wf_attempt }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Find failed tests
        id: success-failed
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repo="${{ github.repository }}"
          wf_name="schedule-nightly.yml"

          curr_wf_id="${{ inputs.workflow_run_id }}"

          # get json of the last 20 workflow runs
          gh run list --workflow $wf_name -R $repo -b main -L 20 --json attempt,conclusion,databaseId,headSha >runs.json

          # Remove entries from runs.json up to the entry with curr_wf_id
          jq --argjson curr_id "$curr_wf_id" 'map(select(.databaseId <= $curr_id))' runs.json > temp_runs.json
          mv temp_runs.json runs.json

          echo "Extracted runs: $(jq '.[:2]' runs.json)"

          # check if current workflow ID is the one that is passed in inputs
          if [ "$(jq -r '.[0].databaseId' runs.json)" -ne "$curr_wf_id" ]; then
            echo "Current workflow ID does not match the workflow_run context ID. Exiting."
            exit 0
          fi

          # check if runs.json has at least 2 entries
          if [ "$(jq 'length' runs.json)" -lt 2 ]; then
            echo "Not enough workflow runs found (need at least 2). Exiting."
            exit 0
          fi

          curr_wf_attempt="${{ inputs.workflow_run_attempt }}"
          curr_head_sha=$(jq -r '.[0].headSha' runs.json)
          prev_wf_id=$(jq -r '.[1].databaseId' runs.json)
          prev_head_sha=$(jq -r '.[1].headSha' runs.json)

          # check if commits are the same
          if [ "$curr_head_sha" == "$prev_head_sha" ]; then
            echo "msg=No commits between last 2 nightly runs" >> $GITHUB_OUTPUT
            echo "success=false" >> $GITHUB_OUTPUT
            echo "No commits between last 2 nightly runs. Exiting."
            exit 0
          fi

          # save current nightly workflow ID and attempt
          echo "curr_wf_id=$curr_wf_id" >> $GITHUB_OUTPUT
          echo "curr_wf_attempt=$curr_wf_attempt" >> $GITHUB_OUTPUT

          # cleanup before processing
          rm -rf log-a
          rm -rf log-b

          # get list of failed tests from the last two workflow runs
          gh run download $prev_wf_id --pattern "test-reports-*" -R $repo -D log-b || true
          gh run download $curr_wf_id --pattern "test-reports-*" -R $repo -D log-a || true

          # find tests with PCC drops
          rm -rf pcc_results.md
          python .github/scripts/find_pcc_drops.py log-a log-b 0.01
          if [ -s pcc_results.md ]; then
            cat pcc_results.md >> $GITHUB_STEP_SUMMARY
          fi

          # find newly failed tests
          rm -rf log-out
          mkdir -p log-out
          if ! python .github/scripts/new_failed_tests_bymachine.py log-a log-b log-out $prev_head_sha $curr_head_sha "" "1"; then
            echo "msg=No newly failed tests found between last 2 nightly runs" >> $GITHUB_OUTPUT
            echo "success=false" >> $GITHUB_OUTPUT
            echo "No new tests failed"
            exit 0
          fi

          # cleanup
          rm -rf log-a
          rm -rf log-b
          rm -f runs.json

          echo "Resulting matrix:"
          cat .matrix.json|jq -c
          echo "test_matrix=$(cat .matrix.json|jq -c)" >> $GITHUB_OUTPUT
          echo "docker_sha=$curr_head_sha" >> $GITHUB_OUTPUT
          echo "success=true" >> $GITHUB_OUTPUT

      - uses: slackapi/slack-github-action@v3.0.1
        if: ${{ steps.success-failed.outputs.success != 'true' && steps.success-failed.outputs.msg != '' }}
        with:
          webhook: ${{ secrets.SLACK_NIGHTLY_INSPECT }}
          webhook-type: webhook-trigger
          payload: |
            text: "${{ steps.success-failed.outputs.msg }}"

  bisect:
    needs: inspect
    strategy:
      matrix:
        build: ${{ fromJson(needs.inspect.outputs.test-matrix) }}
      fail-fast: false

    runs-on: ${{ !matrix.build.shared-runners && fromJson(format('["{0}", "in-service"]', matrix.build.runs-on)) || matrix.build.runs-on  }}

    # Keep this name in sync with the fetch-job-id step
    name: "bisect ${{ matrix.build.runs-on }} (sha ${{ matrix.build.fromc }} - ${{ matrix.build.toc }})"

    container:
      image: ${{ !matrix.build.shared-runners && inputs.docker_image || format('harbor.ci.tenstorrent.net/{0}', inputs.docker_image) }}
      options: --device /dev/tenstorrent
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /etc/udev/rules.d:/etc/udev/rules.d
        - /lib/modules:/lib/modules
        - /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env
        - /mnt/dockercache:/mnt/dockercache

    env:
      TT_XLA_CI: 1
      GH_TOKEN: ${{ github.token }} # for gh cli tool

    steps:
      - name: Mark repo as safe for git
        run: |
          git config --global --add safe.directory /__w/tt-xla/tt-xla
          git config --global --add safe.directory /__w/tt-xla/tt-xla/third_party/tt_forge_models

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set caching env variables
        shell: bash
        run: |
          shared_runners=${{ matrix.build.shared-runners }}
          if [[ "$shared_runners" == "" || "$shared_runners" == "false" ]]; then
            echo "DOCKER_CACHE_ROOT=/mnt/dockercache" >> $GITHUB_ENV
          else
            echo "IRD_LF_CACHE=${{ vars.IRD_LF_CACHE }}" >> $GITHUB_ENV
          fi

      - name: Bisect
        shell: bash
        id: bisect
        run: |
          rm -rf .bisect-run
          mkdir -p .bisect-run
          cp -r .github/scripts/* .bisect-run/
          source venv/activate >/dev/null
          found=false
          onlyskipped=false

          git bisect start ${{ matrix.build.toc }} ${{ matrix.build.fromc }}
          while true; do
            echo "New iteration of bisect, updating submodules"
            git submodule update --init --recursive

            echo "Downloading wheel..."
            out=""
            if .bisect-run/download_wheel.sh; then
              # Run tests
              echo "Running tests"
              if pytest "${{ matrix.build.test }}" -v 2>&1; then
                echo "Tests passed"
                out=$(git bisect good || true)
              else
                echo "Tests failed"
                out=$(git bisect bad || true)
              fi
            else
              echo "Download failed, skipping..."
              out=$(git bisect skip || true)
            fi

            # Check if bisect is complete
            echo "$out"
            first_line="$(printf '%s\n' "$out" | head -n1)"
            bad_commit=""
            title=""
            repo=""
            case "$first_line" in
              *"is the first bad commit"*)
                echo "FOUND IT: $first_line"
                repo="tt-xla"
                bad_commit=$(echo "$first_line" | grep -oP '[0-9a-f]{40}' | head -n1)
                title=$(git log -1 --pretty=%s "$bad_commit" | tr '\n' ' ')
                found=true
                break
                ;;
              *"There are only 'skip'ped commits left to test."*)
                echo "Bisect inconclusive: only skipped commits left."
                echo "Last bisect output: $first_line"
                onlyskipped=true
                break
                ;;
              "")
                echo "git bisect produced no output; stopping to avoid an infinite loop."
                echo "Last bisect output: $first_line"
                break
                ;;
            esac
          done

          # Get the bad commit info
          git bisect reset

          if [ -n "$bad_commit" ]; then
            echo "commit=$bad_commit" >> $GITHUB_OUTPUT
            if [ "$found" = true ]; then
              if [ "${{ matrix.build.indeterminate }}" = "true" ]; then
                if [ "${{ matrix.build.fromc }}" == "$bad_commit" ]; then
                  echo "code=RED" >> $GITHUB_OUTPUT
                else
                  echo "code=YELLOW" >> $GITHUB_OUTPUT
                fi
                echo "note=Test was not found in previous nightly run" >> $GITHUB_OUTPUT
                echo "Bisect found a bad commit but it is marked indeterminate: $repo/$bad_commit - $title"
              else
                echo "code=GREEN" >> $GITHUB_OUTPUT
                echo "note=Found bad commit" >> $GITHUB_OUTPUT
                echo "Bisect found a bad commit: $repo/$bad_commit - $title"
              fi
            else
              if [ "${{ matrix.build.indeterminate }}" = "true" ]; then
                echo "code=RED" >> $GITHUB_OUTPUT
                echo "note=Very indeterminate result, can't resolve bisect and test was not found in previous nightly run" >> $GITHUB_OUTPUT
              else
                echo "code=YELLOW" >> $GITHUB_OUTPUT
                echo "note=Can't resolve bisect" >> $GITHUB_OUTPUT
              fi
              echo "Bisect inconclusive, last commit tested: $repo/$bad_commit - $title"
            fi
            echo "title=$title" >> $GITHUB_OUTPUT
          else
            echo "code=RED" >> $GITHUB_OUTPUT
            if [ "$onlyskipped" = true ]; then
              echo "note=Bisect inconclusive: only commits without build are left to test. This likely means the test is flaky" >> $GITHUB_OUTPUT
              echo "Bisect result: Inconclusive, only skipped commits left."
            else
              echo "note=Bisect did not find a bad commit and there are no skipped commits left to test. This likely means the test is flaky" >> $GITHUB_OUTPUT
              echo "Bisect result: Inconclusive, no bad commit found."
            fi
            echo "note=Bisect did not find a bad commit. This likely means the test if flaky" >> $GITHUB_OUTPUT
            echo "Bisect result: No conclusive bad commit identified."
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_NIGHTLY_INSPECT_RESULT }}
          webhook-type: webhook-trigger
          payload: |
            commit: "${{ steps.bisect.outputs.commit }}"
            code: "${{ steps.bisect.outputs.code }}"
            note: "${{ steps.bisect.outputs.note }}"
            title: "${{ steps.bisect.outputs.title }}"
            test: "${{ matrix.build.test }} on ${{matrix.build.runs-on }}"
            unfurl_links: false
            unfurl_media: false
