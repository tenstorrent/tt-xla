name: Multi-host Test - Dual T3K (call)

# Reusable workflow for running multi-host tests on a dual T3000 setup.
#
# This workflow differs from call-test.yml in that it cannot use GitHub Actions'
# built-in container: field because the containers must be launched with
# --network=host for MPI inter-host communication. Instead, this workflow:
#   1. Runs on a bare-metal multi-host-t3000 runner
#   2. Manually launches Docker containers with --network=host on all hosts
#   3. Installs the wheel artifact inside the controller container
#   4. Runs pytest inside the controller container
#
# Environment variables for distributed execution (TT_DISTRIBUTED_*) are set
# automatically by the configure_topology pytest fixture in the test's conftest,
# using the "dual_t3k" topology from tests/torch/multi_host/conftest.py.

on:
  workflow_call:
    inputs:
      docker_image:
        description: 'Docker image to use (full registry path)'
        required: true
        type: string
      artifact_release_run_id:
        description: 'Run ID of the build artifacts to download'
        required: true
        type: string
      artifact_suffix:
        description: 'Suffix for the artifact name'
        required: false
        type: string
      wheel_build:
        description: 'Build type to use for testing, e.g. release, manylinux'
        required: false
        type: string
        default: release

env:
  GH_TOKEN: ${{ github.token }}
  TTMLIR_TOOLCHAIN_DIR: /opt/ttmlir-toolchain
  TT_XLA_CI: 1

jobs:
  run-multihost-tests:
    runs-on:
      - multi-host-bh-lb-2x

    name: "test multihost-dualt3k-basic"

    steps:
    - name: Mark repo as safe for git
      run: git config --global --add safe.directory /__w/tt-xla/tt-xla

    - name: Log disk space
      run: df -h

    - uses: actions/checkout@v4
      with:
        submodules: recursive
        sparse-checkout: |
          .github/scripts
          .gitmodules
          pytest.ini
          python_package/requirements.txt
          tests
          venv

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "wheel_artifact_name=xla-whl-${{ inputs.wheel_build }}${{ inputs.artifact_suffix }}" >> "$GITHUB_OUTPUT"
        echo "test_report_path=report_multihost_dualt3k.xml" >> "$GITHUB_OUTPUT"
        echo "test_log_path=pytest_multihost_dualt3k.log" >> "$GITHUB_OUTPUT"

    - name: Pre-check and cleanup existing containers
      shell: bash
      run: |
        mpirun --hostfile /etc/mpirun/hostfile \
          --mca btl_tcp_if_exclude docker0,lo \
          --tag-output \
          bash -c '
            if docker ps -a --filter name=ubuntu-host-mapped --format "{{.Names}}" | grep -q ubuntu-host-mapped; then
              echo "$(hostname): Stopping existing ubuntu-host-mapped container..."
              docker stop ubuntu-host-mapped
              docker rm ubuntu-host-mapped
              echo "$(hostname): Cleaned up existing container"
            else
              echo "$(hostname): No existing containers found"
            fi
          '

    - name: Start SSH agent on controller
      shell: bash
      run: |
        eval $(ssh-agent -s)
        ssh-add /home/ubuntu/.ssh/id_rsa_multihost
        echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" > /tmp/ssh_agent_env
        echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> /tmp/ssh_agent_env
        echo "SSH agent started with PID $SSH_AGENT_PID"

    - name: Start containers on all hosts via mpirun
      shell: bash
      run: |
        mpirun --hostfile /etc/mpirun/hostfile \
          --mca btl_tcp_if_exclude docker0,lo \
          --tag-output \
          bash -c '
            [ -f /tmp/ssh_agent_env ] && source /tmp/ssh_agent_env

            DOCKER_CMD="docker run --pull=always --rm -d \
              --name ubuntu-host-mapped \
              --privileged \
              --pid=host \
              --network=host \
              --device /dev/tenstorrent \
              -v /dev/hugepages:/dev/hugepages \
              -v /dev/hugepages-1G:/dev/hugepages-1G \
              -v /etc/udev/rules.d:/etc/udev/rules.d \
              -v /lib/modules:/lib/modules \
              -v /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env \
              -v /mnt/dockercache:/mnt/dockercache \
              -v /etc/mpirun:/etc/mpirun:ro"

            if [ -n "$SSH_AUTH_SOCK" ] && [ -S "$SSH_AUTH_SOCK" ]; then
              echo "$(hostname): SSH agent forwarding enabled: $SSH_AUTH_SOCK"
              DOCKER_CMD="$DOCKER_CMD -v $SSH_AUTH_SOCK:/ssh-agent -e SSH_AUTH_SOCK=/ssh-agent"
            else
              echo "$(hostname): No SSH agent available"
            fi

            DOCKER_CMD="$DOCKER_CMD \
              -v ${{ github.workspace }}:/workspace \
              -w /workspace \
              ${{ inputs.docker_image }} \
              sleep infinity"

            CONTAINER_ID=$(eval $DOCKER_CMD)
            if [ -z "$CONTAINER_ID" ]; then
              echo "$(hostname): ERROR: Failed to start container"
              exit 1
            fi
            echo "$(hostname): Container started: $CONTAINER_ID"
          '

    - name: Make remote_docker.sh executable in controller container
      shell: bash
      run: |
        docker exec ubuntu-host-mapped chmod +x \
          /workspace/tests/torch/multi_host/experimental/remote_docker.sh
        echo "remote_docker.sh is executable"

    - name: Download wheel artifact in controller container because dualt3k baremetal doesn't have gh
      shell: bash
      run: |
        docker exec \
          -e GH_TOKEN=${{ env.GH_TOKEN }} \
          ubuntu-host-mapped bash -c '
            echo "=== Downloading wheel artifact ==="
            echo "Downloading from run: ${{ inputs.artifact_release_run_id }} name: ${{ steps.strings.outputs.wheel_artifact_name }}"
            gh run download ${{ inputs.artifact_release_run_id }} \
              --repo ${{ github.repository }} \
              --dir /workspace/wheels \
              --name ${{ steps.strings.outputs.wheel_artifact_name }}
            echo "Downloaded wheel files:"
            ls -la /workspace/wheels
          '

    - name: Install wheel in controller container
      shell: bash
      run: |
        docker exec ubuntu-host-mapped bash -c '
          cd /workspace
          source venv/activate

          WHEEL_PATH=$(find wheels -name "*.whl" | head -n 1)
          if [ -z "$WHEEL_PATH" ]; then
            echo "ERROR: No wheel file found in wheels/"
            exit 1
          fi

          echo "Installing wheel: $WHEEL_PATH"
          uv pip install "$WHEEL_PATH"
          echo "Wheel installation complete"
        '
    - name: Download bigmesh config files
      shell: bash
      run: |
        docker exec ubuntu-host-mapped bash -c '
          RANK_BINDINGS_PATH="/workspace/venv/lib/python3.12/site-packages/pjrt_plugin_tt/tt-metal/tests/tt_metal/distributed/config/bh_lbx2_1x16_rank_bindings.yaml"
          MESH_DESC_PATH="/workspace/venv/lib/python3.12/site-packages/pjrt_plugin_tt/tt-metal/tt_metal/fabric/mesh_graph_descriptors/bh_lbx2_1x16_mesh_graph_descriptor.textproto"

          mkdir -p "$(dirname "$RANK_BINDINGS_PATH")"
          mkdir -p "$(dirname "$MESH_DESC_PATH")"

          echo "Downloading rank bindings config..."
          curl -fsSL \
            "https://raw.githubusercontent.com/tenstorrent/tt-metal/6326161779d67444288222247d63b43d79a182e7/tests/tt_metal/distributed/config/bh_lbx2_1x16_rank_bindings.yaml" \
            -o "$RANK_BINDINGS_PATH"

          echo "Downloading mesh graph descriptor..."
          curl -fsSL \
            "https://raw.githubusercontent.com/tenstorrent/tt-metal/6326161779d67444288222247d63b43d79a182e7/tt_metal/fabric/mesh_graph_descriptors/bh_lbx2_1x16_mesh_graph_descriptor.textproto" \
            -o "$MESH_DESC_PATH"

          echo "Downloaded files:"
          ls -la "$RANK_BINDINGS_PATH" "$MESH_DESC_PATH"
        '
    - name: Run tests
      timeout-minutes: 60
      shell: bash
      run: |
        docker exec ubuntu-host-mapped bash -c '
          cd /workspace
          source venv/activate

          export TTXLA_LOGGER_LEVEL=DEBUG
          export TT_METAL_LOGGER_LEVEL=DEBUG
          export TT_METAL_LOGGER_TYPES=Fabric,Always

          pytest -svv \
            tests/torch/multi_host/experimental/test_multihost_basic.py \
            -k "dual_bh_lb" \
            --junitxml=/workspace/${{ steps.strings.outputs.test_report_path }} \
            2>&1 | tee /workspace/${{ steps.strings.outputs.test_log_path }}
        '

    - name: Upload Test Log
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: test-log-multihost-dualt3k-${{ github.run_id }}
        path: ${{ steps.strings.outputs.test_log_path }}

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: test-reports-multihost-dualt3k-${{ github.run_attempt }}.${{ github.run_id }}
        path: ${{ steps.strings.outputs.test_report_path }}

    - name: Fix workspace permissions
      if: always()
      shell: bash
      run: |
        docker run --rm \
          -v "${{ github.workspace }}:/workspace" \
          ${{ inputs.docker_image }} \
          chown -R "$(id -u):$(id -g)" /workspace || true
        echo "Workspace ownership restored"

    - name: Cleanup
      if: always()
      shell: bash
      run: |
        mpirun --hostfile /etc/mpirun/hostfile \
          --mca btl_tcp_if_exclude docker0,lo \
          --tag-output \
          bash -c '
            docker stop ubuntu-host-mapped || true
            docker rm ubuntu-host-mapped || true
            if [ -f /tmp/ssh_agent_env ]; then
              source /tmp/ssh_agent_env
              kill $SSH_AGENT_PID || true
              rm -f /tmp/ssh_agent_env
            fi
            echo "$(hostname): Cleanup complete"
          '
