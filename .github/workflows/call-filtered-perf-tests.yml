name: Perf Tests filtered (call)

on:
  workflow_call:
    inputs:
      adv_filter:
        description: "Advanced JSON filter for selecting benchmarks to run"
        required: true
        type: string
      sh-runner:
        description: "Use shared runner"
        required: false
        type: boolean
        default: false
      docker_image:
        description: "Docker image to use"
        required: false
        type: string
        default: 'ghcr.io/tenstorrent/tt-xla/tt-xla-base-ubuntu-24-04:latest'
      artifact_release_run_id:
        description: 'Run ID of the artifacts (release)'
        required: false
        type: string
      artifact_suffix:
        description: 'Suffix for the artifact name'
        required: false
        type: string
      wheel_build:
        description: 'Build to use for testing, e.g. release, manylinux'
        required: false
        type: string
        default: release
      torchxla_build_run_id:
        description: 'Manual torch-xla build run ID'
        required: false
        type: string
        default: ''
      skip-device-perf:
        description: "Skip device performance measurement"
        required: false
        type: boolean
        default: false
      regression_check:
        description: "Enable perf metrics regression testing"
        required: false
        type: boolean
        default: false
      check_fusions:
        description: "Verify expected fusion ops are present in compiled IR"
        required: false
        type: boolean
        default: false

permissions:
  packages: write
  checks: write
  contents: write
  id-token: write
  actions: write

jobs:
  filter-tests:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-perf-benchmarks.outputs.matrix }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Filter Matrix
      id: set-perf-benchmarks
      shell: bash
      run: |
        echo '${{ inputs.adv_filter }}' > adv_filter.json
        if ! jq empty adv_filter.json 2>/dev/null; then
          echo "Error: Invalid JSON in adv_filter input"
          exit 1
        fi

        result=$(python .github/scripts/filter-test-matrix.py \
          .github/workflows/perf-bench-matrix.json \
          adv_filter.json \
          ${{ inputs.sh-runner && '--sh-runner' || '' }})

        echo $result
        matrix=$(echo $result | jq -r -c '.matrix')
        echo "matrix=$matrix" >> $GITHUB_OUTPUT

  run-perf-benchmarks:
    needs: filter-tests
    if: ${{ !cancelled() && needs.filter-tests.result == 'success' }}
    secrets: inherit
    uses: ./.github/workflows/call-perf-test.yml
    with:
      matrix: ${{ needs.filter-tests.outputs.matrix }}
      docker_image: ${{ inputs.docker_image }}
      artifact_release_run_id: ${{ inputs.artifact_release_run_id }}
      artifact_suffix: ${{ inputs.artifact_suffix }}
      wheel_build: ${{ inputs.wheel_build }}
      torchxla_build_run_id: ${{ inputs.torchxla_build_run_id }}
      skip-device-perf: ${{ inputs.skip-device-perf || false }}
      regression_check: ${{ inputs.regression_check || false }}
      sh-runner: ${{ inputs.sh-runner || false }}
      check_fusions: ${{ inputs.check_fusions }}
