name: Check and Build tt-xla

# Implements artifact caching to avoid unnecessary rebuilds.
# Artifacts are reused only when: not a PR, no mlir_override, and exact name match exists.
# Naming: "xla-whl-{release|explorer}[-commit_sha]" (SHA added for individual commits only).

on:
  workflow_call:
    inputs:
      mlir_override:
        description: 'Git SHA of commit in tenstorrent/tt-mlir'
        required: false
        type: string
      docker_image:
        description: 'Docker image to use for the build'
        required: false
        type: string
      docker_image_manylinux:
        description: 'Docker image to use for the manylinux build'
        required: false
        type: string
      build_types:
        description: 'Build types with space-separated values: release, explorer, manylinux'
        default: release
        type: string
        required: false
      force_rebuild:
        description: 'Force rebuild even if artifact exists'
        type: boolean
        required: false
    outputs:
      artifacts_run_id:
        description: 'Run ID of the workflow that produced the existing artifact(s)'
        value: ${{ jobs.check-existing-artifact.outputs.artifacts_run_id }}
      artifact_suffix:
        description: 'Suffix added to artifact name (e.g. commit SHA) to distinguish different builds'
        value: ${{ jobs.check-existing-artifact.outputs.artifact_suffix }}

jobs:
  check-existing-artifact:
    runs-on: ubuntu-latest
    name: "Check for existing artifact"
    outputs:
      artifacts_run_id: ${{ steps.check-artifact.outputs.artifacts_run_id }}
      artifact_suffix: ${{ steps.generate-name.outputs.artifact_suffix }}
      build_release: ${{ steps.generate-name.outputs.build_release || steps.check-artifact.outputs.build_release }}
      build_explorer: ${{ steps.generate-name.outputs.build_explorer || steps.check-artifact.outputs.build_explorer }}
      build_manylinux: ${{ steps.generate-name.outputs.build_manylinux || steps.check-artifact.outputs.build_manylinux }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate artifact name
        id: generate-name
        shell: bash
        run: |
          # Add commit SHA to artifact name only when all conditions are met:
          # - Not a pull request event
          # - Not a merge commit (has exactly 1 parent)
          # - No MLIR override specified
          if [[ "${{ inputs.force_rebuild }}" != "true" && \
                "${{ github.event_name }}" != "pull_request" && \
                $(git cat-file -p HEAD | grep -c "^parent ") -eq 1 && \
                "${{ inputs.mlir_override }}" == "" ]]; then
            artifact_suffix="-$(git rev-parse --short HEAD)"
            echo "reusable_artifact=true" >> "$GITHUB_OUTPUT"
            echo "Reusable artifact suffix: ${artifact_suffix}"
          else
            artifact_suffix=""
            echo "reusable_artifact=false" >> "$GITHUB_OUTPUT"
            echo "No reusable artifacts possible"
            # Set build flags for all specified build types since we can't reuse artifacts
            build_types="${{ inputs.build_types }}"
            for build_type in $build_types; do
              echo "build_${build_type}=true" >> "$GITHUB_OUTPUT"
              echo "Will build type: $build_type"
            done
          fi
          echo "artifact_suffix=${artifact_suffix}" >> "$GITHUB_OUTPUT"

      - name: Check if artifact exists
        if: ${{ steps.generate-name.outputs.reusable_artifact == 'true' }}
        id: check-artifact
        shell: bash
        run: |
          # Use GitHub API to check for existing artifacts
          # Parse space-separated build types and check each one
          build_types="${{ inputs.build_types }}"
          all_exist=true
          artifacts_run_id=""

          for build_type in $build_types; do
            # Validate build type
            if [[ ! "$build_type" =~ ^(release|explorer|manylinux)$ ]]; then
              echo "Invalid build type: $build_type. Must be one of: release, explorer, manylinux"
              exit 1
            fi

            echo "build_${build_type}=true" >> "$GITHUB_OUTPUT"
            echo "Should build type: $build_type"
            artifact_name="xla-whl-${build_type}${{ steps.generate-name.outputs.artifact_suffix }}"
            echo "Checking for artifact: $artifact_name"

            response=$(curl -s -H "Authorization: token ${{ github.token }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?name=${artifact_name}")
            total_count=$(echo "$response" | jq -r '.total_count')

            if [ "$total_count" -gt 0 ]; then
              echo "Found existing artifact: $artifact_name"
              # Get the run ID from the first artifact (use same run ID for all)
              ari=$(echo "$response" | jq -r '.artifacts[0].workflow_run.id')
              if [ -n "$artifacts_run_id" ] && [ "$artifacts_run_id" != "$ari" ]; then
                echo "Inconsistent artifact run IDs found: $artifacts_run_id and $ari"
                all_exist=false
                break
              fi
              artifacts_run_id=$ari
            else
              echo "No existing artifact found for: $artifact_name"
              all_exist=false
              break
            fi
          done

          if [ "$all_exist" = true ] && [ -n "$artifacts_run_id" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "artifacts_run_id=${artifacts_run_id}" >> "$GITHUB_OUTPUT"
            echo "All artifacts exist for run ID: $artifacts_run_id"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "artifacts_run_id=" >> "$GITHUB_OUTPUT"
            echo "Not all artifacts exist, build required"
          fi

  build-ttxla-release:
    needs: check-existing-artifact
    if: ${{ !needs.check-existing-artifact.outputs.artifacts_run_id && needs.check-existing-artifact.outputs.build_release == 'true' }}
    uses: ./.github/workflows/call-build-ttxla.yml
    secrets: inherit
    with:
      mlir_override: ${{ inputs.mlir_override }}
      docker_image: ${{ inputs.docker_image }}
      build_type: release
      artifact_suffix: ${{ needs.check-existing-artifact.outputs.artifact_suffix }}

  build-ttxla-explorer:
    needs: check-existing-artifact
    if: ${{ !needs.check-existing-artifact.outputs.artifacts_run_id && needs.check-existing-artifact.outputs.build_explorer == 'true' }}
    uses: ./.github/workflows/call-build-ttxla.yml
    secrets: inherit
    with:
      mlir_override: ${{ inputs.mlir_override }}
      docker_image: ${{ inputs.docker_image }}
      build_type: explorer
      artifact_suffix: ${{ needs.check-existing-artifact.outputs.artifact_suffix }}

  build-manylinux-ttxla:
    needs: check-existing-artifact
    if: ${{ !needs.check-existing-artifact.outputs.artifacts_run_id && needs.check-existing-artifact.outputs.build_manylinux == 'true' }}
    uses: ./.github/workflows/call-build-manylinux.yml
    secrets: inherit
    with:
      mlir_override: ${{ inputs.mlir_override }}
      docker-image: ${{ inputs.docker_image_manylinux }}
      artifact_suffix: ${{ needs.check-existing-artifact.outputs.artifact_suffix }}
