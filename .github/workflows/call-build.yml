name: Build tt-xla

# Implements artifact caching to avoid unnecessary rebuilds.
# Artifacts are reused only when: not a PR, no mlir_override, and exact name match exists.
# Naming: "xla-whl-{release|explorer}[-commit_sha]" (SHA added for individual commits only).

on:
  workflow_call:
    inputs:
        mlir_override:
            description: 'Git SHA of commit in tenstorrent/tt-mlir'
            required: false
            type: string
        docker_image:
            description: 'Docker image to use for the build'
            required: true
            type: string
        build_type:
            description: 'Build type: release, debug, codecov, explorer'
            default: release
            type: string
            required: false
        force_rebuild:
            description: 'Force rebuild even if artifact exists'
            type: boolean
            required: false
        enable_python_bindings:
            description: |
              Build with MLIR Python bindings enabled.
              cmake is run with -DTTMLIR_ENABLE_BINDINGS_PYTHON=ON before
              setup.py so that tt-mlir compiles its Python bindings from the
              start; the cached flag is inherited by setup.py's incremental
              cmake reconfigure.
              Uploads a "builder-bindings-*" artifact containing bin/ttrt,
              python_packages/, runtime/python/, and tt-metal/ from the
              tt-mlir build tree (these are the paths venv/activate adds to
              PATH/PYTHONPATH, plus the TT_METAL_RUNTIME_ROOT the plugin needs).
            type: boolean
            required: false
            default: false
    outputs:
        wheel_artifact_name:
            description: 'Name of the wheel artifact'
            value: ${{ jobs.check-existing-artifact.outputs.wheel_artifact_name }}
        wheel_release_vllm_tt_artifact_name:
            description: 'Name of the vllm-tt plugin wheel artifact'
            value: ${{ jobs.check-existing-artifact.outputs.wheel_release_vllm_tt_artifact_name }}
        alchemist_artifact_name:
            description: 'Name of the alchemist library artifact'
            value: ${{ jobs.check-existing-artifact.outputs.alchemist_artifact_name }}
        bindings_artifact_name:
            description: 'Name of the tt-mlir bindings artifact (only set when enable_python_bindings=true)'
            value: ${{ jobs.check-existing-artifact.outputs.bindings_artifact_name }}
        artifacts_run_id:
            description: 'Run ID of the artifacts'
            value: ${{ jobs.check-existing-artifact.outputs.artifacts_run_id || github.run_id }}

jobs:
  check-existing-artifact:
    runs-on: ubuntu-latest
    name: "Check for existing artifact"
    outputs:
      artifacts_run_id: ${{ steps.check-artifact.outputs.artifacts_run_id }}
      wheel_artifact_name: ${{ steps.generate-name.outputs.wheel_artifact_name }}
      wheel_release_vllm_tt_artifact_name: ${{ steps.generate-name.outputs.wheel_release_vllm_tt_artifact_name }}
      alchemist_artifact_name: ${{ steps.generate-name.outputs.alchemist_artifact_name }}
      bindings_artifact_name: ${{ steps.generate-name.outputs.bindings_artifact_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate artifact name
        id: generate-name
        shell: bash
        run: |
          build_name=${{ inputs.build_type }}
          if [[ "${{ inputs.enable_python_bindings }}" == "true" ]]; then
            build_name="${build_name}-bindings"
          fi

          # Add commit SHA to artifact name only when all conditions are met:
          # - Not a pull request event
          # - Not a merge commit (has exactly 1 parent)
          # - No MLIR override specified
          if [[ "${{ inputs.force_rebuild }}" != "true" && \
                "${{ github.event_name }}" != "pull_request" && \
                $(git cat-file -p HEAD | grep -c "^parent ") -eq 1 && \
                "${{ inputs.mlir_override }}" == "" ]]; then
            artifact_suffix="-$(git rev-parse --short HEAD)"
            echo "reusable_artifact=true" >> "$GITHUB_OUTPUT"
          else
            artifact_suffix=""
            echo "reusable_artifact=false" >> "$GITHUB_OUTPUT"
          fi
          wheel_artifact_name="xla-whl-${build_name}${artifact_suffix}"
          wheel_release_vllm_tt_artifact_name="vllm-tt-whl-${build_name}${artifact_suffix}"
          alchemist_artifact_name="alchemist-lib-${build_name}${artifact_suffix}"
          bindings_artifact_name=""
          if [[ "${{ inputs.enable_python_bindings }}" == "true" ]]; then
            bindings_artifact_name="builder-bindings-${build_name}${artifact_suffix}"
          fi
          echo "wheel_artifact_name=${wheel_artifact_name}" >> "$GITHUB_OUTPUT"
          echo "wheel_release_vllm_tt_artifact_name=${wheel_release_vllm_tt_artifact_name}" >> "$GITHUB_OUTPUT"
          echo "alchemist_artifact_name=${alchemist_artifact_name}" >> "$GITHUB_OUTPUT"
          echo "bindings_artifact_name=${bindings_artifact_name}" >> "$GITHUB_OUTPUT"
          echo "Generated artifact name: $wheel_artifact_name"

      - name: Check if artifact exists
        if: ${{ steps.generate-name.outputs.reusable_artifact == 'true' }}
        id: check-artifact
        shell: bash
        run: |
          # Use GitHub API to check for existing artifacts
          response=$(curl -s -H "Authorization: token ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?name=${{ steps.generate-name.outputs.wheel_artifact_name }}")
          total_count=$(echo "$response" | jq -r '.total_count')

          if [ "$total_count" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            # Get the download URL of the most recent artifact
            download_url=$(echo "$response" | jq -r '.artifacts[0].archive_download_url')
            artifacts_run_id=$(echo "$response" | jq -r '.artifacts[0].workflow_run.id')
            echo "url=${download_url}" >> "$GITHUB_OUTPUT"
            echo "artifacts_run_id=${artifacts_run_id}" >> "$GITHUB_OUTPUT"
            echo "Found existing artifact: ${{ steps.generate-name.outputs.wheel_artifact_name }}"
            echo "Artifact URL: $download_url"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "url=" >> "$GITHUB_OUTPUT"
            echo "artifacts_run_id=" >> "$GITHUB_OUTPUT"
            echo "No existing artifact found for: ${{ steps.generate-name.outputs.wheel_artifact_name }}"
          fi

  build-ttxla:
    needs: check-existing-artifact
    if: ${{ !needs.check-existing-artifact.outputs.artifacts_run_id }}
    timeout-minutes: 120
    runs-on: tt-ubuntu-2204-large-stable
    name: "Build tt-xla (${{ inputs.build_type }})"
    container:
      image: ${{ inputs.docker_image }}

    steps:
      - name: Validate inputs
        run: |
            if [[ "${{ inputs.enable_python_bindings }}" == "true" && "${{ inputs.build_type }}" != "debug" ]]; then
              echo "Error: enable_python_bindings=true requires build_type=debug (got '${{ inputs.build_type }}')"
              exit 1
            fi

      - name: Mark repo as safe for git
        run: |
            echo "Current user: $(whoami)"
            ls -ld $(pwd)
            git config --global --add safe.directory /__w/tt-xla/tt-xla
            git config --global --add safe.directory /__w/tt-xla/tt-xla/third_party/tt_forge_models

      - uses: actions/checkout@v4
        with:
            submodules: recursive
            repository: 'tenstorrent/tt-xla'

      - name: Override tt-mlir SHA mlir_override is set
        if: ${{ inputs.mlir_override }}
        shell: bash
        run: |
            # Update the CMakeLists.txt file with the new SHA
            sed -i "s/set(TT_MLIR_VERSION \".*\")/set(TT_MLIR_VERSION \"${{ inputs.mlir_override }}\")/" third_party/CMakeLists.txt

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
            echo "work-dir=$(pwd)" >> "$GITHUB_OUTPUT"
            echo "build-output-dir=$(pwd)/build" >> "$GITHUB_OUTPUT"
            echo "build-name=${{ inputs.build_type }}" >> "$GITHUB_OUTPUT"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
            create-symlink: true
            key: "${{ steps.strings.outputs.build-name }}-build"

      - name: Build with Python bindings
        if: inputs.enable_python_bindings == true
        shell: bash
        run: |
            source venv/activate
            # Build BEFORE setup.py so that tt-mlir is compiled with Python
            # bindings from the start (ExternalProject_Add won't rebuild if
            # the flag is added afterward). cmake caches TTMLIR_ENABLE_BINDINGS_PYTHON=ON
            # so setup.py's subsequent cmake reconfigure inherits it.
            # python_package/CMakeLists.txt skips the _ttnn.so RPATH patchelf
            # step when TTMLIR_ENABLE_BINDINGS_PYTHON=ON, allowing cmake --install
            # to complete successfully.
            #
            # TTXLA_ENABLE_EWHEEL_INSTALL=OFF: suppress the install-ttxla-python-packages
            # ALL target, which would otherwise (a) create a pjrt_plugin_tt.so symlink
            # in the source tree and (b) run `pip install -e`, both of which interfere
            # with the subsequent `setup.py bdist_wheel` wheel packaging step.
            cmake -G Ninja -B build \
              -DCMAKE_BUILD_TYPE=Debug \
              -DTTMLIR_ENABLE_BINDINGS_PYTHON=ON \
              -DTTXLA_ENABLE_EWHEEL_INSTALL=OFF \
              -DTTXLA_ENABLE_TOOLS=OFF
            cmake --build build

      - name: Build the wheel
        shell: bash
        env:
            TTMLIR_ENABLE_BINDINGS_PYTHON: ${{ inputs.enable_python_bindings && 'ON' || '' }}
        run: |
            source venv/activate
            cd ${{ steps.strings.outputs.work-dir }}/python_package
            python setup.py bdist_wheel --build-type ${{ inputs.build_type }}

      - name: Verify wheel contains pjrt_plugin_tt.so
        shell: bash
        run: |
            source venv/activate
            cd ${{ steps.strings.outputs.work-dir }}/python_package
            python3 - <<'EOF'
            import glob, sys, zipfile
            wheels = glob.glob("dist/pjrt_plugin_tt*.whl")
            if not wheels:
                print("ERROR: no wheel found in dist/")
                sys.exit(1)
            wheel = wheels[0]
            with zipfile.ZipFile(wheel) as zf:
                names = zf.namelist()
            so_files = [n for n in names if n.endswith(".so")]
            plugin_so = [n for n in so_files if "pjrt_plugin_tt.so" in n]
            print(f"Wheel: {wheel}")
            print(f"All .so files ({len(so_files)}):")
            for f in sorted(so_files):
                print(f"  {f}")
            if not plugin_so:
                print("ERROR: pjrt_plugin_tt.so is MISSING from the wheel!")
                sys.exit(1)
            print(f"OK: pjrt_plugin_tt.so found at {plugin_so[0]}")
            EOF

      - name: Validate build type of wheel build
        shell: bash
        run: |
            source venv/activate
            #Inspect the wheel build type on wheel file without installing the wheel
            uv pip install wheel-inspect
            wheel_summary=$(wheel2json ${{ steps.strings.outputs.work-dir }}/python_package/dist/pjrt_plugin_tt*.whl | jq -r '.dist_info.metadata.summary')
            match=$(echo "$wheel_summary" | grep -oP "build-type=${{ inputs.build_type }}" || true)
            echo "Wheel summary: $wheel_summary"
            if [ -z "$match" ]; then
                echo "Wheel summary does not match build type: ${{ inputs.build_type }}"
                exit 1
            fi

      - name: Upload the wheel
        id: upload-wheel
        uses: actions/upload-artifact@v4
        with:
            name: ${{ needs.check-existing-artifact.outputs.wheel_artifact_name }}
            path: ${{ steps.strings.outputs.work-dir }}/python_package/dist/pjrt_plugin_tt*.whl

      - name: Upload alchemist library and templates
        if: inputs.build_type == 'release'
        id: upload-alchemist
        uses: actions/upload-artifact@v4
        with:
            name: ${{ needs.check-existing-artifact.outputs.alchemist_artifact_name }}
            path: |
              ${{ steps.strings.outputs.work-dir }}/third_party/tt-mlir/src/tt-mlir/build/lib/libtt-alchemist-lib.so
              ${{ steps.strings.outputs.work-dir }}/third_party/tt-mlir/src/tt-mlir/build/tools/tt-alchemist/templates

      - name: Archive tt-mlir bindings
        if: inputs.enable_python_bindings == true
        shell: bash
        run: |
            TTMLIR_BUILD=${{ steps.strings.outputs.work-dir }}/third_party/tt-mlir/src/tt-mlir/build

            # ttrt is a Python package (build/python_packages/ttrt), not a compiled binary.
            # venv/activate adds build/bin to PATH, so create a wrapper script there so
            # the test job can call `ttrt` as a command after sourcing venv/activate.
            # We call __main__.py directly (not `python3 -m ttrt`) to avoid the Docker
            # image's pre-installed ttrt (which may lack __main__.py) shadowing our version.
            mkdir -p "${TTMLIR_BUILD}/bin"
            cat > "${TTMLIR_BUILD}/bin/ttrt" <<'WRAPPER'
            #!/usr/bin/env bash
            SCRIPT_DIR="$(cd "$(dirname "$(readlink -f "$0")")" && pwd)"
            exec python3 "${SCRIPT_DIR}/../python_packages/ttrt/__main__.py" "$@"
            WRAPPER
            chmod +x "${TTMLIR_BUILD}/bin/ttrt"

            # ttrt/__init__.py calls importlib.metadata.version('ttrt'), which requires
            # dist-info metadata that only exists after a pip install.  The test job has
            # a fresh venv, so we create a minimal dist-info here and restore it there.
            source venv/activate
            TTRT_VERSION=$(python3 -c \
              "from importlib.metadata import version; print(version('ttrt'))" \
              2>/dev/null || echo "0.0.0")
            DIST_INFO_DIR="${TTMLIR_BUILD}/dist-info/ttrt-${TTRT_VERSION}.dist-info"
            mkdir -p "${DIST_INFO_DIR}"
            printf "Metadata-Version: 2.1\nName: ttrt\nVersion: %s\n" "${TTRT_VERSION}" \
              > "${DIST_INFO_DIR}/METADATA"
            printf "Wheel-Version: 1.0\nGenerator: ttxla-ci\nRoot-Is-Purelib: true\nTag: py3-none-any\n" \
              > "${DIST_INFO_DIR}/WHEEL"
            touch "${DIST_INFO_DIR}/RECORD"

            # Assemble a staging directory so every path in the archive has the
            # exact name the test job expects, without modifying the live build tree.
            STAGING="${TTMLIR_BUILD}/archive-staging"
            mkdir -p "${STAGING}/bin" "${STAGING}/runtime"

            # bin/ttrt — real file (wrapper script created above); cp preserves +x.
            cp "${TTMLIR_BUILD}/bin/ttrt" "${STAGING}/bin/ttrt"

            # python_packages/ and runtime/python/ — both live in the tt-mlir build
            # tree and may contain symlinks back into the tt-mlir source tree.
            # The test runner doesn't have that source tree, so dereference with -rL.
            cp -rL "${TTMLIR_BUILD}/python_packages" "${STAGING}/python_packages"
            cp -rL "${TTMLIR_BUILD}/runtime/python" "${STAGING}/runtime/python"

            # dist-info — real files we created above.
            cp -r "${TTMLIR_BUILD}/dist-info" "${STAGING}/dist-info"

            # tt-metal/ — copy as-is (no -L) so dangling symlinks in the install
            # tree don't cause failures.  Required by pjrt_plugin_tt at import time.
            TTMLIR_INSTALL=${{ steps.strings.outputs.work-dir }}/third_party/tt-mlir/install
            cp -r "${TTMLIR_INSTALL}/tt-metal" "${STAGING}/tt-metal"

            # Archive from the staging directory — no --dereference needed because
            # every file is already real content.
            tar -czf builder-bindings.tar.gz \
              -C "${STAGING}" \
              bin/ttrt \
              python_packages \
              runtime/python \
              dist-info \
              tt-metal

      - name: Upload bindings artifact
        if: inputs.enable_python_bindings == true
        uses: actions/upload-artifact@v4
        with:
            name: ${{ needs.check-existing-artifact.outputs.bindings_artifact_name }}
            path: builder-bindings.tar.gz

      - name: Build vllm plugin wheel
        if: inputs.build_type == 'release'
        shell: bash
        run: |
            source venv/activate
            cd ${{ steps.strings.outputs.work-dir }}/integrations/vllm_plugin
            python setup.py bdist_wheel $(if [ '${{ inputs.debug_build }}' == 'true' ]; then echo '--code-coverage'; fi)

      - name: Upload the vllm plugin wheel
        if: inputs.build_type == 'release'
        id: upload-vllm-tt-wheel
        uses: actions/upload-artifact@v4
        with:
            name: ${{ needs.check-existing-artifact.outputs.wheel_release_vllm_tt_artifact_name }}
            path: ${{ steps.strings.outputs.work-dir }}/integrations/vllm_plugin/dist/vllm_tt*.whl
