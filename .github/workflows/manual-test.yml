name: Run Test

# This workflow allows manual triggering of tests with customizable presets, hardware targets, and directories.
# It builds the Docker image and project, sets up test parameters, and runs tests using the specified configuration.

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite preset options or custom'
        required: true
        type: choice
        options:
          - 'basic-test.json'
          - 'basic-test-nightly.json'
          - 'model-test-push.json'
          - 'model-test-full.json'
          - 'on-pr.json'
          - 'schedule-nightly.json'
          - 'model-test-passing.json'
          - 'model-test-xfail.json'
          - 'model-test-experimental.json'
          - 'model-test-training-xfail-weekly.json'
          - 'model-test-extended.json'
          - 'full-mlir-uplift-qualification.json'
          - 'model-test-passing-weekly.json'
          - 'model-test-weekly.json'
          - 'vllm-model-tests.json'
          - 'vllm-model-tests-nightly.json'
          - 'fusion-tests.json'
          - 'Custom'
      test_suite_custom:
        description: 'Custom test suite json'
        required: false
        type: string
      mlir_override:
        description: 'Git SHA of commit in tenstorrent/tt-mlir'
        required: false
        type: string
      manylinux_build:
        description: 'Build and use manylinux wheel'
        required: false
        type: boolean
        default: false
      run_multihost_dualt3k:
        description: 'Run multi-host dual T3K basic tests'
        required: false
        type: boolean
        default: false
      skip_build:
        description: 'Skip the tt-xla build and reuse artifacts from a previous run'
        required: false
        type: boolean
        default: false
      artifact_run_id:
        description: 'Run ID to download artifacts from (required when skip_build is true)'
        required: false
        type: string
      artifact_suffix:
        description: 'Artifact suffix from the previous run, e.g. -abc1234 (leave blank if none)'
        required: false
        type: string

permissions:
  packages: write
  checks: write

run-name: 'Test ( Suite: ${{ inputs.test_suite }} )'

jobs:
  build-image:
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit
    with:
      mlir_override: ${{ inputs.mlir_override }}
      dockbuild: ${{ inputs.manylinux_build && 'all' || 'ci' }}

  build-ttxla:
    if: ${{ !inputs.skip_build }}
    needs: build-image
    uses: ./.github/workflows/call-build.yml
    secrets: inherit
    with:
      docker_image: ${{ needs.build-image.outputs.docker-image }}
      docker_image_manylinux: ${{ needs.build-image.outputs.docker-image-manylinux }}
      mlir_override: ${{ inputs.mlir_override }}
      build_types: ${{ inputs.manylinux_build && 'release,manylinux' || 'release' }}

  # Resolves artifact metadata from either the build job or manual inputs,
  # so downstream jobs always have a consistent source regardless of skip_build.
  resolve-artifacts:
    runs-on: ubuntu-latest
    needs: [ build-image, build-ttxla ]
    if: always() && !cancelled()
    outputs:
      docker_image: ${{ needs.build-image.outputs.docker-image-base }}
      artifact_release_run_id: ${{ steps.resolve.outputs.artifact_release_run_id }}
      artifact_suffix: ${{ steps.resolve.outputs.artifact_suffix }}
    steps:
      - name: Resolve artifact run ID and suffix
        id: resolve
        run: |
          if [[ "${{ inputs.skip_build }}" == "true" ]]; then
            echo "artifact_release_run_id=${{ inputs.artifact_run_id }}" >> "$GITHUB_OUTPUT"
            echo "artifact_suffix=${{ inputs.artifact_suffix }}" >> "$GITHUB_OUTPUT"
          else
            echo "artifact_release_run_id=${{ needs.build-ttxla.outputs.artifacts_run_id }}" >> "$GITHUB_OUTPUT"
            echo "artifact_suffix=${{ needs.build-ttxla.outputs.artifact_suffix }}" >> "$GITHUB_OUTPUT"
          fi

  test-multihost-dualt3k:
    if: always() && !cancelled() && !failure() && inputs.run_multihost_dualt3k
    uses: ./.github/workflows/call-test-multihost-dualt3k.yml
    needs: [ resolve-artifacts ]
    secrets: inherit
    with:
      docker_image: ${{ needs.resolve-artifacts.outputs.docker_image }}
      artifact_release_run_id: ${{ needs.resolve-artifacts.outputs.artifact_release_run_id }}
      artifact_suffix: ${{ needs.resolve-artifacts.outputs.artifact_suffix }}
