name: Run Test

# This workflow allows manual triggering of tests with customizable presets, hardware targets, and directories.
# It builds the Docker image and (by default) the tt-xla wheel, sets up test parameters, and runs tests.
# With skip_build, only the Docker image is built; wheels are downloaded via wheel_artifact_run_id and wheel_artifact_name.

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite preset options or custom'
        required: true
        type: choice
        options:
          - 'basic-test.json'
          - 'basic-test-nightly.json'
          - 'model-test-push.json'
          - 'model-test-full.json'
          - 'on-pr.json'
          - 'schedule-nightly.json'
          - 'model-test-passing.json'
          - 'model-test-xfail.json'
          - 'model-test-experimental.json'
          - 'model-test-training-xfail-weekly.json'
          - 'model-test-extended.json'
          - 'full-mlir-uplift-qualification.json'
          - 'model-test-passing-weekly.json'
          - 'model-test-weekly.json'
          - 'vllm-model-tests.json'
          - 'vllm-model-tests-nightly.json'
          - 'fusion-tests.json'
          - 'Custom'
      test_suite_custom:
        description: 'Custom test suite json'
        required: false
        type: string
      mlir_override:
        description: 'Git SHA of commit in tenstorrent/tt-mlir'
        required: false
        type: string
      manylinux_build:
        description: 'Build and use manylinux wheel'
        required: false
        type: boolean
        default: false
      run_multihost_dualt3k:
        description: 'Run multi-host dual T3K basic tests'
        required: false
        type: boolean
        default: false
      skip_build:
        description: 'Skip tt-xla wheel build; download the wheel by name from wheel_artifact_run_id (Docker image is still built)'
        required: false
        type: boolean
        default: true
      wheel_artifact_run_id:
        description: 'Workflow run ID for gh run download (used when skip_build is true)'
        required: false
        type: string
        default: '24098031766'
      wheel_artifact_name:
        description: 'Exact artifact name on that run (e.g. xla-whl-release, xla-whl-manylinux, xla-whl-release-abc1234)'
        required: false
        type: string
        default: 'xla-whl-release'

permissions:
  actions: write
  packages: write
  checks: write
  contents: read

run-name: "Test ( Suite: ${{ inputs.test_suite }} )${{ inputs.skip_build && format(' [{0} @ {1}]', inputs.wheel_artifact_name, inputs.wheel_artifact_run_id) || '' }}"

jobs:
  build-image:
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit
    with:
      mlir_override: ${{ inputs.mlir_override }}
      dockbuild: ${{ inputs.manylinux_build && 'all' || 'ci' }}

  build-ttxla:
    if: ${{ !inputs.skip_build }}
    needs: build-image
    uses: ./.github/workflows/call-build.yml
    secrets: inherit
    with:
      docker_image: ${{ needs.build-image.outputs.docker-image }}
      docker_image_manylinux: ${{ needs.build-image.outputs.docker-image-manylinux }}
      mlir_override: ${{ inputs.mlir_override }}
      build_types: ${{ inputs.manylinux_build && 'release,manylinux' || 'release' }}

  test:
    if: >-
      always() && !cancelled()
      && needs.build-image.result == 'success'
      && (needs.build-ttxla.result == 'success' || needs.build-ttxla.result == 'skipped')
      && inputs.preset != 'tt_forge_models'
    uses: ./.github/workflows/call-test.yml
    needs: [ build-image, build-ttxla ]
    secrets: inherit
    with:
      test_suite: ${{ inputs.test_suite }}
      test_suite_custom: ${{ inputs.test_suite_custom }}
      docker_image: ${{ needs.build-image.outputs.docker-image-base }}
      artifact_release_run_id: >-
        ${{ inputs.skip_build && inputs.wheel_artifact_run_id
        || (inputs.manylinux_build && github.run_id || needs.build-ttxla.outputs.artifacts_run_id) }}
      artifact_suffix: ${{ inputs.skip_build && '' || needs.build-ttxla.outputs.artifact_suffix }}
      wheel_artifact_name: ${{ inputs.skip_build && inputs.wheel_artifact_name || '' }}
      wheel_build: ${{ inputs.manylinux_build && 'manylinux' || 'release' }}

  test-multihost-dualt3k:
    if: >-
      always() && !cancelled() && inputs.run_multihost_dualt3k
      && needs.build-image.result == 'success'
      && (needs.build-ttxla.result == 'success' || needs.build-ttxla.result == 'skipped')
    uses: ./.github/workflows/call-test-multihost-dualt3k.yml
    needs: [ build-image, build-ttxla ]
    secrets: inherit
    with:
      docker_image: ${{ needs.build-image.outputs.docker-image-base }}
      artifact_release_run_id: >-
        ${{ inputs.skip_build && inputs.wheel_artifact_run_id || needs.build-ttxla.outputs.artifacts_run_id }}
      artifact_suffix: ${{ inputs.skip_build && '' || needs.build-ttxla.outputs.artifact_suffix }}
      wheel_artifact_name: ${{ inputs.skip_build && inputs.wheel_artifact_name || '' }}
      wheel_build: ${{ inputs.manylinux_build && 'manylinux' || 'release' }}
