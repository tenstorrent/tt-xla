name: Run Test

# This workflow allows manual triggering of tests with customizable presets, hardware targets, and directories.
# It builds the Docker image and project, sets up test parameters, and runs tests using the specified configuration.

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite preset options or custom'
        required: true
        type: choice
        options:
          - 'basic-test.json'
          - 'basic-test-nightly.json'
          - 'model-test-push.json'
          - 'model-test-full.json'
          - 'on-pr.json'
          - 'schedule-nightly.json'
          - 'model-test-passing.json'
          - 'model-test-xfail.json'
          - 'model-test-experimental.json'
          - 'model-test-training-xfail-weekly.json'
          - 'model-test-extended.json'
          - 'mlir-uplift-qualification.json'
          - 'model-test-passing-weekly.json'
          - 'model-test-weekly.json'
          - 'vllm-model-tests.json'
          - 'vllm-model-tests-nightly.json'
          - 'fusion-tests.json'
          - 'Custom'
      test_suite_custom:
        description: 'Custom test suite json'
        required: false
        type: string
      mlir_override:
        description: 'Git SHA of commit in tenstorrent/tt-mlir'
        required: false
        type: string
      manylinux_build:
        description: 'Build and use manylinux wheel'
        required: false
        type: boolean
        default: false

permissions:
  packages: write
  checks: write

run-name: 'Test ( Suite: ${{ inputs.test_suite }} )'

jobs:
  build-image:
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit
    with:
      mlir_override: ${{ inputs.mlir_override }}
      dockbuild: ${{ inputs.manylinux_build && 'all' || 'ci' }}

  fetch-torch-xla-wheel:
    runs-on: wormhole_b0
    env:
      DOCKER_CACHE_DIR: /mnt/dockercache/models/tt-ci-models-private/
    outputs:
      torch_xla_wheel_artifact_name: ${{ steps.set-name.outputs.artifact_name }}
    steps:
      - name: Fetch torch-xla wheel from cache
        id: fetch
        continue-on-error: true
        run: |
          WHEEL_NAME="torch_xla-2.9.0+git0df1f5f-cp312-cp312-linux_x86_64.whl"
          SRC="${DOCKER_CACHE_DIR}/wheels/${WHEEL_NAME}"
          if [[ ! -f "$SRC" ]]; then
            echo "Wheel not found at $SRC, continuing without it"
            echo "fetched=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          WHEELS_DIR="${RUNNER_TEMP:-/tmp}/wheels"
          mkdir -p "$WHEELS_DIR"
          cp "$SRC" "$WHEELS_DIR/"
          echo "wheel_path=${WHEELS_DIR}/${WHEEL_NAME}" >> $GITHUB_OUTPUT
          echo "fetched=true" >> $GITHUB_OUTPUT

      - name: Upload torch-xla wheel artifact
        if: steps.fetch.outputs.fetched == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: torch-xla-wheel
          path: ${{ steps.fetch.outputs.wheel_path }}

      - name: Set artifact name output
        id: set-name
        run: |
          if [[ "${{ steps.fetch.outputs.fetched }}" == "true" ]]; then
            echo "artifact_name=torch-xla-wheel" >> $GITHUB_OUTPUT
          else
            echo "artifact_name=" >> $GITHUB_OUTPUT
          fi

  build-ttxla:
    needs: [ build-image, fetch-torch-xla-wheel ]
    uses: ./.github/workflows/call-build.yml
    secrets: inherit
    with:
      docker_image: ${{ needs.build-image.outputs.docker-image }}
      mlir_override: ${{ inputs.mlir_override }}
      force_rebuild: ${{ inputs.manylinux_build }} # Force rebuild for non-manylinux build when manylinux_build is true, to ensure the artifact is available for testing.
      torch_xla_wheel_artifact_name: ${{ needs.fetch-torch-xla-wheel.outputs.torch_xla_wheel_artifact_name }}

  build-manylinux-ttxla:
    if: inputs.manylinux_build
    needs: build-image
    uses: ./.github/workflows/call-build-manylinux.yml
    secrets: inherit
    with:
      docker-image: ${{ needs.build-image.outputs.docker-image-manylinux }}

  test:
    if: always() && !cancelled() && !failure() && inputs.preset != 'tt_forge_models'
    uses: ./.github/workflows/call-test.yml
    needs: [ build-image, build-ttxla, build-manylinux-ttxla, fetch-torch-xla-wheel ]
    secrets: inherit
    with:
      test_suite: ${{ inputs.test_suite }}
      test_suite_custom: ${{ inputs.test_suite_custom }}
      docker_image: ${{ needs.build-image.outputs.docker-image-base }}
      artifact_release_run_id: ${{ inputs.manylinux_build && github.run_id || needs.build-ttxla.outputs.artifacts_run_id }}
      wheel_release_artifact_name: ${{ inputs.manylinux_build && 'xla-whl-manylinux' || needs.build-ttxla.outputs.wheel_artifact_name }}
      wheel_release_vllm_tt_artifact_name: ${{ needs.build-ttxla.outputs.wheel_release_vllm_tt_artifact_name }}
      alchemist_artifact_name: ${{ needs.build-ttxla.outputs.alchemist_artifact_name }}
      torch_xla_wheel_artifact_name: ${{ needs.fetch-torch-xla-wheel.outputs.torch_xla_wheel_artifact_name }}
