name: Run Test

# This workflow allows manual triggering of tests with customizable presets, hardware targets, and directories.
# It builds the Docker image and project, sets up test parameters, and runs tests using the specified configuration.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write
  checks: write
  deployments: write

jobs:

  build-docs:
    runs-on: ubuntu-latest

    container:
      image: "ghcr.io/tenstorrent/tt-xla/tt-xla-ci-ubuntu-22-04:latest"

    env:
      MDBOOK_VERSION: 0.4.36

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "work-dir=$(pwd)" >> "$GITHUB_OUTPUT"
        echo "build-output-dir=$(pwd)/build" >> "$GITHUB_OUTPUT"

    - name: Git safe dir
      run: git config --global --add safe.directory ${{ steps.strings.outputs.work-dir }}

    - name: Install system deps (Doxygen, Rust, Cargo)
      shell: bash
      run: |
        apt-get update
        apt-get install -y doxygen curl

        curl https://sh.rustup.rs -sSf | sh -s -- -y
        source "$HOME/.cargo/env"

        cargo install --version ${MDBOOK_VERSION} mdbook --locked

        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v6

    - name: Build Docs
      shell: bash
      run: |
        source venv/activate
        source "$HOME/.cargo/env"
        cmake -G Ninja -B build
        cmake --build build -- docs

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: ./build/docs/book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
