name: Run Test

# This workflow allows manual triggering of tests with customizable presets, hardware targets, and directories.
# It builds the Docker image and project, sets up test parameters, and runs tests using the specified configuration.

on:
  workflow_dispatch:

permissions:
  packages: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Set tag
        shell: bash
        id: set-tag
        run: |
          # Explicitly set bash to not expand variables unexpectedly
          set -euo pipefail

          # Source the version file
          source .version

          # Explicitly construct the version to avoid any interpolation issues
          tag="${MAJOR}.${MINOR}.${PATCH}"

          echo "DEBUG: MAJOR=$MAJOR, MINOR=$MINOR, PATCH=$PATCH"
          echo "DEBUG: Constructed tag=$tag"

          if [[ "${{ inputs.is_nightly_release }}" == "true" ]]; then
            nightly_release_suffix="dev$(date -u +'%Y%m%d%H%M%S')"
            tag="${tag}.${nightly_release_suffix}"
            echo "DEBUG: Nightly tag=$tag"
          fi

          echo "tag=$tag"
          echo "tag=${tag}"
          echo "tag=$tag" >> $GITHUB_OUTPUT
