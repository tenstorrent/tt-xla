name: Run Test

# This workflow allows manual triggering of tests with customizable presets, hardware targets, and directories.
# It builds the Docker image and project, sets up test parameters, and runs tests using the specified configuration.

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite preset options or custom'
        required: true
        type: choice
        options:
          - 'basic-test.json'
          - 'basic-test-nightly.json'
          - 'model-test-push.json'
          - 'model-test-full.json'
          - 'on-pr.json'
          - 'schedule-nightly.json'
          - 'model-test-passing.json'
          - 'model-test-xfail.json'
          - 'model-test-experimental.json'
          - 'model-test-training-xfail-weekly.json'
          - 'model-test-extended.json'
          - 'full-mlir-uplift-qualification.json'
          - 'model-test-passing-weekly.json'
          - 'model-test-weekly.json'
          - 'vllm-model-tests.json'
          - 'vllm-model-tests-nightly.json'
          - 'fusion-tests.json'
          - 'basic-multihost-test.json'
          - 'Custom'
        default: 'basic-test.json'
      test_suite_custom:
        description: 'Custom test suite json'
        required: false
        type: string
      mlir_override:
        description: 'Git SHA of commit in tenstorrent/tt-mlir'
        required: false
        type: string
      manylinux_build:
        description: 'Build and use manylinux wheel'
        required: false
        type: boolean
        default: false
      run_multihost_dualt3k:
        description: 'Run multi-host dual T3K basic tests'
        required: false
        type: boolean
        default: false
      torchxla_build_run_id:
        description: 'Manual torch-xla build run ID'
        required: false
        type: string
        default: ''
      ttxla_build_run_id:
        description: 'Run ID of a previous workflow that already contains the tt-xla wheel artifact(s). When provided, the build steps are skipped and the wheel is sourced from that run.'
        required: false
        type: string
        default: '24346936850'

permissions:
  actions: write
  packages: write
  checks: write
  contents: read

run-name: 'Test ( Suite: ${{ inputs.test_suite }} )'

jobs:
  build-image:
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit
    with:
      mlir_override: ${{ inputs.mlir_override }}
      dockbuild: ${{ inputs.manylinux_build && 'all' || 'ci' }}

  build-ttxla:
    if: ${{ inputs.ttxla_build_run_id == '' }}
    needs: build-image
    uses: ./.github/workflows/call-build.yml
    secrets: inherit
    with:
      docker_image: ${{ needs.build-image.outputs.docker-image }}
      docker_image_manylinux: ${{ needs.build-image.outputs.docker-image-manylinux }}
      mlir_override: ${{ inputs.mlir_override }}
      build_types: ${{ inputs.manylinux_build && 'release,manylinux' || 'release' }}

  test:
    if: always() && !cancelled() && !failure() && inputs.preset != 'tt_forge_models'
    uses: ./.github/workflows/call-test.yml
    needs: [ build-image, build-ttxla ]
    secrets: inherit
    with:
      test_suite: ${{ inputs.test_suite }}
      test_suite_custom: ${{ inputs.test_suite_custom }}
      docker_image: ${{ needs.build-image.outputs.docker-image-base }}
      artifact_release_run_id: ${{ inputs.ttxla_build_run_id != '' && inputs.ttxla_build_run_id || (inputs.manylinux_build && github.run_id || needs.build-ttxla.outputs.artifacts_run_id) }}
      artifact_suffix: ${{ inputs.ttxla_build_run_id == '' && needs.build-ttxla.outputs.artifact_suffix || '' }}
      wheel_build: ${{ inputs.manylinux_build && 'manylinux' || 'release' }}
      torchxla_build_run_id: ${{ inputs.torchxla_build_run_id }}

  test-multihost-dualt3k:
    if: always() && !cancelled() && !failure() && inputs.run_multihost_dualt3k
    uses: ./.github/workflows/call-test-multihost-dualt3k.yml
    needs: [ build-image, build-ttxla ]
    secrets: inherit
    with:
      docker_image: ${{ needs.build-image.outputs.docker-image-base }}
      artifact_release_run_id: ${{ inputs.ttxla_build_run_id != '' && inputs.ttxla_build_run_id || needs.build-ttxla.outputs.artifacts_run_id }}
      artifact_suffix: ${{ inputs.ttxla_build_run_id == '' && needs.build-ttxla.outputs.artifact_suffix || '' }}
