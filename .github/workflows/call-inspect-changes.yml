name: Inspect Changes

on:
  workflow_call:
    outputs:
      skip-build-and-test:
        description: "True if only documentation/non-build files changed."
        value: ${{ jobs.inspect-changes.outputs.skip-build-and-test }}
      run-pr-tests:
        description: "True if code changes require PR tests."
        value: ${{ jobs.inspect-changes.outputs.run-pr-tests }}
      run-perf-tests:
        description: "True if performance-related files changed."
        value: ${{ jobs.inspect-changes.outputs.run-perf-tests }}
      only-run-forge-models:
        description: "True if only forge-models runner files changed."
        value: ${{ jobs.inspect-changes.outputs.only-run-forge-models }}
      uplift-additional-test-suites:
        description: "Test suite presets for detected uplifts, colon-separated"
        value: ${{ jobs.inspect-changes.outputs.uplift-additional-test-suites }}
      detected-uplifts:
        description: "Colon-separated list of detected uplifts"
        value: ${{ jobs.inspect-changes.outputs.detected-uplifts }}
      wheel-changes:
        description: "True if wheel build related files changed."
        value: ${{ jobs.inspect-changes.outputs.wheel-changes }}

jobs:
  inspect-changes:
    runs-on: ubuntu-latest
    outputs:
      skip-build-and-test: ${{ steps.inspect.outputs.skip-build-and-test }}
      run-pr-tests: ${{ steps.inspect.outputs.run-pr-tests }}
      run-perf-tests: ${{ steps.inspect.outputs.run-perf-tests }}
      only-run-forge-models: ${{ steps.inspect.outputs.only-run-forge-models }}
      uplift-additional-test-suites: ${{ steps.inspect.outputs.uplift-additional-test-suites }}
      detected-uplifts: ${{ steps.inspect.outputs.detected-uplifts }}
      wheel-changes: ${{ steps.inspect.outputs.wheel-changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Inspect changes
        id: inspect
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          skip_build_and_test=true
          run_pr_tests=false
          run_perf_tests=false
          only_run_forge_models=false
          detected_uplifts=""
          uplift_additional_test_suites=""
          wheel_changes=false

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only --repo ${{ github.repository }})
            echo "Changed files:"
            echo "$CHANGED_FILES"

            # Define patterns for files that can skip build/test
            # Only allow docs, markdown, gitignore, LICENSE, CODEOWNERS, and test config files
            skip_patterns=(
              "*.md"
              "*.gitignore"
              "*LICENSE*"
              "docs/*"
              "*CODEOWNERS*"
              ".github/workflows/test-matrix-presets/basic-test-nightly.json"
              ".github/workflows/test-matrix-presets/model-test-experimental.json"
              ".github/workflows/test-matrix-presets/model-test-passing.json"
              ".github/workflows/test-matrix-presets/model-test-xfail.json"
              ".github/workflows/test-matrix-presets/model-test-passing-weekly.json"
              ".github/workflows/test-matrix-presets/model-test-xfail-weekly.json"
              ".github/workflows/schedule-*"
              ".github/workflows/manual-test.yml"
              ".github/workflows/manual-test-single.yml"
              ".github/workflows/push-main.yml"
              ".github/scripts/download_artifacts.py"
              ".github/scripts/summarize_junit_xmls.py"
              ".github/actions/inspect-changes/*.yml"
              "tests/runner/*"
            )

            for file in $CHANGED_FILES; do
              # Check if file matches any skip pattern
              file_can_skip=false
              for pattern in "${skip_patterns[@]}"; do
                if [[ $file == $pattern ]]; then
                  file_can_skip=true
                  break
                fi
              done

              # If ANY file doesn't match skip patterns, we cannot skip build/test
              if [[ $file_can_skip == false ]]; then
                echo "Cannot skip test because of change to file: $file"
                skip_build_and_test=false
                run_pr_tests=true
              fi

              # Example: detect perf uplift (customize as needed)
              if [[ $file == *"perf"* ]]; then
                run_perf_tests=true
              fi
            done

            # Just run forge tests if everything else is skipped but we detect changes under tests/runner/.
            if [[ "$skip_build_and_test" == "true" ]]; then
              push_changed=false
              yml_changed=false
              pip install pyyaml pytest jsonschema
              git fetch origin "${{ github.event.pull_request.base.sha }}"
              for file in $CHANGED_FILES; do
                if [[ $file =~ ^tests/runner/.+\.(yml|yaml)$ ]]; then
                  echo "Config file $file changed"
                  yml_changed=true
                  # Skip placeholder files - they don't have a test_config section
                  if [[ $file == *"placeholders"* ]]; then
                    continue
                  fi
                  # Get the original file content before PR changes
                  rm -f .original_file.yml
                  git show "${{ github.event.pull_request.base.sha }}:$file" >.original_file.yml
                  res=$(python tests/runner/test_config/model_diff.py "$file" .original_file.yml)
                  if [ -z "$res" ] || [ "$res" -eq 1 ]; then
                    push_changed=true
                  fi
                elif [[ $file == tests/runner/* ]]; then
                  push_changed=true
                fi
              done
              if [[ $push_changed == true ]]; then
                echo "Other changes under tests/runner/ detected. Will run push tests."
                only_run_forge_models=true
                skip_build_and_test=false
              elif [[ $yml_changed == true ]]; then
                echo "Only yml config changes under tests/runner/. Validating changed config files against schema."
                python tests/runner/validate_test_config.py
              fi
            fi

            tmp_dir=$(mktemp -d)
            echo "$CHANGED_FILES" > "$tmp_dir/changed_files"
            gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > "$tmp_dir/pr_diff" || true
            uplift_json=$(python .github/scripts/uplift/detect_uplift.py .github/scripts/uplift/uplift-config.json "$tmp_dir/changed_files" "$tmp_dir/pr_diff")
            rm -rf "$tmp_dir"
            echo "Uplift detection result: $uplift_json"
            detected_uplifts=$(echo "$uplift_json" | jq -r '.uplifts | join(":")')
            uplift_additional_test_suites=$(echo "$uplift_json" | jq -r '.test_matrices | join(":")')

            # Check wheel build file changes
            wheel_patterns=(
              "CMakeLists.txt"
              "**/CMakeLists.txt"
              "python_package/*"
            )

            for file in $CHANGED_FILES; do
              for pattern in "${wheel_patterns[@]}"; do
                if [[ $file == $pattern ]]; then
                  echo "Wheel-related file changed: $file"
                  wheel_changes=true
                break 2
                fi
              done
            done

          else
            skip_build_and_test=false
            run_pr_tests=true
          fi

          # Debug Purposes
          echo "detected-uplifts=${detected_uplifts:-}"
          echo "uplift-additional-test-suites=${uplift_additional_test_suites:-}"
          echo "wheel-changes=$wheel_changes"
          echo "GITHUB_HEAD_REF=${GITHUB_HEAD_REF}"

          echo "skip-build-and-test=$skip_build_and_test" >> "$GITHUB_OUTPUT"
          echo "run-pr-tests=$run_pr_tests" >> "$GITHUB_OUTPUT"
          echo "run-perf-tests=$run_perf_tests" >> "$GITHUB_OUTPUT"
          echo "only-run-forge-models=$only_run_forge_models" >> "$GITHUB_OUTPUT"
          echo "uplift-additional-test-suites=${uplift_additional_test_suites:-}" >> "$GITHUB_OUTPUT"
          echo "detected-uplifts=${detected_uplifts:-}" >> "$GITHUB_OUTPUT"
          echo "wheel-changes=$wheel_changes" >> "$GITHUB_OUTPUT"
