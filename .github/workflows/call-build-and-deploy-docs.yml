
# This workflow builds the project documentation using a specified Docker image, installs necessary dependencies,
# and deploys the generated docs to GitHub Pages.

name: Build Docs

on:
  workflow_call:
    inputs:
      docker_image:
        description: 'Docker image to use for build'
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write
  checks: write
  deployments: write

jobs:

  build-docs:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      SEARCH_API_BASE: https://csl860x2oj.execute-api.us-east-2.amazonaws.com/prod
      DOC_CATALOG_SOURCE_ID: docs-tenstorrent
      DOC_SITE_BASE_URL: https://docs.tenstorrent.com/tt-xla
      DOCS_ID_NAMESPACE: tt-xla
      DOCS_INDEX_VERSION: latest
      DOCS_OUTPUT_DIR: docs/build/html
      DOCS_SEARCH_INGEST_API_KEY: ${{ secrets.DOCS_SEARCH_INGEST_API_KEY_DOCS_TENSTORRENT }}

    container:
      image: ${{ inputs.docker_image }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "work-dir=$(pwd)" >> "$GITHUB_OUTPUT"

    - name: Git safe dir
      run: git config --global --add safe.directory ${{ steps.strings.outputs.work-dir }}

    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v6

    - name: Build Docs
      shell: bash
      run: |
        bash docs/build_docs.sh

    - name: Warn if search ingest key is missing
      if: ${{ env.DOCS_SEARCH_INGEST_API_KEY == '' }}
      run: |
        echo "::warning::Skipping OpenSearch indexing: DOCS_SEARCH_INGEST_API_KEY_DOCS_TENSTORRENT secret not set."

    - name: Index docs into OpenSearch
      if: ${{ env.DOCS_SEARCH_INGEST_API_KEY != '' }}
      continue-on-error: true
      run: python scripts/index_remote_search.py

    - name: Upload artifact
      uses: actions/upload-pages-artifact@57f0e8492b437b7818227931fef2faa1a379839b # v4 + upload-artifact@v7 update
      with:
        path: ./docs/build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
