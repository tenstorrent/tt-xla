name: Performance Benchmark

on:
  workflow_dispatch:
    inputs:
      mlir_override:
        description: 'Git SHA of commit in tenstorrent/tt-mlir'
        required: false
        type: string
      docker_image:
        description: 'Docker image to use'
        required: false
        type: string
        default: 'ghcr.io/tenstorrent/tt-xla/tt-xla-base-ubuntu-22-04:latest'
      test_filter:
        description: "Filter tests based on the name property. One or more strings which are contained (case insensitive) in the name (e.g. 'resn' or 'resn,mni,yol')"
        required: false
        type: string
      runs-on-filter:
        description: "Architecture you want to run the tests on"
        required: false
        type: choice
        options:
          - All
          - n150
          - p150
          - n300-llmbox
          - galaxy-wh-6u
        default: n150
      skip-device-perf:
        description: "Skip device performance measurement"
        required: false
        type: boolean
        default: true
      perf_regression_check:
        description: "Enable perf metrics regression testing"
        required: false
        type: boolean
        default: false
      use_docker_wheel:
        description: "Use wheel from docker"
        required: false
        type: boolean
        default: false
      sh-runner:
        description: "Run on shared runner"
        required: false
        type: boolean
        default: true
      should_build_wheel:
        description: "Should the xla wheel be built"
        required: false
        type: boolean
        default: true
      artifact_release_run_id:
        description: "Run ID that already contains the wheel artifact (used when should_build_wheel=false)"
        required: false
        type: string
        default: ""
      wheel_release_artifact_name:
        description: "Wheel artifact name to download (used when should_build_wheel=false)"
        required: false
        type: string
        default: "xla-whl-release"

permissions:
  packages: write
  checks: write
  contents: write
  id-token: write
  actions: write

jobs:
  docker-build:
    if: ${{ !inputs.use_docker_wheel && inputs.should_build_wheel }}
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit
    with:
      mlir_override: ${{ inputs.mlir_override }}

  build:
    needs: docker-build
    if: ${{ !inputs.use_docker_wheel && inputs.should_build_wheel }}
    uses: ./.github/workflows/call-build.yml
    secrets: inherit
    with:
      mlir_override: ${{ inputs.mlir_override }}
      docker_image: ${{ needs.docker-build.outputs.docker-image }}

  set-inputs:
    runs-on: ubuntu-latest
    outputs:
      filter: ${{ steps.set-perf-benchmarks.outputs.filter }}
    steps:
    - name: Set Inputs and Summary
      id: set-perf-benchmarks
      shell: bash
      run: |
        # Prepare the advanced filter for the perf benchmarks
        echo "[" > adv_filter.json
        if [ "${{ inputs.runs-on-filter }}" = "All" ]; then
          echo '{ "skip": false, "accuracy-testing": false }' >> adv_filter.json
        else
          echo '{"runs-on": "${{ inputs.runs-on-filter }}", "accuracy-testing": false }' >> adv_filter.json
        fi
        if [ -n "${{ inputs.test_filter }}" ]; then
          echo ',{"filter": "${{ inputs.test_filter }}"}' >> adv_filter.json
        fi
        echo "]" >> adv_filter.json
        filter=$(cat adv_filter.json | jq -r -c '.')
        echo "filter=$filter" >> $GITHUB_OUTPUT

        # Set up the summary for the job
        echo "### Perf benchmarks inputs" >> $GITHUB_STEP_SUMMARY
        echo "Test filter: ${{ inputs.test_filter }}" >> $GITHUB_STEP_SUMMARY
        echo "Runs-on filter: ${{ inputs.runs-on-filter }}" >> $GITHUB_STEP_SUMMARY
        echo "Skip device perf: ${{ inputs.skip-device-perf }}" >> $GITHUB_STEP_SUMMARY
        echo "Perf regression check: ${{ inputs.perf_regression_check }}" >> $GITHUB_STEP_SUMMARY

  run-perf-benchmarks:
    needs: [set-inputs, build]
    if: ${{ !cancelled() && needs.set-inputs.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    secrets: inherit
    uses: ./.github/workflows/call-filtered-perf-tests.yml
    with:
      adv_filter: ${{ needs.set-inputs.outputs.filter }}
      docker_image: ${{ inputs.docker_image }}
      artifact_run_id: ${{ inputs.should_build_wheel && needs.build.outputs.artifacts_run_id || inputs.artifact_release_run_id }}
      wheel_artifact_name: ${{ inputs.should_build_wheel && format('xla-whl-release{0}',needs.build.outputs.artifact_suffix) || inputs.wheel_release_artifact_name }}
      use_docker_wheel: ${{ inputs.use_docker_wheel || false }}
      skip-device-perf: ${{ inputs.skip-device-perf || false }}
      perf_regression_check: ${{ inputs.perf_regression_check || false }}
      sh-runner: ${{ inputs.sh-runner || false }}

  fail-notify:
    if: always()
    needs:
      - run-perf-benchmarks
    runs-on: ubuntu-latest
    outputs:
      failed: ${{ steps.check.outputs.failure }}
    steps:
      - name: Check if the needed jobs succeeded or failed
        id: check
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
