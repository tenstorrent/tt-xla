name: Performance Benchmark

on:
  workflow_dispatch:
    inputs:
      mlir_override:
        description: 'Git SHA of commit in tenstorrent/tt-mlir'
        required: false
        type: string
      test_filter:
        description: "Filter tests by name (pytest -k expression), e.g. 'resnet' or 'resnet or mnist'"
        required: false
        type: string
      runs-on-filter:
        description: "Architecture you want to run the tests on"
        required: false
        type: choice
        options:
          - All
          - n150
          - p150-perf
          - n300-llmbox
          - galaxy-wh-6u
          - qb2-blackhole
        default: n150
      regression_check:
        description: "Enable perf metrics regression testing"
        required: false
        type: boolean
        default: false
      torchxla_build_run_id:
        description: 'Manual torch-xla build run ID'
        required: false
        type: string
        default: ''
      manylinux_build:
        description: 'Build and use manylinux wheel'
        required: false
        type: boolean
        default: false
      check_fusions:
        description: "Verify expected fusion ops are present in compiled IR"
        required: false
        type: boolean
        default: false


permissions:
  packages: write
  checks: write
  contents: write
  id-token: write
  actions: write

jobs:
  docker-build:
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit
    with:
      mlir_override: ${{ inputs.mlir_override }}
      dockbuild: ${{ inputs.manylinux_build && 'all' || 'ci' }}

  build:
    needs: docker-build
    uses: ./.github/workflows/call-build.yml
    secrets: inherit
    with:
      mlir_override: ${{ inputs.mlir_override }}
      docker_image: ${{ needs.docker-build.outputs.docker-image }}
      docker_image_manylinux: ${{ needs.docker-build.outputs.docker-image-manylinux }}
      build_types: ${{ inputs.manylinux_build && 'release,manylinux' || 'release' }}

  # Build a Custom test-matrix-preset (one batched perf job per selected architecture)
  # from the dispatch inputs. The test name filter maps to pytest -k (contains); perf
  # selection is by mark, exactly like the nightly perf preset. vLLM benchmarks are not
  # included here (use the nightly perf suite for those).
  set-inputs:
    runs-on: ubuntu-latest
    outputs:
      test_suite_custom: ${{ steps.build-suite.outputs.test_suite_custom }}
    steps:
    - name: Build custom perf test suite
      id: build-suite
      shell: bash
      env:
        RUNS_ON_FILTER: ${{ inputs.runs-on-filter }}
        TEST_FILTER: ${{ inputs.test_filter }}
        CHECK_FUSIONS: ${{ inputs.check_fusions }}
      run: |
        if [ "$RUNS_ON_FILTER" = "All" ]; then
          archs=(n150 p150-perf n300-llmbox galaxy-wh-6u qb2-blackhole)
        else
          archs=("$RUNS_ON_FILTER")
        fi

        # Dedicated perf runner label per architecture (only n150 differs from its mark).
        runner_for() { case "$1" in n150) echo n150-perf;; *) echo "$1";; esac; }
        mark_for() {
          case "$1" in
            n150) echo n150;;
            p150-perf) echo p150;;
            n300-llmbox) echo n300_llmbox;;
            galaxy-wh-6u) echo galaxy_wh_6u;;
            qb2-blackhole) echo qb2_blackhole;;
          esac
        }

        args="--confcutdir=tests/benchmark"
        if [ "$CHECK_FUSIONS" = "true" ]; then args="$args --check-fusions"; fi

        entries="[]"
        for a in "${archs[@]}"; do
          runner=$(runner_for "$a")
          mark=$(mark_for "$a")
          entry=$(jq -nc \
            --arg runner "$runner" \
            --arg name "perf_${mark}" \
            --arg mark "benchmark and ${mark} and not vllm" \
            --arg args "$args" \
            '{"runs-on":$runner, name:$name, dir:"./tests/benchmark", "test-mark":$mark, args:$args}')
          if [ -n "$TEST_FILTER" ]; then
            entry=$(echo "$entry" | jq -c --arg c "$TEST_FILTER" '. + {contains:$c}')
          fi
          entries=$(echo "$entries" | jq -c --argjson e "$entry" '. + [$e]')
        done

        echo "Custom perf suite:"
        echo "$entries" | jq .
        {
          echo "test_suite_custom<<EOF"
          echo "$entries"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

        {
          echo "### Perf benchmark inputs"
          echo "Runs-on filter: $RUNS_ON_FILTER"
          echo "Test filter: ${TEST_FILTER:-<none>}"
          echo "Regression check: ${{ inputs.regression_check }}"
          echo "Wheel type: ${{ inputs.manylinux_build && 'manylinux' || 'release' }}"
        } >> "$GITHUB_STEP_SUMMARY"

  run-perf-benchmarks:
    needs: [docker-build, set-inputs, build]
    if: ${{ !cancelled() && needs.set-inputs.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    secrets: inherit
    uses: ./.github/workflows/call-test.yml
    with:
      test_suite: Custom
      test_suite_custom: ${{ needs.set-inputs.outputs.test_suite_custom }}
      docker_image: ${{ needs.docker-build.outputs.docker-image-base }}
      artifact_release_run_id: ${{ needs.build.outputs.artifacts_run_id }}
      artifact_suffix: ${{ needs.build.outputs.artifact_suffix }}
      torchxla_build_run_id: ${{ inputs.torchxla_build_run_id }}
      wheel_build: ${{ inputs.manylinux_build && 'manylinux' || 'release' }}

  perf-regression-check:
    needs: [run-perf-benchmarks]
    if: ${{ inputs.regression_check && (success() || failure()) }}
    secrets: inherit
    uses: ./.github/workflows/call-perf-regression-check.yml
    with:
      mode: perf

  fail-notify:
    if: always()
    needs:
      - run-perf-benchmarks
      - perf-regression-check
    runs-on: ubuntu-latest
    outputs:
      failed: ${{ steps.check.outputs.failure }}
    steps:
      - name: Check if the needed jobs succeeded or failed
        id: check
        uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: perf-regression-check
          jobs: ${{ toJSON(needs) }}
