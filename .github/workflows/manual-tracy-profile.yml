name: "TT-XLA Tracy Profile"

on:
  workflow_dispatch:
    inputs:
      mlir_override:
        description: "Git SHA of commit in tenstorrent/tt-mlir"
        required: false
        type: string
      runs_on:
        description: "Hardware runner for the bounded profiling proof"
        required: true
        type: choice
        options:
          - "n150"
          - "p150"
        default: "n150"
      benchmark_file:
        description: "Benchmark file passed to the profiling harness"
        required: true
        type: string
        default: "tests/benchmark/test_vision.py"
      nodeid_filter:
        description: "Node id substring selected for the bounded proof"
        required: false
        type: string
        default: "test_mnist"
      max_models:
        description: "Maximum discovered benchmark entries to profile"
        required: true
        type: string
        default: "1"
      timeout_seconds:
        description: "Per-model profiling timeout"
        required: true
        type: string
        default: "1800"
      run_budget_seconds:
        description: "Total local profiling budget after readiness and discovery"
        required: true
        type: string
        default: "2400"
      tt_perf_report_ref:
        description: "tt-perf-report git ref to install before profiling"
        required: true
        type: string
        default: "main"
      extra_setup:
        description: "Optional shell setup before profiling"
        required: false
        type: string
        default: ""

permissions:
  actions: write
  checks: write
  contents: read
  packages: write
  id-token: write

run-name: "Tracy profile (${{ inputs.benchmark_file }} :: ${{ inputs.nodeid_filter }} on ${{ inputs.runs_on }})"

env:
  GH_TOKEN: ${{ github.token }}
  TTMLIR_TOOLCHAIN_DIR: /opt/ttmlir-toolchain
  TT_XLA_CI: 1
  TT_METAL_OPERATION_TIMEOUT_SECONDS: ${{ vars.TT_METAL_OPERATION_TIMEOUT_SECONDS || 300 }}
  TT_METAL_DISPATCH_TIMEOUT_COMMAND_TO_EXECUTE: "/opt/tt-triage-venv/bin/python /opt/tt-triage/tools/tt-triage.py 1>&2"

jobs:
  build-image:
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit
    with:
      mlir_override: ${{ inputs.mlir_override }}
      dockbuild: "ci"

  build-ttxla:
    needs: build-image
    uses: ./.github/workflows/call-build.yml
    secrets: inherit
    with:
      docker_image: ${{ needs.build-image.outputs.docker-image }}
      docker_image_manylinux: ${{ needs.build-image.outputs.docker-image-manylinux }}
      mlir_override: ${{ inputs.mlir_override }}
      build_types: "release"

  profile:
    needs: [build-image, build-ttxla]
    if: ${{ !cancelled() && needs.build-ttxla.result == 'success' }}
    runs-on: ${{ fromJson(format('["{0}", "in-service"]', inputs.runs_on)) }}
    container:
      image: ${{ needs.build-image.outputs.docker-image }}
      options: --device /dev/tenstorrent
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /etc/udev/rules.d:/etc/udev/rules.d
        - /lib/modules:/lib/modules
        - /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env
        - /mnt/dockercache:/mnt/dockercache

    steps:
      - name: Mark repo as safe for git
        run: |
          git config --global --add safe.directory /__w/tt-xla/tt-xla
          git config --global --add safe.directory /__w/tt-xla/tt-xla/third_party/tt_forge_models

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .github/
            .gitmodules
            pytest.ini
            python_package/requirements.txt
            tests/
            third_party/
            venv/

      - name: Set reusable strings
        id: strings
        shell: bash
        env:
          JOB_ID: ${{ job.check_run_id }}
        run: |
          echo "work_dir=$(pwd)" >> "$GITHUB_OUTPUT"
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "run_id=run-5009-ci-${{ github.run_id }}-$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "output_root=$(pwd)/artifacts/prd-009/ttxla-profile" >> "$GITHUB_OUTPUT"
          echo "run_dir=$(pwd)/artifacts/prd-009/ttxla-profile/run-5009-ci-${{ github.run_id }}-$JOB_ID" >> "$GITHUB_OUTPUT"

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: xla-whl-release${{ needs.build-ttxla.outputs.artifact_suffix }}
          path: wheels
          run-id: ${{ needs.build-ttxla.outputs.artifacts_run_id }}
          github-token: ${{ github.token }}

      - name: Install dependencies
        shell: bash
        run: |
          source venv/activate
          uv pip install wheels/*.whl
          uv pip install "git+https://github.com/tenstorrent/tt-perf-report.git@${{ inputs.tt_perf_report_ref }}"

      - name: Run extra setup
        if: ${{ inputs.extra_setup != '' }}
        shell: bash
        run: ${{ inputs.extra_setup }}

      - name: Run profiling harness
        shell: bash
        env:
          HF_HOME: /mnt/dockercache/huggingface
          TORCH_HOME: /mnt/dockercache/torchhub
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source venv/activate
          export PYTHONPATH="${{ steps.strings.outputs.work_dir }}:$PYTHONPATH"

          python tests/benchmark/scripts/ttxla_profile_pipeline.py \
            --repo-root "${{ steps.strings.outputs.work_dir }}" \
            --output-root "${{ steps.strings.outputs.output_root }}" \
            --run-id "${{ steps.strings.outputs.run_id }}" \
            --pytest-bin "pytest" \
            --tracy-bin "tracy" \
            --tt-perf-report-bin "tt-perf-report" \
            --perf-report-job-id "${{ steps.strings.outputs.job_id }}" \
            --benchmark-file "${{ inputs.benchmark_file }}" \
            --nodeid-filter "${{ inputs.nodeid_filter }}" \
            --max-models "${{ inputs.max_models }}" \
            --timeout-seconds "${{ inputs.timeout_seconds }}" \
            --run-budget-seconds "${{ inputs.run_budget_seconds }}" \
            run

      - name: Upload profiling artifacts
        uses: actions/upload-artifact@v6
        if: success() || failure()
        with:
          name: ttxla-profile-${{ steps.strings.outputs.job_id }}
          path: ${{ steps.strings.outputs.run_dir }}
          if-no-files-found: warn

      - name: Upload perf reports
        uses: actions/upload-artifact@v6
        if: success() || failure()
        with:
          name: perf-reports-${{ steps.strings.outputs.job_id }}
          path: ${{ steps.strings.outputs.run_dir }}/perf_reports
          if-no-files-found: warn
