name: Build Manylinux Wheel (call)

on:
  workflow_call:
    inputs:
      docker-image:
        description: 'Docker manylinux image'
        required: false
        type: string
        default: 'latest'
      artifact_suffix:
        description: 'Suffix for artifact name to distinguish different builds, e.g. commit SHA'
        type: string
        required: false
      mlir_override:
        description: 'Git SHA of commit in tenstorrent/tt-mlir'
        required: false
        type: string
      xla_sha_override:
        description: 'Git SHA of commit in tenstorrent/tt-xla or branch name'
        required: false
        type: string
        default: ${{ github.sha }}

jobs:
  build-wheels:
    name: Build Manylinux Wheel
    timeout-minutes: 90
    runs-on: tt-ubuntu-2204-large-stable
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.xla_sha_override }}

      - name: Override tt-mlir SHA mlir_override is set
        if: ${{ inputs.mlir_override }}
        shell: bash
        run: |
            # Update the CMakeLists.txt file with the new SHA
            sed -i "s/set(TT_MLIR_VERSION \".*\")/set(TT_MLIR_VERSION \"${{ inputs.mlir_override }}\")/" third_party/CMakeLists.txt

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "work-dir=$(pwd)" >> "$GITHUB_OUTPUT"
          echo "build-output-dir=$(pwd)/build" >> "$GITHUB_OUTPUT"
          echo "wheel-output-dir=$(pwd)/python_package/dist" >> "$GITHUB_OUTPUT"

      - name: Check Redis credentials
        # Forks will never have secrets; don't fail the job for them, they'll just run slower
        if: ${{ github.event.pull_request.head.repo.fork == false }}
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "On main branch, Use Redis ccache in write mode."
            CCACHE_REMOTE_STORAGE="redis://${{ vars.REDIS_CCACHE_WRITER_USER }}:${{ secrets.REDIS_CCACHE_WRITER_PASSWORD }}@${{ vars.REDIS_CCACHE_WRITER_HOST }}:${{ vars.REDIS_CCACHE_WRITER_PORT }}/1|read-only=false"
          else
            echo "Not on main branch, Use Redis ccache in read-only mode."
            CCACHE_REMOTE_STORAGE="redis://${{ vars.REDIS_CCACHE_READER_USER }}:${{ secrets.REDIS_CCACHE_READER_PASSWORD }}@${{ vars.REDIS_CCACHE_READER_HOST }}:${{ vars.REDIS_CCACHE_READER_PORT }}/1|read-only=true"
          fi
          echo "CCACHE_REMOTE_STORAGE=${CCACHE_REMOTE_STORAGE}" >> $GITHUB_ENV
          echo "CCACHE_REMOTE_STORAGE: ${CCACHE_REMOTE_STORAGE}"

      - name: Git safe dir
        run: git config --global --add safe.directory ${{ steps.strings.outputs.work-dir }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build ttxla  Wheel (manylinux)
        uses: pypa/cibuildwheel@v3.3
        env:
          CIBW_ENVIRONMENT: >-
            CCACHE_REMOTE_ONLY=true
            CCACHE_TEMPDIR=/tmp/ccache
            CCACHE_REMOTE_STORAGE="${{ env.CCACHE_REMOTE_STORAGE }}"
            IN_CIBW_ENV=ON
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ vars.HARBOR_PREFIX }}${{ inputs.docker-image }}
          CIBW_PROJECT_REQUIRES_PYTHON: "==3.12.*"
          CIBW_SKIP: "*-musllinux_*"
          # Fail fast if the patchelf auditwheel will invoke is not our
          # lief-patchelf wrapper. Stock patchelf corrupts the TT libraries
          # during `auditwheel repair`; this guards against PATH precedence
          # silently picking up a different patchelf in the build container.
          CIBW_BEFORE_BUILD: >-
            mkdir -p /tmp/ccache && ccache -z && ccache -p &&
            echo "Active patchelf: $(command -v patchelf)" &&
            patchelf --version &&
            patchelf --version | grep -q lief-patchelf
        with:
          output-dir: ${{ steps.strings.outputs.wheel-output-dir }}
          package-dir: ${{ steps.strings.outputs.work-dir }}/python_package
          config-file: "${{ steps.strings.outputs.work-dir }}/python_package/pyproject.toml"

      # Outcome gate: dlopen every shipped library and fail on SIGSEGV. Combined
      # with the CIBW_BEFORE_BUILD patchelf assertion above, this removes any
      # ambiguity -- if the build reached here, lief-patchelf was the active
      # patchelf, so a segfault here means lief-patchelf itself corrupted the
      # libraries (not that the wrong patchelf was silently picked up). Runs on
      # the host (no TT hardware needed; corruption faults at dlopen, not at
      # device init) with --no-deps since the sweep only needs the .so files.
      - name: Smoke test repaired wheel (dlopen, no hardware)
        shell: bash
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install --no-deps ${{ steps.strings.outputs.wheel-output-dir }}/*.whl
          /tmp/smoke-venv/bin/python .github/scripts/smoke_dlopen.py

      - name: Upload wheel artifact
        # Upload even when the smoke test fails so a corrupt wheel is available
        # for offline inspection.
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: xla-whl-manylinux${{ inputs.artifact_suffix }}
          path: ${{ steps.strings.outputs.wheel-output-dir }}/*.whl
          if-no-files-found: error
