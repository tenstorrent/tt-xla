name: Builder Integration Test (call)

# To add more builder tests, append entries to
# .github/workflows/test-matrix-presets/builder-integration-tests.json.
# Required fields:
#   "runs-on"  – hardware runner (n150, wormhole_b0, n300, …)
#   "name"     – short label used in job name and artifact filename
#   "tests"    – list of test IDs / names passed as positional args
# Optional fields (mirror run_test_op_by_op.py flags):
#   "source"        – "llm" | "models"  (--source)
#   "target"        – list of "stablehlo" | "ttir" | "ttnn"  (--target, repeatable)
#   "artifacts-dir" – path to scan for MLIR files  (--artifacts-dir)
#   "no-run"        – true to skip running tests, only collect existing files  (--no-run)

on:
  workflow_call:
    inputs:
      docker_image:
        description: 'Docker image to use for build and test'
        required: true
        type: string

env:
  TTMLIR_TOOLCHAIN_DIR: /opt/ttmlir-toolchain
  TT_XLA_CI: 1

jobs:
  build:
    uses: ./.github/workflows/call-build-ttxla.yml
    secrets: inherit
    with:
      docker_image: ${{ inputs.docker_image }}
      build_type: debug
      enable_python_bindings: true

