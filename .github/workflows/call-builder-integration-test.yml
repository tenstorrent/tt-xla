name: Builder Integration Test (call)

# Three-job pipeline (sequential):
#   build        – builds tt-xla once on a large CPU runner and uploads two
#                  artifacts:
#                    • pjrt_plugin_tt wheel  (installed on the test runner)
#                    • tt-mlir bindings tar  (ttrt binary + MLIR Python packages)
#   read-matrix  – reads builder-integration-tests.json; groups entries by
#                  "runs-on" so all tests for the same device share one job
#   run-test     – one job per device; installs the wheel, restores the
#                  bindings to the path venv/activate expects, runs
#                  ttrt query --save-artifacts, then iterates over every test
#
# Why two artifacts instead of one big tar?
#   cmake --build produces ttrt and the MLIR Python bindings inside the
#   tt-mlir submodule build tree at:
#     third_party/tt-mlir/src/tt-mlir/build/bin/ttrt
#     third_party/tt-mlir/src/tt-mlir/build/python_packages/
#     third_party/tt-mlir/src/tt-mlir/build/runtime/python/
#   venv/activate adds these to PATH/PYTHONPATH at lines 40 and 13.
#   Archiving the entire tt-mlir build would be multi-GB; we archive only
#   the three subdirectories that venv/activate actually references.
#   The compiled .so files are portable because both the build runner and
#   test runners use the same Docker image with the toolchain at
#   /opt/ttmlir-toolchain (added to LD_LIBRARY_PATH by venv/activate).
#
# cmake cache note:
#   We run cmake with -DTTMLIR_ENABLE_BINDINGS_PYTHON=ON before setup.py.
#   cmake caches this value in build/CMakeCache.txt. When setup.py later
#   re-runs cmake (with its own flags), the cached value persists and Python
#   bindings remain enabled for the incremental rebuild.
#
# To add more builder tests, append entries to
# .github/workflows/test-matrix-presets/builder-integration-tests.json.
# Required fields:
#   "runs-on"  – hardware runner (n150, wormhole_b0, n300, …)
#   "name"     – short label used in job name and artifact filename
#   "tests"    – list of test IDs / names passed as positional args
# Optional fields (mirror run_test_op_by_op.py flags):
#   "source"        – "llm" | "models"  (--source)
#   "target"        – list of "stablehlo" | "ttir" | "ttnn"  (--target, repeatable)
#   "artifacts-dir" – path to scan for MLIR files  (--artifacts-dir)
#   "no-run"        – true to skip running tests, only collect existing files  (--no-run)
#
# Examples:
#   { "runs-on": "n150",        "name": "test_add",   "tests": ["tests/torch/ops/test_add.py::test_add"] }
#   { "runs-on": "wormhole_b0", "name": "llama_ttir", "tests": ["test_llama_3_2_1b"], "source": "llm", "target": ["ttir"] }
#   { "runs-on": "n150",        "name": "resnet",     "tests": ["pytorch_resnet50-inference-single_device"], "source": "models" }

on:
  workflow_call:
    inputs:
      docker_image:
        description: 'Docker image to use for build and test'
        required: true
        type: string

env:
  TTMLIR_TOOLCHAIN_DIR: /opt/ttmlir-toolchain
  TT_XLA_CI: 1

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 – build on a large CPU runner, upload wheel + bindings
  # ---------------------------------------------------------------------------
  build:
    uses: ./.github/workflows/call-build.yml
    secrets: inherit
    with:
      docker_image: ${{ inputs.docker_image }}
      build_type: debug
      enable_python_bindings: true

  # ---------------------------------------------------------------------------
  # Job 2 – read and group the JSON matrix
  # ---------------------------------------------------------------------------
  read-matrix:
    needs: [build]
    # build is a workflow_call job; its outputs are accessible via needs.build.outputs.*
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Read and group builder-integration-tests.json by device
        id: read
        shell: bash
        run: |
          # Group flat test entries by "runs-on" so all tests for the same
          # device are bundled into one matrix job.
          # Each grouped entry: { "runs-on": "n150", "test-configs": [ {name, tests, ...}, ... ] }
          matrix=$(jq -c '
            [group_by(."runs-on")[] |
              {
                "runs-on": .[0]."runs-on",
                "test-configs": [.[] | del(."runs-on")]
              }
            ]
          ' .github/workflows/test-matrix-presets/builder-integration-tests.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Grouped matrix:"
          echo "$matrix" | jq '.'

  # ---------------------------------------------------------------------------
  # Job 3 – one job per device, running all its tests in sequence
  # ---------------------------------------------------------------------------
  run-test:
    needs: [build, read-matrix]
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.read-matrix.outputs.matrix) }}

    timeout-minutes: 60
    runs-on: ["${{ matrix.build.runs-on }}", "in-service"]

    # Keep job name in sync with the fetch-job-id step below
    name: "builder ${{ matrix.build.runs-on }} (${{ strategy.job-index }})"

    container:
      image: ${{ inputs.docker_image }}
      options: --device /dev/tenstorrent
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /etc/udev/rules.d:/etc/udev/rules.d
        - /lib/modules:/lib/modules
        - /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env
        - /mnt/dockercache:/mnt/dockercache

    steps:
      - name: Mark repo as safe for git
        run: |
          git config --global --add safe.directory /__w/tt-xla/tt-xla
          git config --global --add safe.directory /__w/tt-xla/tt-xla/third_party/tt_forge_models

      - uses: actions/checkout@v4
        with:
          # No submodules needed — build artifacts come from the build job.
          # venv/activate only needs the directory structure to exist, which
          # we create below when restoring the bindings artifact.
          submodules: false
          repository: 'tenstorrent/tt-xla'

      - name: Fetch job ID
        id: fetch-job-id
        uses: tenstorrent/tt-github-actions/.github/actions/job_id@main
        with:
          job_name: "builder ${{ matrix.build.runs-on }} (${{ strategy.job-index }})"

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.wheel_artifact_name }}
          path: wheels
          # artifacts_run_id points to the run that produced the artifacts —
          # either the current run (fresh build) or a previous run (cache hit).
          # Without this, download-artifact only searches the current run and
          # fails on cache hits because build-ttxla was skipped.
          run-id: ${{ needs.build.outputs.artifacts_run_id }}
          github-token: ${{ github.token }}

      - name: Install wheel
        shell: bash
        run: |
          source venv/activate
          uv pip install wheels/*.whl

      - name: Download tt-mlir bindings
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.bindings_artifact_name }}
          path: bindings
          run-id: ${{ needs.build.outputs.artifacts_run_id }}
          github-token: ${{ github.token }}

      - name: Restore bindings to expected path
        shell: bash
        run: |
          # venv/activate sets:
          #   PATH      += third_party/tt-mlir/src/tt-mlir/build/bin
          #   PYTHONPATH += third_party/tt-mlir/src/tt-mlir/build/python_packages
          #   PYTHONPATH += third_party/tt-mlir/src/tt-mlir/build/runtime/python
          mkdir -p third_party/tt-mlir/src/tt-mlir/build
          tar -xzf bindings/builder-bindings.tar.gz \
            -C third_party/tt-mlir/src/tt-mlir/build

      - name: Query TT hardware and save device artifacts
        shell: bash
        run: |
          source venv/activate
          ttrt query --save-artifacts

      - name: Run all builder integration tests for this device
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HOME: /mnt/dockercache/huggingface
        shell: bash
        run: |
          source venv/activate

          # build_cmd <config-json> <nameref> — fills the named array with
          # the argument list for run_test_op_by_op.py
          build_cmd() {
            local cfg="$1"
            local -n _cmd=$2

            mapfile -t _cmd < <(echo "$cfg" | jq -r '.tests[]')

            local src; src=$(echo "$cfg" | jq -r '.source // empty')
            [[ -n "$src" ]] && _cmd+=(--source "$src")

            mapfile -t _targets < <(echo "$cfg" | jq -r '.target[]? // empty')
            for t in "${_targets[@]}"; do _cmd+=(--target "$t"); done

            local adir; adir=$(echo "$cfg" | jq -r '."artifacts-dir" // empty')
            [[ -n "$adir" ]] && _cmd+=(--artifacts-dir "$adir")

            local norun; norun=$(echo "$cfg" | jq -r '."no-run" // false')
            [[ "$norun" == "true" ]] && _cmd+=(--no-run)
          }

          FAILED=()
          configs='${{ toJson(matrix.build['test-configs']) }}'
          count=$(echo "$configs" | jq 'length')

          for i in $(seq 0 $((count - 1))); do
            cfg=$(echo "$configs" | jq -c ".[$i]")
            name=$(echo "$cfg" | jq -r '.name')

            echo ""
            echo "========================================================"
            echo "[$((i+1))/$count] $name"
            echo "========================================================"

            build_cmd "$cfg" CMD
            echo "Running: python tests/integrations/tt_mlir_builder/run_test_op_by_op.py ${CMD[*]}"

            python tests/integrations/tt_mlir_builder/run_test_op_by_op.py \
              "${CMD[@]}" \
              2>&1 | tee "${name}.log" || FAILED+=("$name")
          done

          if [[ ${#FAILED[@]} -gt 0 ]]; then
            echo ""
            echo "FAILED tests: ${FAILED[*]}"
            exit 1
          fi

      - name: Upload test logs
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: builder-integration-logs-${{ matrix.build.runs-on }}-${{ github.run_attempt }}-${{ steps.fetch-job-id.outputs.job_id }}
          path: "*.log"
