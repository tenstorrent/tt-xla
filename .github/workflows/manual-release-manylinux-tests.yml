name: Manual manylinux release tests

on:
  workflow_dispatch:

permissions:
  actions: write
  id-token: write
  packages: write
  checks: write
  contents: write

jobs:
  build-image:
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit
    with:
      dockbuild: all

  build-ttxla:
    uses: ./.github/workflows/call-build-manylinux.yml
    name: "Build manylinux tt-xla"
    secrets: inherit
    needs: build-image
    with:
      docker-image: ${{ needs.build-image.outputs.docker-image-manylinux }}

  build-release-docker:
    name: Build Fedora Docker image with manylinux wheel
    runs-on: ubuntu-latest
    needs: build-ttxla
    outputs:
      docker_image: ${{ steps.build-docker.outputs.docker_image }}
    steps:
      - name: Fix workspace permissions issue
        run: sudo chown -R $USER:$USER $GITHUB_WORKSPACE

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Download manylinux wheel
        uses: actions/download-artifact@v6
        with:
          name: xla-whl-manylinux
          path: .

      - name: Build & push Docker image
        shell: bash
        id: build-docker
        run: |
          set -eo pipefail

          docker_tag=${{ github.sha }}
          IMAGE_NAME=ghcr.io/tenstorrent/tt-xla/tt-xla-bare-fedora

          if docker manifest inspect $IMAGE_NAME:$docker_tag > /dev/null; then
            echo "Docker image $IMAGE_NAME:$docker_tag exists"
          else
            echo "Building image $IMAGE_NAME:$docker_tag"
            docker build \
              --progress=plain \
              -t $IMAGE_NAME:$docker_tag \
              -f .github/Dockerfile.release-fedora .

            echo "Pushing image $IMAGE_NAME:$docker_tag"
            docker push $IMAGE_NAME:$docker_tag
          fi

          echo "docker_image=$IMAGE_NAME:$docker_tag" >> "$GITHUB_OUTPUT"

  basic-tests:
    needs: [ build-release-docker ]
    uses: tenstorrent/tt-forge/.github/workflows/basic-tests.yml@main
    secrets: inherit
    with:
      docker-image: ${{ needs.build-release-docker.outputs.docker_image }}
      ref: main
      project-filter: tt-xla

  demo-tests:
    needs: [ build-release-docker ]
    uses: tenstorrent/tt-forge/.github/workflows/demo-tests.yml@main
    secrets: inherit
    with:
      docker-image: ${{ needs.build-release-docker.outputs.docker_image }}
      ref: main
      project-filter: tt-xla
