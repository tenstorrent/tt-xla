[build-system]
requires = [
    "setuptools>=42",
    "wheel",
    "ninja",
    "cmake",
]
build-backend = "setuptools.build_meta"

[tool.cibuildwheel]
# TEMPORARY: force lld as the default linker for the whole manylinux build.
# The manylinux toolchain links with GNU ld (bfd), whose code-first layout puts
# .init/.plt right behind the program headers with no headroom. `auditwheel repair`
# (and setup.py's RPATH pass) then run patchelf, which must relocate those sections
# into a non-executable segment and leaves DT_INIT stale -> SIGSEGV in call_init on
# dlopen. lld lays out a read-only segment first, giving headroom, so patchelf edits
# RPATH in place and the binaries stay valid (this is why the linux_x86_64 wheel,
# which already uses lld, is unaffected). Pointing /usr/bin/ld at ld.lld makes every
# sub-build (tt-metal, tt-mlir, tt-xla) link with lld without per-repo flag changes.
before-all = "(dnf install -y lld || true); LLD=$(command -v ld.lld || find /opt/ttmlir-toolchain -type f -name ld.lld 2>/dev/null | head -1); echo \"located ld.lld: '$LLD'\"; if [ -x \"$LLD\" ]; then ln -sf \"$LLD\" /usr/bin/ld && echo 'default /usr/bin/ld now ->' && ld --version | head -1; else echo 'ERROR: no usable ld.lld found; aborting before-all' && exit 1; fi"
repair-wheel-command = "auditwheel repair --exclude libTTMLIRRuntime.so --exclude libTTMLIRCompiler.so --exclude libtt-alchemist-lib.so --exclude libtt_metal.so --exclude libtt_stl.so --exclude libtt-umd.so.0 --exclude _ttnncpp.so --exclude _ttnn.so --exclude libdevice.so --exclude libtracy.so* -w {dest_dir} {wheel}"
