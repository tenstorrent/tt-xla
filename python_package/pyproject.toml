[build-system]
requires = [
    "setuptools>=42",
    "wheel",
    "ninja",
    "cmake",
]
build-backend = "setuptools.build_meta"

[tool.cibuildwheel]
repair-wheel-command = """\
    TEMP_DIR=$(mktemp -d) && \
    unzip -q {wheel} -d $TEMP_DIR && \
    LD_LIBRARY_PATH=$TEMP_DIR/pjrt_plugin_tt/lib:$TEMP_DIR/pjrt_plugin_tt/lib64:$LD_LIBRARY_PATH \
    auditwheel repair -w {dest_dir} {wheel} && \
    rm -rf $TEMP_DIR
"""
