# Batch size sweep on FINDINGS worst-case shape: K=14336, N=4096
# Wff3 down-projection of LLaMA 3 8B / Mistral 7B.
#
# Hypothesis (per tt-forge-sweeps/log/matmul_mp_bf16/FINDINGS.md): batch=32 makes M=4096,
# which moves the matmul out of L3-cache regime on AMD EPYC 7352 (Zen 2, 128MB L3),
# triggering the ATen scalar bf16 fallback's worst case (~2200x vs lab AVX-512). Smaller
# batches keep the matmul cache-friendly and should show only ~2x CI penalty.
#
# All cases use FROM_ANOTHER_OP (matches FINDINGS kernel: out = matmul(x+x, y+y)) and the
# same compiler_config used in FINDINGS' production failure (opt2_bf16_fp32accfalse_hifi2).

# batch=1,  seq=128 -> M=128  (cache-friendly, expected ~fast)
matmul_mp-FROM_ANOTHER_OP-{'compiler_config': 'mp_opt2_bf16_fp32accfalse_hifi2'}-((1, 128, 14336), (14336, 4096))-None-None
# batch=4,  seq=128 -> M=512
matmul_mp-FROM_ANOTHER_OP-{'compiler_config': 'mp_opt2_bf16_fp32accfalse_hifi2'}-((4, 128, 14336), (14336, 4096))-None-None
# batch=8,  seq=128 -> M=1024
matmul_mp-FROM_ANOTHER_OP-{'compiler_config': 'mp_opt2_bf16_fp32accfalse_hifi2'}-((8, 128, 14336), (14336, 4096))-None-None
# batch=16, seq=128 -> M=2048
matmul_mp-FROM_ANOTHER_OP-{'compiler_config': 'mp_opt2_bf16_fp32accfalse_hifi2'}-((16, 128, 14336), (14336, 4096))-None-None
# batch=32, seq=128 -> M=4096 (FINDINGS worst case -- expected catastrophic on CI)
matmul_mp-FROM_ANOTHER_OP-{'compiler_config': 'mp_opt2_bf16_fp32accfalse_hifi2'}-((32, 128, 14336), (14336, 4096))-None-None
