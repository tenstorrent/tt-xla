# Three CPU matmul dispatch paths at the SAME (M, K, N) shape and dtype.
# Used to isolate why minisweeps FROM_ANOTHER_OP hits the catastrophic
# bf16 ATen scalar fallback on Zen 2 while real-model nn.Linear (e.g.
# LLaMA 3 8B FFN) does not, at the same shape and batch.
#
# Shape: (1, 128, 14336) x (14336, 4096) -- M=128, K=14336, N=4096.
# This is the FFN down-projection of LLaMA 3 8B / Mistral 7B.
# Use MINISWEEPS_INPUT_DTYPE=bf16 to force bf16 CPU inputs.
#
# - FROM_ANOTHER_OP:       matmul(x+x, y+y)             -- adds catalyze the slow path?
# - FROM_HOST:             matmul(x, y)                 -- plain torch.matmul, intermediate rhs
# - FROM_PARAMETER_WEIGHT: matmul(x, self.weight)       -- rhs is nn.Parameter (like nn.Linear)

matmul_mp-FROM_ANOTHER_OP-{'compiler_config': 'mp_opt2_bf16_fp32accfalse_hifi2'}-((1, 128, 14336), (14336, 4096))-None-None
matmul_mp-FROM_HOST-{'compiler_config': 'mp_opt2_bf16_fp32accfalse_hifi2'}-((1, 128, 14336), (14336, 4096))-None-None
matmul_mp-FROM_PARAMETER_WEIGHT-{'compiler_config': 'mp_opt2_bf16_fp32accfalse_hifi2'}-((1, 128, 14336), (14336, 4096))-None-None
matmul_mp-FROM_MATMUL_NK_LAYOUT-{'compiler_config': 'mp_opt2_bf16_fp32accfalse_hifi2'}-((1, 128, 14336), (14336, 4096))-None-None
matmul_mp-FROM_LINEAR-{'compiler_config': 'mp_opt2_bf16_fp32accfalse_hifi2'}-((1, 128, 14336), (14336, 4096))-None-None
