repos:
  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black
        language_version: python3
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.1
    hooks:
      - id: clang-format
        types_or: [c++, c]
        args: [-style=file, -i]
  - repo: local
    hooks:
      - id: check-spdx
        name: Validate SPDX license identifiers
        entry: python .github/scripts/check_spdx.py --config .github/check-spdx.yaml
        language: python
        additional_dependencies: ['license-expression>=30.3.0', 'pyyaml>=6.0']
        types_or: [python, c, c++]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-yaml
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]
